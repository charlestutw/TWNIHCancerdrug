const REMOTE_DATA_URL = "https://raw.githubusercontent.com/charlestutw/TWNIHCancerdrug/main/nhi-ch9-data.json";

mab 及pemetrexed 併用於罹患帶有表皮生長因子受體(EGFR)\nexon 20插入突變之局部晚期或轉移性非小細胞肺癌(NSCLC)的成人病人，作為第一線治療。(114/10/1)\n8.與nivolumab併用於可切除（腫瘤≧4公分或淋巴結陽性N1/N2(排除N3)，且無疾病轉移 M0）之不具 EGFR 或 ALK 腫瘤基因異常之非小細胞肺癌術前輔助治療成人病人，至多 3 個療程，且病人需符合免疫檢查點抑制劑之藥品給付規定。(115/6/1)","req":"官方條文原文，生效日 2026-06-01｜來源 9.2._20260601.pdf"},{"id":"9.3","name":"Docetaxel","brand":"","type":"CHEMO","cancers":["乳癌","肺癌","攝護腺癌","頭頸癌","胃癌"],"verbatim":true,"eff":"2026-06-01","src":"9.3._20260601.pdf","ind":"9.3.Docetaxel： （87/7/1、92/11/1、93/8/1、95/8/1、96/1/1、99/6/1、100/1/1、101/9/1、108/1/1、113/5/1、115/6/1、115/8/1）\n1.本類藥品(除 Doce 之外)依藥品許可證登載之適應症範圍內給付於乳癌、非小細胞肺癌、前列腺癌、頭頸癌及胃腺癌之病例；倘併用其他標靶治療、免疫檢查點抑制劑等藥品時，病人須符合該併用藥品之藥品給付規定。(115/6/1、115/8/1）\n2.Doce 限給付於下列情形：(115/6/1、115/8/1）\n(1)乳癌：\nⅠ.局部晚期或轉移性乳癌。\nⅡ.與 anthracycline 合併使用於腋下淋巴結轉移之早期乳癌之術後輔助性化學治療。(99/6/1)\nⅢ.早期乳癌手術後，經診斷為三陰性反應且無淋巴轉移的病人，得作為與cyclophosphamide併用doxorubicin的化學輔助療法。(101/9/1）\n(2)非小細胞肺癌：局部晚期或轉移性非小細胞肺癌。\n(3)前列腺癌：\nⅠ.於荷爾蒙治療失敗之轉移性前列腺癌。\nⅡ.與 darolutamide 併用於治療高風險轉移性的去勢敏感性前列腺癌(mCSPC)，患者需符合 darolutamide 之藥品給付規定。\n(113/5/1)\n(4)頭頸癌：限局部晚期且無遠端轉移之頭頸部鱗狀細胞癌且無法手術切除者，與cisplatin及5-fluorouracil併用，作為放射治療前的引導治療，限使用4個療程。(100/1/1)\n(5)胃腺癌：晚期胃腺癌患者，包括胃食道接合處之腺癌(108/1/1)","req":"官方條文原文，生效日 2026-06-01｜來源 9.3._20260601.pdf"},{"id":"9.4","name":"Gemcitabine","brand":"Gemzar","type":"CHEMO","cancers":["肺癌","胰臟癌","膀胱癌","乳癌","卵巢癌","膽道癌","泌尿道上皮癌"],"verbatim":true,"eff":"2026-06-01","src":"9.4._20260601.pdf","ind":"9.4.Gemcitabine（如Gemzar） ： （92/12/1、93/8/1、94/10/1、96/5/1、99/10/1、105/2/1、114/2/1、115/2/1、115/6/1）\n1.本類藥品(除Gemmis之外)依藥品許可證登載之適應症範圍內給付於非小細胞肺癌、胰臟癌、膀胱癌、乳癌、卵巢癌及膽道癌之病例；倘併用其他標靶治療、免疫檢查點抑制劑等藥品時，病人須符合該併用藥品之藥品給付規定。(115/6/1）\n2.Gemmis限給付於下列情形：(115/6/1）\n(1)晚期或無法手術切除之非小細胞肺癌及胰臟癌病患。\n(2)晚期膀胱癌病患。（92/12/1）\n(3)Gemcitabine與paclitaxel併用，可使用於曾經使用過anthracycline之局部復發且無法手術切除或轉移性之乳癌病患。 （94/10/1）\n(4)用於曾經使用含鉑類藥物(platinum-based)治療後復發且間隔至少6個月之卵巢癌，作為第二線治療。（96/5/1、99/10/1）\n(5)無法手術切除或晚期或復發之膽道癌(含肝內膽管)病患。\n（105/2/1）\n(6)與durvalumab及cisplatin併用於治療局部晚期或轉移性未接受治療或不可手術之膽道癌(biliary tract cancer)成人病人(壺腹癌除外)，患者需符合免疫檢查點抑制劑之藥品給付規定。 （114/2/1)\n(7)與nivolumab及cisplatin併用於無法切除或轉移性泌尿道上皮癌成人病人的第一線治療，病人需符合免疫檢查點抑制劑之藥品給付規定，且至多6個療程。 （115/2/1)","req":"官方條文原文，生效日 2026-06-01｜來源 9.4._20260601.pdf"},{"id":"9.5.1","name":"Paclitaxel","brand":"Taxol","type":"CHEMO","cancers":["卵巢癌","肺癌","乳癌"],"verbatim":true,"eff":"2026-06-01","src":"9.5.1._20260601.pdf","ind":"9.5.1.Paclitaxel成分注射劑：(108/11/1、112/12/1、114/6/1、114/8/1、115/6/1)\n1.本類藥品(除PHYXOL、GENETAXYL CREM LESS及TAXOL 之外)依藥品許可證登載之適應症範圍內給付於卵巢癌、非小細胞肺癌、乳癌及卡波西氏肉瘤之病例；倘併用其他標靶治療、免疫檢查點抑制劑等藥品時，病人須符合該併用藥品之藥品給付規定。\n(115/6/1）\n2.PHYXOL、GENETAXYL CREM LESS及TAXOL 限給付於下列情形：\n(115/6/1）\n(1)晚期卵巢癌，作為第一線治療時需與cisplatin併用。\n(94/1/1)\n(2)非小細胞肺癌，作為第一線用藥時需與cisplatin併用。\n(94/1/1)\n(3)與pembrolizumab及carboplatin併用於轉移性鱗狀非小細胞肺癌的第一線治療，患者需符合免疫檢查點抑制劑之藥品給付規定。(112/12/1)\n(4)已使用合併療法(除非有禁忌症、至少應包括使用anthracycline)失敗的轉移性乳癌患者。 （91/4/1、94/1/1)\n(5)腋下淋巴轉移之乳癌且動情素受體為陰性之患者，paclitaxel可作為接續含doxorubicin在內之輔助化學治療。（91/4/1、94/1/1、98/8/1)\n(6)卡波西氏肉瘤第二線用藥。（88/11/1）\n(7)與pembrolizumab及carboplatin併用於早期三陰性乳癌(第II期至第 IIIb期，cT1c N1-2或 T2-4 N0-2)病人的術前前導性治療用藥，病人需符合免疫檢查點抑制劑之藥品給付規定。\n(114/6/1)\n(8)與atezolizumab及bevacizumab(限使用 Alymsys、Avastin、Abevmy、Vegzelma或Mvasi)、carboplatin併用於轉移性非鱗狀非小細胞肺癌第一線治療，患者需符合免疫檢查點抑制劑之藥品給付規定。(114/6/1、114/8/1)","req":"官方條文原文，生效日 2026-06-01｜來源 9.5.1._20260601.pdf"},{"id":"9.5.2","name":"Albumin-bound paclitaxel","brand":"Abraxane","type":"CHEMO","cancers":["胰臟癌"],"verbatim":true,"eff":"2026-06-01","src":"9.5._20260601.pdf","ind":"9.5.Paclitaxel成分劑： （88/8/1、88/11/1、89/6/1、89/10/1、91/4/1、91/8/1、93/8/1、94/1/1、98/8/1、108/11/1、112/12/1、114/6/1、114/8/1、115/6/1）\n9.5.1.Paclitaxel成分注射劑：(108/11/1、112/12/1、114/6/1、114/8/1、115/6/1)\n1.本類藥品(除PHYXOL、GENETAXYL CREM LESS及TAXOL 之外)依藥品許可證登載之適應症範圍內給付於卵巢癌、非小細胞肺癌、乳癌及卡波西氏肉瘤之病例；倘併用其他標靶治療、免疫檢查點抑制劑等藥品時，病人須符合該併用藥品之藥品給付規定。\n(115/6/1）\n2.PHYXOL、GENETAXYL CREM LESS及TAXOL 限給付於下列情形：\n(115/6/1）\n(1)晚期卵巢癌，作為第一線治療時需與cisplatin併用。\n(94/1/1)\n(2)非小細胞肺癌，作為第一線用藥時需與cisplatin併用。\n(94/1/1)\n(3)與pembrolizumab及carboplatin併用於轉移性鱗狀非小細胞肺癌的第一線治療，患者需符合免疫檢查點抑制劑之藥品給付規定。(112/12/1)\n(4)已使用合併療法(除非有禁忌症、至少應包括使用anthracycline)失敗的轉移性乳癌患者。 （91/4/1、94/1/1)\n(5)腋下淋巴轉移之乳癌且動情素受體為陰性之患者，paclitaxel可作為接續含doxorubicin在內之輔助化學治療。（91/4/1、94/1/1、98/8/1)\n(6)卡波西氏肉瘤第二線用藥。（88/11/1）\n(7)與pembrolizumab及carboplatin併用於早期三陰性乳癌(第II期至第 IIIb期，cT1c N1-2或 T2-4 N0-2)病人的術前前導性治療用藥，病人需符合免疫檢查點抑制劑之藥品給付規定。\n(114/6/1)\n(8)與atezolizumab及bevacizumab(限使用 Alymsys、Avastin、Abevmy、Vegzelma或Mvasi)、carboplatin併用於轉移性非鱗狀非小細胞肺癌第一線治療，患者需符合免疫檢查點抑制劑之藥品給付規定。(114/6/1、114/8/1)\n9.5.2.Albumin-based paclitaxel（如Abraxane） ：(108/11/1)\n限併用 gemcitabine，做為轉移性胰腺癌患者之第一線治療。","req":"官方條文原文，生效日 2026-06-01｜來源 9.5._20260601.pdf"},{"id":"9.6","name":"Streptococcus pyrogene","brand":"Picibanil","type":"CHEMO","cancers":["惡性積液"],"verbatim":false,"eff":"","src":"","ind":"惡性腹水、肋膜積水或心包膜積水","req":"需附病歷摘要"},{"id":"9.8","name":"Toremifene","brand":"Fareston","type":"HORMONE","cancers":["乳癌"],"verbatim":false,"eff":"","src":"","ind":"停經後ER陽性轉移性乳癌","req":"無需事前審查"},{"id":"9.9","name":"Vinorelbine","brand":"","type":"CHEMO","cancers":["肺癌","乳癌"],"verbatim":false,"eff":"","src":"","ind":"晚期/無法手術NSCLC；轉移性乳癌；二、三期NSCLC術後輔助（+鉑金類，限4療程）","req":"無需事前審查"},{"id":"9.10","name":"Oxaliplatin","brand":"","type":"CHEMO","cancers":["大腸直腸癌","胃癌","胰臟癌","食道癌"],"verbatim":true,"eff":"2022-11-01","src":"9.10._20221101.pdf","ind":"9.10.Oxaliplatin： （需符合藥品許可證登載之適應症） （89/7/1、91/10/1、93/8/1、98/2/1、98/3/1、98/7/1、102/9/1、102/12/1、109/12/1、110/5/1、110/6/1、110/7/1、111/11/1)\n1.和5-FU 和 folinic acid 併用\n(1)治療轉移性結腸直腸癌，惟若再加用 irinotecan (如 Campto)則不予給付。(91/10/1)\n(2)作為第三期結腸癌(Duke`s C) 原發腫瘤完全切除手術後的輔助療法。(98/2/1)\n2.與 fluoropyrimidine 類藥物(如 capecitabine、5-FU、UFUR，但不包含TS-1)併用，可用於局部晚期及復發/轉移性胃癌之治療。(須依藥品許可證登載之適應症使用)。(98/2/1、98/3/1、98/7/1、102/9/1、102/12/1、109/12/1）\n3.與5-fluorouracil、leucovorin 及 irinotecan 併用(FOLFIRINOX)，作為轉移性胰臟癌之第一線治療。(110/5/1、110/6/1、110/7/1、111/11/1)","req":"官方條文原文，生效日 2022-11-01｜來源 9.10._20221101.pdf"},{"id":"9.11","name":"Uracil-Tegafur","brand":"Ufur","type":"CHEMO","cancers":["胃癌","大腸直腸癌","乳癌","頭頸癌","肺癌"],"verbatim":false,"eff":"","src":"","ind":"轉移性胃/直腸/結腸/乳癌；頭頸鱗狀上皮癌；與cisplatin用於轉移/末期肺癌；第II、III期直/結腸癌術後輔助（限2年）；T2且≥3cm肺腺癌術後（限2年）","req":"無需事前審查"},{"id":"9.12.1","name":"Irinotecan","brand":"Campto","type":"CHEMO","cancers":["大腸直腸癌","胰臟癌"],"verbatim":false,"eff":"","src":"","ind":"轉移性大腸直腸癌第一線（+5-FU+folinic acid）；單用（5-FU失敗後）；FOLFIRINOX用於轉移性胰臟癌","req":"無需事前審查"},{"id":"9.12.2","name":"Irinotecan 微脂體","brand":"Onivyde","type":"CHEMO","cancers":["胰臟癌"],"verbatim":true,"eff":"2025-12-01","src":"9.12.2._20251201.pdf","ind":"9.12.2.Irinotecan微脂體注射劑(如Onivyde)：(107/8/1、114/12/1)\n1.與5-FU 及 leucovorin 合併使用於曾接受過 gemcitabine 治療後復發或惡化之轉移性胰腺癌。(107/8/1)\n2.與oxaliplatin、5-FU 和 leucovorin 併用，作為轉移性胰腺癌成人病人第一線治療。(114/12/1)\n3.需經事前審查核准後使用。","req":"官方條文原文，生效日 2025-12-01｜來源 9.12.2._20251201.pdf"},{"id":"9.13","name":"Aldesleukin","brand":"Proleukin","type":"IMMUNO","cancers":["腎細胞癌","黑色素瘤"],"verbatim":false,"eff":"","src":"","ind":"轉移性腎細胞癌；惡性黑色素癌","req":"無需事前審查"},{"id":"9.14","name":"Doxorubicin liposome","brand":"Lipo-Dox/Caelyx","type":"CHEMO","cancers":["卵巢癌","乳癌","卡波西肉瘤"],"verbatim":false,"eff":"","src":"","ind":"卵巢癌（platinum+paclitaxel失敗後）；轉移性乳癌（心臟疾病風險考量）；AIDS相關卡波西肉瘤（CD4<200）","req":"無需事前審查"},{"id":"9.15","name":"Tretinoin","brand":"Vesanoid","type":"CHEMO","cancers":["白血病"],"verbatim":false,"eff":"","src":"","ind":"急性前髓性白血病（APL）","req":"無需事前審查"},{"id":"9.16","name":"Topotecan","brand":"Hycamtin","type":"CHEMO","cancers":["卵巢癌","肺癌","子宮頸癌"],"verbatim":false,"eff":"","src":"","ind":"卵巢癌及SCLC第二線（platinum第一線後）；+cisplatin用於復發/持續性IVB期子宮頸癌","req":"無需事前審查"},{"id":"9.17","name":"Capecitabine","brand":"Xeloda","type":"CHEMO","cancers":["乳癌","大腸直腸癌","胃癌"],"verbatim":false,"eff":"","src":"","ind":"+docetaxel用於轉移性乳癌（anthracycline失敗）；轉移性大腸直腸癌第一線；第三期結腸癌術後輔助（限8療程）；+platinum用於晚期胃癌第一線；+nivolumab+oxaliplatin用於晚期不具HER2胃癌","req":"無需事前審查"},{"id":"9.18","name":"Trastuzumab","brand":"Herceptin","type":"TARGETED","cancers":["乳癌","胃癌"],"verbatim":true,"eff":"2026-07-01","src":"9.18._20260701.pdf","ind":"9.18. Trastuzumab (如 Herceptin)：(91/4/1、93/8/1、95/2/1、99/1/1、99/8/1、99/10/1、101/1/1、105/11/1、108/5/1、109/2/1、111/12/1、112/10/1、113/8/1、113/12/1、114/1/1、114/5/1、114/12/1、115/7/1)\n1.早期乳癌(99/1/1、99/8/1、99/10/1、101/1/1、111/12/1、112/10/1、113/8/1、113/12/1、114/1/1、114/12/1、115/7/1)\n(1)具 HER2過度表現(IHC3+或 FISH+)，且具腋下淋巴結轉移但無遠處臟器轉移之早期乳癌患者，作為輔助性治療用藥(事審代碼：C50P2)：\n(99/8/1、99/10/1、101/1/1、111/12/1、112/10/1、113/8/1、113/12/1、114/1/1、114/12/1、115/7/1)。\nⅠ.若本藥品使用於手術前之輔助治療，依下列術後情形使用：\n(113/8/1、113/12/1、114/1/1、114/12/1、115/7/1)\ni.外科手術後達病理上緩解（pCR） ：本藥品、pertuzumab 併用本藥品或 pertuzumab 與 trastuzumab 皮下注射複方製劑(如 Phesgo)，三者使用於外科手術前後的總療程合併計算，依藥品仿單記載以全部18個療程為上限。(113/8/1、113/12/1、114/1/1、114/12/1、115/7/1)\nii.若外科手術後無法達病理上緩解（non-pCR），本藥品與trastuzumab emtansine使用於外科手術前後的總療程合併計算，以全部18個療程為上限，其中 trastuzumab emtansine以14\n個療程為上限。(113/8/1、113/12/1)\nⅡ.若未接受術前輔助治療先行手術者，給予本藥品作為術後輔助治療，須接受至少4個療程的化學治療(本藥品合併化療或接續化療之後使用本藥品)，本藥品以全部18個療程為上限。(115/7/1)\n(2)具 HER2過度表現(IHC3+或 FISH+)，且無腋下淋巴結轉移之早期乳癌患者，作為輔助性治療用藥：(111/12/1、112/10/1、113/8/1、113/12/1、114/1/1、114/12/1、115/7/1)\nⅠ.若本藥品使用於手術前之輔助治療，須經影像檢查(乳房超音波或乳房 X 光攝影或核磁共振)顯示腫瘤大於2公分，並依下列術後情形使用：\ni.病理檢驗雌激素受體為陰性 ER(-)(事審代碼：C50P1)且外科手術後達病理上緩解（pCR）者：使用於外科手術前後的總療程合併計算，以全部 9 個療程為上限；使用 Eirgasun vial 420 mg以全部18 個療程為上限。(113/8/1、115/7/1)\nii. 病理檢驗 ER(-)(事審代碼：C50P1)且外科手術後無法達病理上緩解（non-pCR）者：本藥品與 trastuzumab emtansine使用於外科手術前後的總療程合併計算，以全部 18 個療程為上限，其中trastuzumab emtansine以 14 個療程為上限。(113/8/1、115/7/1)\niii. 病理檢驗陽性 ER(+)(事審代碼：C50P3)：限使用 Eirgasun vial420 mg於外科手術前後的總療程合併計算，以全部 18 個療程為上限。(115/7/1)\niv. 115 年 6 月 30 日以前已核定使用 trastuzumab 之病人，得經事前審查核准後，使用 Eirgasun vial 420 mg至總療程上限(即 18 個療程)或使用期間發生疾病惡化為止。\nⅡ.若未接受術前輔助治療先行手術者，給予本藥品(限使用 Eirgasunvial 420 mg)作為術後輔助治療，以全部18個療程為上限，須接受至少4個療程的化學治療(合併化療或接續化療之後使用本藥品)，並須符合下列條件之一：(115/7/1)\ni. ER(-)且腫瘤大於0.5公分(事審代碼：C50P4)。\nii. ER(+)且腫瘤大於1公分(事審代碼：C50P5)。\n2.轉移性乳癌(事審代碼：C50R1)\n(1)單獨使用於治療腫瘤細胞上有 HER2過度表現(IHC3+或 FISH+)，曾接受過一次以上化學治療之轉移性乳癌病人。(91/4/1、99/1/1)\n(2)與 paclitaxel 或 docetaxel 併用，使用於未曾接受過化學治療之轉移性乳癌病患，且為 HER2過度表現(IHC3+或 FISH+)者。(93/8/1、95/2/1、99/1/1)\n(3)轉移性乳癌且 HER2過度表現之病人，僅限先前未使用過本藥品者方可使用。(99/1/1、108/5/1、113/12/1)\n(4)若先前使用過 docetaxel 及 pertuzumab 與 trastuzumab 併用或docetaxel 及 pertuzumab 與 trastuzumab 皮下注射複方製劑(如Phesgo)併用達18個月上限仍未惡化者，得再次申請本藥品。\n(108/5/1、113/12/1)\n3.轉移性胃癌(限 IV 劑型) (事審代碼：C16R1)\nTrastuzumab 合併 capecitabine (或5-fluorouracil)及 cisplatin 適用於未曾接受過化學治療之 HER2過度表現(IHC3+或 FISH+)轉移性胃腺癌(或胃食道接合處腺癌)的治療。(109/2/1)\n4.經事前審查核准後使用，核准後早期乳癌及轉移性胃癌每24週、晚期乳癌每18週須檢附療效評估資料再次申請，若疾病有惡化情形即不應再行申請。\n（105/11/1、114/5/1）","req":"官方條文原文，生效日 2026-07-01｜來源 9.18._20260701.pdf"},{"id":"9.19","name":"Estramustine","brand":"Estracyt","type":"HORMONE","cancers":["攝護腺癌"],"verbatim":false,"eff":"","src":"","ind":"晚期攝護腺癌（荷爾蒙治療無效，或預後不佳初次治療）","req":"無需事前審查"},{"id":"9.20","name":"Rituximab","brand":"Mabthera","type":"TARGETED","cancers":["淋巴瘤","白血病"],"verbatim":true,"eff":"2026-06-01","src":"9.20._20260601.pdf","ind":"9.20.Rituximab 注射劑(如 Mabthera，不同劑型之適用範圍需符合藥品許可證登載之適應症)：用於抗癌瘤部分(91/4/1、93/1/1、95/3/1、97/2/1、102/1/1、103/2/1、103/9/1、104/6/1、106/9/1、111/6/1、113/2/1、113/12/1、115/5/1、115/6/1)\n1.復發或對化學療效有抗性之低惡度 B 細胞非何杰金氏淋巴瘤。\n（91/4/1）\n2.併用 polatuzumab vedotin或 CHOP 或其他化學療法，用於 CD20抗原陽性之 B 瀰漫性大細胞非何杰金氏淋巴瘤之病患。(93/1/1、95/3/1、113/2/1)\n3.併用 CVP 化學療法，用於未經治療之和緩性（組織型態為濾泡型）B 細胞非何杰金氏淋巴瘤的病人。(95/3/1)\n4.作為濾泡性淋巴瘤患者於接受含 rituximab 誘導化學治療後產生反應(達 partial remission或 complete remission)之病患，若在接受含rituximab 誘導化學治療前有下列情形之一者，得接受 rituximab 維持治療，限用八劑，每三個月使用一劑，最多不超過二年。\n(97/2/1、104/6/1)\n(1)有單一腫瘤直徑超過7公分者；\n(2)有超過三顆腫瘤直徑超過3公分者；\n(3)脾臟腫大，其長度超過16公分者；\n(4)對 vitalorgans 造成擠壓者；\n(5)周邊血中出現淋巴球增生超過5000/mm3者；\n(6)出現任一系列血球低下者(platelet<100,000/mm3，或 Hb<10gm/dL，或 absolute neutrophil count<1500/mm3)。\n5.慢性淋巴球性白血病：(103/2/1、111/6/1)\n(1)Rai StageⅢ/Ⅳ(或 Binet C級)之 CLL 病人。若用於 RaiStageⅠ/Ⅱ(或 Binet A/B級)併有疾病相關免疫性症候(如自體免疫性溶血、免疫性血小板低下紫瘢症等)的病人時，需經過至少一種標準的烷化基劑治療無效或病情惡化者，且 CD20陽性細胞須大於50%。\n（Rixathon 不受「需經過一種標準的烷化基劑治療無效或病情惡化，且 CD20陽性細胞須大於50%」限制，僅須符合具 CD20陽性細胞即可使用，做為第一線用藥需與 fludarabine 及 cyclophosphamide併用）(111/6/1)\n(2)與化學療法併用，做為復發或頑固性的 CD20陽性慢性淋巴球性白血病病患的治療用藥，且 CD20陽性細胞須大於50%。 （Rixathon 不受「CD20陽性細胞須大於50%」限制，僅須符合具 CD20陽性細胞即可使用）(111/6/1)\n(3)初次申請最多六個（月）療程，再次申請以三個療程為限。\n6.與類固醇併用，治療嗜中性白血球細胞質抗體(ANCA)陽性之肉芽腫性血管炎及顯微多發性血管炎病人：(103/9/1)\n(1)需經事前審查核准後使用，診斷需有病理報告確定及血清學檢驗結果。\n(2)初次發作之肉芽腫性血管炎及顯微多發性血管炎，經cyclophosphamide 治療4週以上但療效不佳者。\n(3)復發之肉芽腫性血管炎(GPA，或稱為韋格納肉芽腫症 Wegener’sgranulomatosis)及顯微多發性血管炎(MPA)，先前曾接受過cyclophosphamide 治療者。\n(4)對 cyclophosphamide 治療無法耐受且有具體事證，或具使用禁忌之肉芽腫性血管炎及顯微多發性血管炎。\n(5)每次申請，以治療4週之療程為限。復發時可再次申請。\n註：原發(初次發作)之肉芽腫性血管炎及顯微多發性血管炎，經cyclophosphamide 治療4週以上但療效不佳者之定義為：\n經 cyclophosphamide 治療4週以上，但至少有一項受侵犯的主要器官症狀未能改善，包括:A 肺部B 腎臟C 神經系統D 腸胃道系統申請時需檢附病歷及病理及影像資料等，經專科醫師事前審查同意後使用。\n7.合併 bendamustine 適用於先前未曾接受治療的 CD20陽性、第 III/IV期和緩性非何杰金氏淋巴瘤。(113/12/1)\n8.合併 bendamustine 用於先前未曾接受治療且不適合自體幹細胞移植的第 III/IV 期被套細胞淋巴瘤。(113/12/1)\n9.Rituximab(限使用 Rixathon)合併 lenalidomide(限使用 Revlimid)用於先前曾接受至少一線全身性治療之復發性或難治性濾泡性淋巴瘤成人病人，需符合 lenalidomide 之藥品給付規定。 （115/5/1）\n10.使用於1、4、5、6、7、8及9病人時，需經事前審查核准後使用，使用Rixathon 用於1、4、5之病人除外。(102/1/1、103/2/1、103/9/1、113/12/1、115/5/1、115/6/1)","req":"官方條文原文，生效日 2026-06-01｜來源 9.20._20260601.pdf"},{"id":"9.21","name":"Fludarabine","brand":"Fludara","type":"CHEMO","cancers":["白血病","淋巴瘤"],"verbatim":false,"eff":"","src":"","ind":"B細胞CLL（至少一種烷化基劑無效後）；低惡性度B細胞NHL；CLL第一線（Rai III/IV或Binet C，或Rai I/II伴免疫症候）","req":"每3療程評估一次"},{"id":"9.22","name":"Imatinib","brand":"Glivec","type":"TARGETED","cancers":["白血病","GIST","其他"],"verbatim":true,"eff":"2024-06-01","src":"9.22._20240601.pdf","ind":"9.22.Imatinib(如 Glivec)：(91/5/1、93/7/1、97/8/1、99/6/1、100/2/1、102/9/1、113/6/1)附表九之八限用於\n1.治療正值急性轉化期(blast crisis)、加速期或經 ALPHA-干擾素治療無效之慢性期的慢性骨髓性白血病(CML)患者使用。\n2.用於治療初期診斷為慢性骨髓性白血病（CML）的病人。\n3.惡性胃腸道基質瘤(GIST)：\n(1)治療成年人無法手術切除或轉移的惡性胃腸道基質瘤。\n(2)作為成人胃腸道基質瘤完全切除後之術後輔助治療，符合下列一項條件可使用3年，須事前審查核准後使用。(100/2/1、102/9/1)\nA.腫瘤大於10公分。\nB.有絲分裂指數>10/50 HPF(high power field)。\nC.腫瘤大於5公分且有絲分裂指數>5/50 HPF(high power field)。\nD.腫瘤破裂。\n4.治療初診斷為費城染色體陽性急性淋巴性白血病（Ph+ALL)且併用化療之成年人。(99/6/1)\n5.未曾使用 imatinib 治療之成人復發性或難治性費城染色體陽性急性淋巴性白血病(Ph+ALL)之單一療法。(99/6/1)\n6.下列適應症患者必須在第一線的藥物如 hydroxyurea; corticosteroid等無效後，經事前審查核准才可使用，且每6個月需重新申請審查。\n(99/6/1)\n(1)治療患有與血小板衍生生長因子受體（PDGFR)基因重組相關之骨髓發育不全症候群(MDS)/骨髓增生性疾病(MPD)之成人。\n(2)治療嗜伊紅性白血球增加症候群(HES)與/或慢性嗜伊紅性白血病(CEL)且有血小板衍生生長因子受體(PDGFR)基因重組之成人患者，且存在器官侵犯証據者。\n7.治療患有無法手術切除、復發性或轉移性且有血小板衍生生長因子受體(PDGFR)基因重組之隆突性皮膚纖維肉瘤(DFSP)之成人患者。\n(99/6/1)\n8.1~7項規定內之疾病診斷或追蹤若需依據基因檢測報告，則需符合全民健康保險藥品給付規定之通則十二。(113/6/1)","req":"官方條文原文，生效日 2024-06-01｜來源 9.22._20240601.pdf"},{"id":"9.23","name":"Arsenic trioxide","brand":"Asadin","type":"CHEMO","cancers":["白血病"],"verbatim":false,"eff":"","src":"","ind":"急性前骨髓細胞白血病（APL）","req":"無需事前審查"},{"id":"9.24","name":"Gefitinib","brand":"Iressa","type":"TARGETED","cancers":["肺癌"],"verbatim":true,"eff":"2024-06-01","src":"9.24._20240601.pdf","ind":"9.24.Gefitinib(如 Iressa):(93/11/1、96/8/1、96/11/1、100/6/1、101/5/1、101/10/1、103/5/1、106/11/1、 108/6/1、108/11/1、109/4/1、109/6/1、109/10/1、111/2/1、111/4/1、113/3/1、113/6/1)\n1.限單獨使用於\n(1)具有 EGFR-TK 基因突變之局部侵犯性或轉移性(即第ⅢB、ⅢC 或第Ⅳ期)之肺腺癌病患之第一線治療，需檢附 EGFR 基因檢測結果報告，且需符合全民健康保險藥品給付規定之通則十二。(100/6/1、108/6/1、108/11/1、113/6/1)\n(2)先前已使用過第一線含鉑化學治療，或70歲以上接受過第一線化學治療，但仍局部惡化或轉移之肺腺癌。(96/11/1、100/6/1、111/2/1)\n2.使用注意事項(106/11/1、109/4/1、109/10/1、111/4/1、113/3/1）\n(1)用於第一線用藥：病歷應留存確實患有肺腺癌之病理或細胞檢查報告，及 EGFR-TK 基因突變檢測報告。(100/6/1、106/11/1)\n(2)用於第二線以上用藥：病歷應留存確實患有肺腺癌之病理或細胞檢查報告，並附曾經接受第一線含鉑化學治療，或70歲(含)以上接受過第一線化學治療之證明，及目前又有疾病惡化之影像診斷證明（如胸部 X 光、電腦斷層或其他可作為評估的影像），此影像證明以可測量（measurable）的病灶為優先，如沒有可以測量的病灶，則可評估（evaluable）的病灶亦可採用。(96/11/1、100/6/1、101/10/1、106/11/1)\n(3)每次處方以4週為限，再次處方時需於病歷記錄治療後相關臨床資料，如每4週需追蹤胸部 X 光或電腦斷層等影像檢查，每8至12週需進行完整療效評估（如胸部 X 光或電腦斷層）。(101/5/1、106/11/1)\n(4)本藥品與 erlotinib 及 afatinib 不得併用。(96/8/1、103/5/1、109/4/1)\n(5)本藥品於第一線使用時，與 osimertinib、dacomitinib 及bevacizumab 併用 erlotinib 之治療組合僅得擇一使用，除因耐受性不良，不得互換。(109/6/1、109/10/1、111/4/1、113/3/1)\nⅠ.如需更換使用 osimertinib，必須符合 osimertinib 第一線使用於具有 EGFR Exon 19 Del 基因突變且具腦轉移之轉移性（第Ⅳ期）肺腺癌之限制。(109/6/1、111/4/1)\nⅡ.如需更換使用 dacomitinib，必須符合 dacomitinib 第一線使用於具有 EGFR-TK Exon 19 Del 或 Exon 21 L858R 點突變，且無腦轉移(non-CNS)之局部侵犯性或轉移性肺腺癌之限制。\n(109/10/1）Ⅲ.如需更換使用 bevacizumab 併用 erlotinib 之治療組合，必須符合 bevacizumab 第一線使用於具有 EGFR Exon 21 L858R 突變且腦轉移之無法手術切除的轉移性（第Ⅳ期）非鱗狀非小細胞肺癌肺腺癌之限制。(113/3/1)","req":"官方條文原文，生效日 2024-06-01｜來源 9.24._20240601.pdf"},{"id":"9.25","name":"Temozolomide","brand":"Temodal","type":"CHEMO","cancers":["腦腫瘤"],"verbatim":false,"eff":"","src":"","ind":"手術/放療後復發之AA、GBM、退行性寡樹突膠質細胞瘤；新診斷GBM（+放療，後輔助性治療）","req":"需事前審查（每3個月申請一次）"},{"id":"9.26","name":"Pemetrexed","brand":"Alimta","type":"CHEMO","cancers":["肺癌","間皮瘤"],"verbatim":true,"eff":"2025-10-01","src":"9.26._20251001.pdf","ind":"9.26.Pemetrexed(如Alimta)：(95/3/1、95/7/1、97/11/1、98/9/1、103/4/1、103/9/1、106/11/1、111/2/1、114/6/1、114/8/1、114/10/1)\n1.限用於\n(1)與cisplatin併用於惡性肋膜間質細胞瘤。\n(2)以含鉑之化學療法治療或70歲以上接受過第一線化學治療，但仍失敗之局部晚期或轉移性非小細胞肺癌病患(顯著鱗狀細胞組織型除外)之單一藥物治療。(95/7/1、97/11/1、98/9/1、111/2/1)\n(3)與含鉑類之化學療法併用，作為治療局部晚期或轉移性非小細胞肺癌(顯著鱗狀細胞組織型除外 )之第一線化療用藥，且限用於ECOG為0~1之病患。(98/9/1)\n(4)pemetrexed(限使用 Pexeda、Apeta 或 Pemetrexed Sandoz)與pembrolizumab 與含鉑類之化學療法併用於轉移性，不具有EGFR/ALK/ROS-1腫瘤基因異常的非鱗狀非小細胞肺癌的第一線治療，患者需符合免疫檢查點抑制劑之藥品給付規定。(114/6/1、114/8/1)\n(5)與 amivantamab 及 carboplatin 併用於罹患帶有表皮生長因子受體(EGFR) exon 20插入突變之局部晚期或轉移性非小細胞肺癌(NSCLC)的成人病人，作為第一線治療。(114/10/1)\n2.每4個療程需進行療效評估，病歷應留存評估紀錄，無疾病惡化方可繼續使用。(103/4/1、103/9/1、106/11/1)","req":"官方條文原文，生效日 2025-10-01｜來源 9.26._20251001.pdf"},{"id":"9.27","name":"Cetuximab","brand":"Erbitux","type":"TARGETED","cancers":["大腸直腸癌","頭頸癌"],"verbatim":true,"eff":"2026-05-01","src":"9.27._20260501.pdf","ind":"9.27.Cetuximab(如 Erbitux)：(96/3/1、98/7/1、98/8/1、99/10/1、101/12/1、104/11/1、106/1/1、106/4/1、107/6/1、110/6/1、111/2/1、112/12/1、113/6/1、115/2/1、115/5/1)\n1.直腸結腸癌治療部分：\n(1)與 FOLFIRI（Folinic acid/ 5-fluorouracil/irinotecan）或FOLFOX（Folinic acid/ 5-fluorouracil/oxaliplatin）合併使用於治療 RAS 原生型(wild-type)之轉移性直腸結腸癌病人之第一線治療。需檢附 All-RAS 基因突變分析檢測報告，且需符合全民健康保險藥品給付規定之通則十二。(101/12/1、104/11/1、106/1/1、110/6/1、113/6/1、115/2/1)\nⅠ.本藥品須經事前審查核准後使用，每次申請之療程以18週為限，再次申請必須提出客觀證據(如：影像學)證實無惡化，才可繼續使用。\nⅡ.Cetuximab 與 panitumumab 二者僅能擇一使用。 (101/12/1、106/1/1、107/6/1、115/2/1)\nⅢ.本藥品不得與 bevacizumab 併用。\nⅣ.經手術完全切除(R0切除)且查無轉移病灶者不得申請給付。\n(115/2/1)\n(2)與 encorafenib 併用，作為具有 BRAF V600E突變且 RAS 基因沒有突變的轉移性結腸直腸癌成人病人之第二線治療：(115/5/1)\nⅠ.病人須符合 encorafenib 之藥品給付規定，且未曾申報抗表皮生長因子受體(anti-EGFR)藥品之病人使用。\nⅡ.須經事前審查核准後使用，初次申請之療程以12週為限，之後每12週申請一次，再次申請時必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。\nⅢ.使用總療程以24週為上限。\nⅣ.使用本品併用 encorafenib 作為第二線治療，不得再申請抗表皮生長因子受體(anti-EGFR)藥品作為後續治療。\n(3)與 irinotecan 合併使用，治療已接受過含5-fluorouracil、irinotecan 及 oxaliplatin 二線以上之細胞毒性治療失敗、具有表皮生長因子受體(EGFR)表現型且 K-RAS 基因沒有突變的轉移性直腸結腸癌的病人，且於115年1月31日前經審核同意用藥，後續評估符合續用申請條件者。需檢附 All-RAS 基因突變分析檢測報告，且需符合全民健康保險藥品給付規定之通則十二。(98/8/1、110/6/1、113/6/1、115/2/1)\nⅠ.本藥品須經事前審查核准後使用，每次申請之療程以9週為限，再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。\nⅡ.使用總療程18週為上限。\n2.口咽癌、下咽癌及喉癌治療部分：(98/7/1、99/10/1、111/2/1、115/2/1)\n(1)限與放射線療法合併使用於局部晚期之口咽癌、下咽癌及喉癌病人，且符合下列條件之一：\nⅠ.70歲以上(111/2/1)；\nⅡ.Ccr＜50mL/min；\nⅢ.聽力障礙者(聽力障礙定義為500Hz、1000Hz、2000Hz 平均聽力損失大於25分貝)；\nⅣ.無法耐受 platinum-based 化學治療。\n(2)須經事前審查核准後使用，每位病人每12週申請一次，需無疾病惡化情形方得繼續使用。(98/7/1、115/2/1)\n3.頭頸癌部分(106/1/1、106/4/1、112/12/1、115/2/1)：\n(1)限無法接受局部治療之復發及/或轉移性頭頸部鱗狀細胞癌，且未曾申報 cetuximab 之病人使用。\n(2)須經事前審查核准後使用，每位病人每12週申請一次，需無疾病惡化情形方得繼續使用。(106/4/1、115/2/1)","req":"官方條文原文，生效日 2026-05-01｜來源 9.27._20260501.pdf"},{"id":"9.28","name":"Bortezomib","brand":"Velcade","type":"TARGETED","cancers":["骨髓瘤","淋巴瘤"],"verbatim":true,"eff":"2023-04-01","src":"9.28._20230401.pdf","ind":"9.28.Bortezomib（如 Velcade） ： （96/6/1、98/2/1、99/3/1、99/9/1、100/10/1、101/6/1、105/5/1、109/4/1、109/6/1、111/1/1、112/4/1）附表九之三限用於\n1.合併其他癌症治療藥品使用於多發性骨髓瘤病人：(99/3/1、100/10/1、101/6/1、109/4/1、109/6/1、111/1/1、112/4/1)\n(1) 每人終生以16個療程為上限。(99/9/1、109/4/1、109/6/1、111/1/1、112/4/1）\n(2)需經事前申請後使用，每次申請4個療程。 （101/6/1）\n(3) 開始治療時病患須同時符合下列Ⅰ.與Ⅱ.的條件： （112/4/1）Ⅰ.骨髓漿細胞(plasma cells)比例≧10%，或是經切片確認且有≧1顆的plasmacytoma。\nⅡ.出現下列任一臨床症狀：\no.腎功能不全：serum creatinine＞2.0mg/dL 或 estimated GFR (eGFR)＜40\nml/min，且無其他原因可以解釋。\np.高血鈣(corrected serum calcium＞11.0 mg/dL 或 2.75 mmol/L)。\niii.貧血(Hemoglobin＜10 gm/dL 且無其他原因可以解釋)。\niv.影像檢查確認之 osteolytic bone lesion(s)。\nv.骨髓漿細胞(plasma cells)比例≧60%。\nvi.Serum free light-chain ratio≧100。\n(4)使用4個療程後，必須確定藥物使用後 paraprotein (M-protein)未上升 (即表示為 response 或 stable status)，或對部分 non-secretory type MM 病人以骨髓檢查 plasma cell 之比率為療效依據，方可繼續使用。 （101/6/1、109/4/1）\n(5)若病患於前線療程符合前項規定(4)之療效而醫師決定可暫時停藥，則後續療程可保留，於疾病復發時，再行申請使用。 （101/6/1、109/4/1）\n(6) 112年3月31日以前已核定用藥之病人，得經事前審查核准後，使用至總療程上限（即終生16個療程）或使用期間發生疾病惡化為止。 （112/4/1）\n2.被套細胞淋巴瘤（Mantle Cell Lymphoma, MCL）病人：(98/2/1、105/5/1)\n(1)每人以8個療程為上限。(99/9/1)\n(2)每日最大劑量1.5mg/m2/day；每個療程第1,4,8,11日給藥。\n(3)第一線使用過復發者，不得申請再次使用。(105/5/1)\n(4)需經事前審查核准後使用。","req":"官方條文原文，生效日 2023-04-01｜來源 9.28._20230401.pdf"},{"id":"9.29","name":"Erlotinib","brand":"Tarceva","type":"TARGETED","cancers":["肺癌"],"verbatim":true,"eff":"2025-04-01","src":"9.29._20250401.pdf","ind":"9.29.Erlotinib（如 Tarceva）：（96/6/1、96/8/1、97/6/1、101/5/1、101/10/1、102/4/1、102/11/1、103/5/1、106/11/1、108/6/1、108/11/1、109/4/1、109/6/1、109/10/1、111/2/1、111/4/1、113/3/1、113/6/1、113/9/1、113/10/1、114/3/1、114/4/1）\n1.限單獨使用於\n(1)適用於具有 EGFR-TK 突變之局部侵犯性或轉移性(即第ⅢB、ⅢC 或第Ⅳ期)之肺腺癌病患之第一線治療，需檢附 EGFR 基因檢測結果報告，且需符合全民健康保險藥品給付規定之通則十二。(102/11/1、108/6/1、108/11/1、113/6/1）\n(2)已接受4個週期 platinum 類第一線化學療法後，腫瘤範圍穩定(stable disease，不含 partial response或 complete response)\n之局部晚期或轉移性肺腺癌的維持療法。(102/4/1)\n(3)先前已使用過 platinum 類第一線化學治療，或70歲以上接受過第一線化學治療，但仍局部惡化或轉移之腺性非小細胞肺癌之第二線用藥。 （97/6/1、111/2/1）\n(4)先前已使用過 platinum 類及 docetaxel 或 paclitaxel 化學治療後，但仍局部惡化或轉移之非小細胞肺癌之第三線用藥。\n2.Erlotinib 與 bevacizumab(除 Zirabev 以外)併用，作為無法手術切除的轉移性（第Ⅳ期）且帶有表皮生長因子受體(EGFR) Exon 21 L858R活性化突變之腦轉移非鱗狀非小細胞肺癌病患的第一線治療。\n(113/3/1、113/9/1、114/3/1、114/4/1）\n3.使用注意事項(106/11/1、109/4/1、109/10/1、111/4/1）\n(1)用於已接受 platinum 類第一線化學療法後，病情穩定之維持療法：\n病歷應留存確實患有肺腺癌之病理或細胞檢查報告，並附已接受4個週期 platinum 類第一線化學療法後，腫瘤範圍穩定(stabledisease，不含 partial response或 complete response)之影像診斷證明（如胸部 X 光、電腦斷層或其他可作為評估的影像）。\n(102/4/1、106/11/1)\n(2)用於第二線用藥：病歷應留存確實患有非小細胞肺癌之病理或細胞檢查報告，並附曾經接受 platinum 類第一線化學治療，或70歲(含)以上接受過第一線化學治療之證明，及目前又有疾病惡化之影像診斷證明（如胸部 X 光、電腦斷層或其他可作為評估的影像），此影像證明以可測量（measurable）的病灶為優先，如沒有可以測量的病灶，則可評估（evaluable）的病灶亦可採用。（97/6/1、106/11/1）\n(3)用於第三線用藥：病歷應留存確實患有非小細胞肺癌之病理或細胞檢查報告，並附曾經接受第一線及第二線化學藥物如platinum(cisplatin 或 carboplatin)與 taxane(paclitaxel 或docetaxel)治療之證明，及目前又有疾病惡化之影像診斷證明（如胸部 X 光、電腦斷層或其他可作為評估的影像），此影像證明以可測量（measurable）的病灶為優先，如沒有可以測量的病灶，則可評估（evaluable）的病灶亦可採用。 （97/6/1、106/11/1）\n(4)每次處方以4週為限，再次處方時需於病歷記錄治療後相關臨床資料，如每4週需追蹤胸部 X 光或電腦斷層等影像檢查，每8至12週需進行完整療效評估（如胸部 X 光或電腦斷層） 。(101/5/1、106/11/1)\n(5)本藥品與 gefitinib 及 afatinib 不得併用。(103/5/1、109/4/1)\n(6)本藥品於第一線使用時，與 osimertinib 及 dacomitinib 僅得擇一使用，除因耐受性不良，不得互換。(109/6/1、109/10/1、111/4/1、113/10/1)\nⅠ.如需更換使用 osimertinib，必須符合 osimertinib 第一線使用於具有 EGFR Exon 19 Del或 Exon 21 L858R基因突變之局部侵犯性或轉移性（即為 IIIB、IIIC 期或第Ⅳ期）肺腺癌病患之限制。\n(109/6/1、111/4/1、113/10/1)\nⅡ.如需更換使用 dacomitinib，必須符合 dacomitinib 第一線使用於具有 EGFR-TK Exon 19 Del或 Exon 21 L858R點突變，且無腦轉移(non-CNS)之局部侵犯性或轉移性肺腺癌之限制。\n(109/10/1）備註1：非小細胞肺癌病患的第二線治療用藥之定義為：病患需先經第一線含鉑化學治療，或70歲(含)以上接受過第一線化學治療後，因疾病惡化，此時所給予之治療即為第二線用藥。（97/6/1）備註2：非小細胞肺癌病患的第三線治療用藥之定義為：病患需先經第一線化學藥物治療後，因疾病惡化，再經第二線不同的化學藥物治療之後，若疾病再度惡化，此時所給予之治療即為第三線用藥。","req":"官方條文原文，生效日 2025-04-01｜來源 9.29._20250401.pdf"},{"id":"9.30","name":"Dasatinib","brand":"Sprycel","type":"TARGETED","cancers":["白血病"],"verbatim":true,"eff":"2026-02-01","src":"9.30._20260201.pdf","ind":"9.30.Dasatinib(如 Sprycel)：(98/1/1、102/4/1、104/12/1、110/5/1、113/6/1、115/2/1)\n限用於\n1.第一線使用(102/4/1、104/12/1、110/5/1)：\n(1)治療新診斷的費城染色體陽性之慢性期慢性骨髓性白血病的成人。\n(2)併用化療適用於新診斷費城染色體陽性急性淋巴性白血病(Ph+ ALL)之1歲以上兒童病人，無疾病惡化時的維持治療限使用2年。(110/5/1)\n2.第二線使用(104/12/1)：\n(1)治療患有慢性、加速或急性期慢性骨髓性白血病，對先前經 imatinib 400mg(含)\n以上治療後有抗藥性或無耐受性的成人。\n(2)治療患有費城染色體陽性急性淋巴性白血病，且對先前經 imatinib 400mg(含)以上治療後有抗藥性或無耐受性的成人。\n(3)需檢送病歷及對 imatinib 耐受性不良或無效的證明(104/12/1)。\n3.治療患有慢性期費城染色體陽性慢性骨髓性白血病(Ph+ CML) 之1歲以上的兒童病人。(110/5/1)\n4.1~3項規定內之疾病診斷或追蹤若需依據基因檢測報告，則需符合全民健康保險藥品給付規定之通則十二。(113/6/1)\n5.Dasatinib、nilotinib 與 bosutinib 不得合併使用。(115/2/1)","req":"官方條文原文，生效日 2026-02-01｜來源 9.30._20260201.pdf"},{"id":"9.31","name":"Sunitinib","brand":"Sutent","type":"TARGETED","cancers":["GIST","腎細胞癌","胰臟神經內分泌腫瘤"],"verbatim":true,"eff":"2021-12-01","src":"9.31._20211201.pdf","ind":"9.31.Sunitinib（如 Sutent）：（98/2/1、98/5/1、99/1/1、99/2/1、101/5/1、102/1/1、104/12/1、110/12/1）\n1.腸胃道間質腫瘤：\n(1)限用於以 imatinib 治療期間出現疾病惡化或對該藥出現不能忍受之腸胃道間質腫瘤(99/2/1)。\n(2)若使用本藥品出現疾病惡化或無法忍受其副作用，不得替換使用 imatinib治療(99/2/1)。\n(3)需經事前審查核准後使用，送審時須檢送病歷及對 imatinib 耐受性不良或無效之證明。（98/5/1）(99/2/1)\n2.晚期腎細胞癌：（99/1/1、110/12/1）\n(1)可用於第一線治療晚期或轉移性腎細胞癌，即病理上為亮細胞癌(clearcell renal carcinoma)。\n(2)無效後則不給付 temsirolimus。（110/12/1 ）\n(3)需檢送影像資料，每三個月評估一次。(104/12/1)\n(4)病人若對藥物產生耐受性不佳 （intolerance） ，則以原來藥物減量為原則，若嚴重耐受性不佳，可以換其他 TKI。\n3.進展性，無法切除或轉移性分化良好之胰臟神經內分泌腫瘤的成人病患，須同時符合下列條件：(101/5/1）\n(1)符合 WHO 2010 分類方式之 G1 or G2 胰臟神經內分泌瘤。\n(2)於一年內影像檢查證實有明顯惡化者。\n(3)不可合併使用化學治療或相關標靶藥物。（102/1/1）\n(4)經事前專案審查核准後使用，且需每 3 個月評估一次。","req":"官方條文原文，生效日 2021-12-01｜來源 9.31._20211201.pdf"},{"id":"9.32.1","name":"Nilotinib 200mg","brand":"Tasigna 200mg","type":"TARGETED","cancers":["白血病"],"verbatim":true,"eff":"2026-02-01","src":"9.32.1._20260201.pdf","ind":"9.32.Nilotinib： （98/6/1、99/1/1、101/7/1、113/6/1、115/2/1）附表九之六\n9.32.1.Nilotinib 200mg(如 Tasigna 200mg)（98/6/1、99/1/1、104/12/1、113/6/1、115/2/1）\n1.限用於治療對 imatinib 400MG(含)以上耐受性不良或治療無效的「慢性期或加速期費城染色體(Philadelphia chromosome)陽性的慢性骨髓性白血病(CML)成年患者」。\n2.必須檢附耐受性不良或治療無效的證明。(104/12/1)\n3.Nilotinib、dasatinib 與 bosutinib不得合併使用。 （98/6/1、99/1/1、104/12/1、115/2/1)\n4.1~2項規定內之疾病診斷或追蹤若需依據基因檢測報告，則需符合全民健康保險藥品給付規定之通則十二。(113/6/1)","req":"官方條文原文，生效日 2026-02-01｜來源 9.32.1._20260201.pdf"},{"id":"9.32.2","name":"Nilotinib 150mg","brand":"Tasigna 150mg","type":"TARGETED","cancers":["白血病"],"verbatim":true,"eff":"2024-06-01","src":"9.32.2._20240601.pdf","ind":"9.32.2.Nilotinib 150mg(如Tasigna 150mg)：(101/7/1、104/12/1、113/6/1)\n1.限用於新確診之慢性期費城染色體陽性的慢性骨髓性白血病。\n(104/12/1)\n2.疾病診斷或追蹤若需依據基因檢測報告，則需符合全民健康保險藥品給付規定之通則十二。(113/6/1)","req":"官方條文原文，生效日 2024-06-01｜來源 9.32.2._20240601.pdf"},{"id":"9.33","name":"Thalidomide","brand":"Thado","type":"TARGETED","cancers":["骨髓瘤"],"verbatim":false,"eff":"","src":"","ind":"新診斷多發性骨髓瘤（+prednisolone+oral melphalan，或+骨髓移植）","req":"無需事前審查"},{"id":"9.34","name":"Sorafenib","brand":"Nexavar","type":"TARGETED","cancers":["腎細胞癌","肝細胞癌","甲狀腺癌"],"verbatim":true,"eff":"2025-06-01","src":"9.34._20250601.pdf","ind":"9.34.Sorafenib(如 Nexavar)：(98/10/1、100/6/1、101/8/1、104/12/1、105/11/1、106/1/1、107/7/1、108/6/1、108/12/1、109/1/1、112/8/1、114/2/1、114/6/1)\n1.晚期腎細胞癌部分：\n(1)晚期腎細胞癌且已接受 interferon-alpha 或 interleukin-2治療失敗，或不適合以上兩種藥物治療之病患。不適合以上兩種藥物治療之病患，須符合 cytokine 禁忌症者得直接使用 sorafenib。但須列舉出所符合之禁忌症及檢附相關證明。(100/6/1)\n(2)無效後則不給付 temsirolimus。(108/12/1)\n(3)需檢送影像資料，每3個月評估一次。(104/12/1)\n2.晚期肝細胞癌部分：(101/8/1、105/11/1、108/6/1、109/1/1、112/8/1、114/2/1、114/6/1)\n(1)轉移性或無法手術切除且不適合局部治療或局部治療失敗之 Child-Pugh A class晚期肝細胞癌成人患者，並符合下列條件之一：\nⅠ.肝外轉移（遠端轉移或肝外淋巴結侵犯）。\nⅡ.大血管侵犯（腫瘤侵犯主門靜脈或侵犯左/右靜脈第一或第二分支）III.經導管動脈化學藥物栓塞治療（Transcatheter arterial chemoembolization,T.A.C.E.）失敗者，需提供患者於12個月內>=3次局部治療之記錄。\n(2)需經事前審查核准後使用，初次申請之療程以3個月為限，之後每3個月評估一次。送審時需檢送影像資料，無疾病惡化方可繼續使用。\n(101/8/1、114/6/1)\n(3)每日至多處方4粒。\n(4)Sorafenib、lenvatinib、atezolizumab 併用 bevacizumab、tremelimumab 併用 durvalumab 僅得擇一給付，不得互換。\n(109/1/1、112/8/1、114/2/1)\n3.用於放射性碘治療無效之局部晚期或轉移性的進行性(progressive)分化型甲狀腺癌(RAI-RDTC)：(106/1/1)\n(1)放射性碘治療無效之局部晚期或轉移性的進行性(progressive)分化型甲狀腺癌。\n(2)需經事前審查核准後使用，每次申請之療程以3個月為限，送審時需檢送影像資料，每3個月評估一次。\n(3)Sorafenib 與 lenvatinib不得合併使用。(107/7/1)","req":"官方條文原文，生效日 2025-06-01｜來源 9.34._20250601.pdf"},{"id":"9.35","name":"Carmustine 植入劑","brand":"Gliadel","type":"CHEMO","cancers":["腦腫瘤"],"verbatim":false,"eff":"","src":"","ind":"復發性多形神經膠母細胞瘤手術輔助（不得與temozolomide併用）","req":"需事前審查"},{"id":"9.36.1","name":"Everolimus","brand":"Afinitor","type":"TARGETED","cancers":["腎細胞癌","胰臟神經內分泌腫瘤","乳癌"],"verbatim":false,"eff":"","src":"","ind":"VEGF標靶治療無效晚期腎細胞癌；胰臟神經內分泌腫瘤（G1/G2，12個月內惡化）；無法切除/晚期/轉移性胃腸道或肺部非功能性神經內分泌腫瘤；+exemestane用於停經後HR+/HER2-轉移性乳癌（non-steroidal AI無效後）\n★使用本品無效後不得申請CDK4/6抑制劑","req":"腎細胞癌外需事前審查"},{"id":"9.36.2","name":"Everolimus","brand":"Votubia","type":"TARGETED","cancers":["結節性硬化症"],"verbatim":false,"eff":"","src":"","ind":"結節性硬化症（TSC）合併SEGA（不適合手術）；TSC合併腎血管肌脂肪瘤（直徑≥4cm且有出血風險）","req":"需事前審查；每6個月評估"},{"id":"9.37","name":"Bevacizumab","brand":"Avastin","type":"TARGETED","cancers":["大腸直腸癌","腦腫瘤","卵巢癌","子宮頸癌","肺癌","肝細胞癌"],"verbatim":true,"eff":"2025-10-01","src":"9.37._20251001.pdf","ind":"9.37. Bevacizumab(如 Avastin)： （100/6/1、101/05/1、106/4/1、108/3/1、109/6/1、112/8/1、113/3/1、113/6/1、113/9/1、114/3/1、114/4/1、114/6/1、114/8/1、114/10/1)\n1.轉移性大腸或直腸癌：\n(1)Bevacizumab與 FOLFIRI（Folinicacid/5-fluorouracil/irinotecan）或 FOLFOX（Folinicacid/5-fluorouracil/oxaliplatin）或5-fluorouracil/leucovorin 的化學療法合併使用，作為轉移性大腸或直腸癌患者的第一線治療。\n(108/3/1)\nⅠ.使用總療程以36週為上限(106/4/1)。\nⅡ.須經事前審查核准後使用，每次申請事前審查之療程以18週為限，再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。(106/4/1)\nⅢ.本藥品不得與 cetuximab、panitumumab 併用。(108/3/1、113/3/1)\n(2)Bevacizumab(除 Zirabev 以外)與含有5-fluorouracil/leucovorin/oxaliplatin 的化學療法合併使用，作為先前接受過以 fluoropyrimidine 為基礎的化學療法併用 cetuximab或 panitumumab 無效且未曾接受過 bevacizumab 治療，RAS 基因沒有突變的轉移性大腸或直腸癌病人的第二線治療。(114/3/1、114/4/1)\nⅠ.需檢附依全民健康保險醫療服務給付項目及支付標準伴隨式診斷編號30104B 規定之認證實驗室檢驗之 All-RAS 基因突變分析檢測報告。\nⅡ.使用總療程以24週為上限。\nⅢ.須經事前審查核准後使用，每次申請事前審查之療程以12週為限，再次申請必須提出客觀證據（如：RECIST criteria）證實無惡化，才可繼續使用。\nⅣ.使用劑量：限5mg/kg，每兩週一次。\n2.惡性神經膠質瘤(WHO 第4級)-神經膠母細胞瘤：\n(1)單獨使用可用於治療曾接受標準放射線治療且含 temozolomide 在內之化學藥物治療失敗之多型性神經膠母細胞瘤(Glioblastomamultiforme)復發之成人患者。(101/05/1)\n(2)須經事前審查核准後使用，每次申請事前審查之療程以12週為限，再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。\n3.卵巢上皮細胞、輸卵管或原發性腹膜癌：(109/6/1、113/3/1、113/9/1、114/3/1、114/4/1、114/6/1、114/8/1、114/10/1)\n(1) Bevacizumab（除 Zirabev 以外）與 carboplatin 及 paclitaxel 合併使用，接著單獨使用 bevacizumab（除 Zirabev 以外）治療，作為第四期卵巢上皮細胞、輸卵管或原發性腹膜癌病人接受初次手術切除後之第一線治療之維持治療。(113/3/1、113/9/1、114/3/1、114/4/1、114/6/1、114/10/1)\nⅠ.初次申請為手術後一個月後起與化學治療併用5個療程。\nⅡ.第二次申請時為接續單獨使用 bevacizumab 維持性治療9個療程。\nⅢ.第三次申請時為接續單獨使用 bevacizumab 維持性治療8個療程。\nⅣ.每人以總共給付22個療程為上限。若病情惡化或停藥後再復發即不得再次申請。\n(2)Bevacizumab與 carboplatin 及 paclitaxel 合併使用，作為曾接受過第一線含鉑類藥物(Platinum-based)化學治療間隔6-12個月內再復發之治療。接著單獨使用 bevacizumab 治療，作為含鉑藥物具感受性之治療。\nⅠ.若前曾申請 bevacizumab 使用於卵巢上皮細胞、輸卵管或原發性腹膜癌作為第一線治療者不可再次使用。(113/3/1)\nⅡ.初次申請為5個療程，後續每次申請為5個療程，總申請療程以15個療程為上限。(113/3/1)\n(3)Bevacizumab(限使用 Alymsys、Abevmy、Vegzelma 或 Mvasi)與olaparib 併用適用於晚期高度惡性上皮卵巢癌、輸卵管腫瘤或原發性腹膜癌，且對第一線含鉑化療合併 bevacizumab 有反應（完全反應或部分反應）之成年病人做為維持治療，患者需符合 olaparib 給付規定，限用兩年。bevacizumab 以15個月的療程為上限。\n(114/6/1、114/8/1)\n(4)須經事前審查核准後使用，再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。\n(5)FIGO Stage IV disease具 germline or somatic BRCA 1/2致病性或疑似致病性突變者，若已經申請 niraparib 用於第一線化學治療後維持性治療時不得另外申請 bevacizumab 併用，除因 niraparib 耐受性不良，在維持性治療可再換成 bevacizumab（除 Zirabev 以外）單獨使用，總申請療程以17個療程為上限。(113/3/1、113/9/1、114/3/1、114/4/1、114/6/1、114/10/1)\n4.持續性、復發性或轉移性之子宮頸癌：(109/6/1、113/3/1)\n(1)Bevacizumab與 cisplatin 及 paclitaxel 合併使用，可用於持續性、復發性或轉移性之子宮頸癌。\n(2)Bevacizumab與 paclitaxel 及 topotecan 合併使用，作為無法接受含鉑類藥物治療患者之持續性、復發性或轉移性之子宮頸癌。\n(3)須經事前審查核准後使用，每次申請事前審查之療程以15週為限，再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。(113/3/1)\n5.晚期、轉移性或復發性非鱗狀非小細胞肺癌(除 Zirabev 以外)：\n(113/3/1、113/6/1、113/9/1、114/3/1、114/4/1)\n(1)Bevacizumab 與 erlotinib 併用，作為無法手術切除的轉移性(第Ⅳ期)且帶有表皮生長因子受體(EGFR) Exon 21 L858R活化性突變之腦轉移非鱗狀非小細胞肺癌病患的第一線治療。\n(2)須經事前審查核准後使用：\nⅠ.每次申請之療程以 12 週為限。\nⅡ.初次申請時需檢附表皮生長因子受體(EGFR) Exon 21 L858R活化性突變檢測報告，且需符合全民健康保險藥品給付規定之通則十二。\nⅢ.再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。\n(3)Bevacizumab併用 erlotinib 於第一線治療時，該治療組合與gefitinib、afatinib 僅得擇一使用，除因耐受性不良，不得互換。\n(4)使用劑量：限7.5mg/kg，每三週1次。\n6.與 atezolizumab 併用適用於未曾使用過全身性治療用藥之轉移性或無法手術切除且不適合局部治療或局部治療失敗之 Child-Pugh A class晚期肝細胞癌，患者需符合 atezolizumab 之藥品給付規定。(112/8/1)\n7. Bevacizumab(限使用 Alymsys、Avastin、Abevmy、Vegzelma 或Mvasi)與 atezolizumab 及 carboplatin、paclitaxel 併用於轉移性非鱗狀非小細胞肺癌第一線治療，患者需符合免疫檢查點抑制劑之藥品給付規定。(114/6/1、114/8/1)","req":"官方條文原文，生效日 2025-10-01｜來源 9.37._20251001.pdf"},{"id":"9.38","name":"Temsirolimus","brand":"Torisel","type":"TARGETED","cancers":["腎細胞癌"],"verbatim":false,"eff":"","src":"","ind":"高風險晚期腎細胞癌（具≥3個Motzer風險因子）","req":"需事前審查（每3個月評估）"},{"id":"9.39","name":"Flutamide / Buserelin","brand":"","type":"HORMONE","cancers":["攝護腺癌"],"verbatim":false,"eff":"","src":"","ind":"晚期攝護腺癌；根除術後PSA升高；T2/T3術前/放療前新輔助治療","req":"無需事前審查"},{"id":"9.40","name":"Bicalutamide","brand":"","type":"HORMONE","cancers":["攝護腺癌"],"verbatim":false,"eff":"","src":"","ind":"與LHRH類似劑/手術去勢療法併用於進展性攝護腺癌","req":"無需事前審查"},{"id":"9.41","name":"Pazopanib","brand":"Votrient","type":"TARGETED","cancers":["腎細胞癌","軟組織肉瘤"],"verbatim":true,"eff":"2023-10-01","src":"9.41._20231001.pdf","ind":"9.41.Pazopanib（如 Votrient）：（101/8/1、104/4/1、106/3/1、110/12/1、112/10/1）附表九之十三\n1.腎細胞癌： （106/3/1、110/12/1）\n(1)可用於第一線治療晚期或轉移性腎細胞癌，其病理上為亮細胞癌(clear cell renal carcinoma)。\n(2)本品使用無效後，不得申請使用 temsirolimus。（110/12/1）\n(3)需檢送影像資料，每三個月評估一次。(106/3/1)\n(4)病人若對藥物產生耐受性不佳（intolerance） ，則以原來藥物減量為原則，若嚴重耐受性不佳，可以換其他 TKI。\n2.軟組織肉瘤： （104/4/1、112/10/1）\n(1)用於治療先前曾接受化療失敗的晚期軟組織肉瘤(STS)患者。其病情若能接受手術治療者，須先經手術治療。\n(2)須排除胃腸道基質瘤、脂肪惡性肉瘤、橫紋肌惡性肉瘤、軟骨惡性肉瘤、骨性惡性肉瘤、依文氏(Ewing’s sarcoma)惡性肉瘤、原發性神經外胚層腫瘤(primitive neuroectodermal tumor)或突起性表皮纖維惡性腫瘤(dermatofibrosarcoma protuberance)的患者。 （104/4/1、112/10/1）\n(3)須經事前審查核准後使用，每次申請療程以三個月為限，每三個月需再次申請。(須檢附影像學報告)\n附表九之三全民健康保險使用抗癌藥品 Bortezomib 申請表申請類別: □送核□補資料□申復□資料異動 受理日期： 受理編號： 緊急傳真日期：\n醫療機構名稱 保險對象姓名 出生 原受理編號（申復時填用）預定實施日期代號 身分證統一編號 科別 □門診□住院 病歷號碼申請醫師身分證號ICD-10代碼 疾病名稱 使用日期 年月日至年月日藥品名稱及代碼 申請類別 給付規定 用法用量申請數量 保險人核定欄□ 第一次申請□ 治療後再次申請□合併其他癌症治療藥品使用於多發性骨髓瘤病人：\n(1)每人終生以16個療程為上限。\n(2)需經事前申請後使用，每次申請4個療程。\n(3)開始治療時病患須同時符合下列Ⅰ.與Ⅱ.的條件：\nⅠ.骨髓漿細胞(plasma cells)比例≧10%，或是經切片確認且有≧1顆的 plasmacytoma。\nⅡ.出現下列任一臨床症狀：\nⅰ.腎功能不全：serum creatinine＞2.0mg/dL或 estimated GFR (eGFR)＜40 ml/min，且無其他原因可以解釋。\nⅱ.高血鈣(corrected serum calcium＞11.0 mg/dL 或 2.75 mmol/L)。\niii.貧血(Hemoglobin＜10 gm/dL 且無其他原因可以解釋)。\niv.影像檢查確認之 osteolytic bone lesion(s)。\nv.骨髓漿細胞(plasma cells)比例≧60%。\nvi.Serum free light-chain ratio≧100。\n(4)使用4個療程後，必須確定藥物使用後 paraprotein (M-protein)未上升 (即表示為response 或 stable status)，或對部分 non-secretory type MM病人以骨髓檢查plasma cell之比率為療效依據，方可繼續使用。\n(5)若病患於前線療程符合前項規定(4)之療效而醫師決定可暫時停藥，則後續療程可保留，於疾病復發時，再行申請使用。\n(6)112年3月31日以前已核定用藥之病人，得經事前審查核准後，使用至總療程上限（即終生16個療程）或使用期間發生疾病惡化為止。\n□被套細胞淋巴瘤 Mantle Cell Lymphoma（MCL）病人。\n(1)每人以8個療程為上限。\n(2)每日最大劑量1.5mg/m2\n/day；每個療程第1,4,8,11日給藥。\n(3)第一線使用過復發者，不得申請再次使用。\n(4)需經事前審查核准後使用。\n□同意備查。\n□ 使用劑量不符合常規，核定量為□不同意□ 不符合適應症。\n□ 不符合併用二種此類藥物之適應症□ 未附病理切片報告或細胞學檢查報告□ 未附使用其他抗癌藥物無效之記錄□ 未附目前是否為晚期或轉移之病歷□ 未附治療計劃(預計使用上述藥物之劑量及預計使用次數)\n□ 相關檢驗、檢查報告不全(如影像診斷報告或腫瘤標誌)\n□ 補附資料再審，請補充以下資料□ 其他：\n注意事項\n1. 本申請書限一人一案，由本保險特約醫事服務機構填報，不必備文，請逕向保險人各分區業務組申請審核。\n2. 「原受理編號」申復時填寫，初次送核不須填寫。\n3. 應事前審查之項目未依規定事前申請核准者，不予給付費用；事前申請核准之個案，日後如經審定保險對象或醫事服務機構有不符全民健康保險給付規定者，亦不予給付費用。\n4. 對核定結果如有異議，得於收到核定通知之日起六十日內，重行填寫乙份申請書(應勾註申復，並填明原受理編號)向原核定單位申請複核。\n5. 對複核結果如有異議，得於收到複核通知之日起六十日內向全民健康保險爭議審議會申請審議。\n6. 對核定結果有異議者，應循上述申復及爭議審議途徑申請複核或審議，不得以新個案重新申請送核，否則不予受理。\n7. 保險醫事服務機構如因事出緊急，得以書面說明電傳保險人報備後，先行處理治療，並立即備齊應附文件備查。\n保險人日期章戳審查醫師醫事服務機構醫院申請日期： 年 月 日印信 文號：\n承辦人複核科長決行","req":"官方條文原文，生效日 2023-10-01｜來源 9.41._20231001.pdf"},{"id":"9.42","name":"Bendamustine","brand":"Innomustine","type":"CHEMO","cancers":["白血病","淋巴瘤"],"verbatim":true,"eff":"2024-02-01","src":"9.42._20240201.pdf","ind":"9.42.Bendamustine（如 Innomustine）：(101/10/1、103/2/1、108/10/1、113/2/1)\n1.以本品作為第一線治療，限用於 Binet C 級之慢性淋巴性白血病病人(CLL)或 BinetB 級併有免疫性症候(如自體免疫性溶血、免疫性血小板低下紫瘢症等)相關疾病之CLL 病人。\n2.用於 B-細胞慢性淋巴性白血病（CLL）病患 Binet B 及 C 之第二線治療，在經歷至少一種標準內容的烷化基藥劑（alkylating agent）治療方法無效，或治療後雖有效但隨後疾病又繼續惡化進展的病人。\n3.曾接受至少一種化療之和緩性非何杰金氏淋巴瘤，六個月內曾以 rituximab 治療失敗之單一治療。(103/2/1)\n4. 合併 rituximab 適用於先前未曾接受治療的 CD20陽性、第 III/IV 期和緩性非何杰金氏淋巴瘤。(108/10/1)\n5. 合併 rituximab 用於先前未曾接受治療且不適合自體幹細胞移植的第 III/IV 期被套細胞淋巴瘤。(108/10/1)\n6.可與 polatuzumab vedotin 和 rituximab 併用，適用於第三線治療復發型(relapsed)\n或難治型(refractory)且未曾接受及不適合接受造血幹細胞移植的瀰漫性大型 B 細胞淋巴瘤（DLBCL）成年病人，患者需符合 polatuzumab vedotin 之藥品給付規定。\n(113/2/1)\n7.不得與 fludarabine 合併使用。(103/2/1)\n8.須經事前審查核准後使用，每次申請最多六個（月）療程；若為依前述第6項與polatuzumab vedotin 和 rituximab 併用時 ，每次申請最多3個療程 ，且最多給付6個療程 。(101/10/1、113/2/1)。","req":"官方條文原文，生效日 2024-02-01｜來源 9.42._20240201.pdf"},{"id":"9.43","name":"Lenalidomide","brand":"Revlimid","type":"TARGETED","cancers":["骨髓瘤","淋巴瘤"],"verbatim":true,"eff":"2026-04-01","src":"9.43._20260401.pdf","ind":"9.43.Lenalidomide(如 Revlimid)： （101/12/1、106/10/1、109/2/1、109/8/1、112/4/1、114/10/1、115/3/1、115/4/1）\n1.多發性骨髓瘤：\n(1)先前尚未接受過任何治療且不適用造血幹細胞移植的多發性骨髓瘤患者可使用lenalidomide 併用 dexamethasone 作為第一線治療。開始治療時病患須同時符合下列I 與Ⅱ的條件： （109/2/1、109/8/1、112/4/1）Ⅰ.骨髓漿細胞(plasma cells)比例≧10%，或是經切片確認且有≧1顆的plasmacytoma。 （112/4/1）Ⅱ.出現下列任一臨床症狀：（112/4/1）ⅰ.腎功能不全：serum creatinine＞2.0mg/dL 或 estimated GFR(eGFR)＜40 ml/min，且無其他原因可以解釋。\nⅱ.高血鈣(corrected serum calcium＞11.0 mg/dL或2.75 mmol/L)。\nⅲ.貧血(Hemoglobin＜10 gm/dL且無其他原因可以解釋)。\nⅳ.影像檢查確認之 osteolytic bone lesion(s)。\nⅴ.骨髓漿細胞(plasma cells)比例≧60%ⅵ.Serum free light-chain ratio≧100。\nⅢ.每4個療程重新申請時，須重新評估是否適合接受造血幹細胞移植。\n若經重新評估為已適合接受造血幹細胞移植者，即須停止 Rd 之治療。 （112/4/1）\n(2)與dexamethasone 合併使用於先前已接受至少一種治療失敗之多發性骨髓瘤患者，且需同時符合下列 I 與Ⅱ的條件： （101/12/1、112/4/1）Ⅰ.具有下列任一疾病惡化的指標： 病患開始治療前須在連續2次評估中均符合同一指標 (但若為 plamacytoma 體積增加，或是新產生的bone lesion(s)或新 plasmacytoma，則僅需1次評估)： （112/4/1）ⅰ.若前一線治療中 M component最低值≧5 g/dL，血清 M 蛋白需增加≧1 g/dL；若前一線治療中M component最低值＜5 g/dL，血清 M蛋白需增加≧0.5g/dL。\nⅱ.Urine M-protein需增加≧0.2 gm/24Hr，且需較前一線治療中的最低值增加≧25%。\nⅲ.在 non-secretary myeloma病患，骨髓漿細胞 (plasma cells)之比例絕對值增加≧10%，且需較前一線治療中的最低值增加≧25%。\nⅳ.新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。\nⅴ.Plasmacytoma 體積增加≧50%。\nⅵ.周邊血液中漿細胞比例≧20%或漿細胞絕對值≧2000 cells/μL。\nⅡ.出現下列任一臨床症狀：（112/4/1）ⅰ.新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。\nⅱ.Plasmacytoma 體積增加≧50%。\nⅲ.高血鈣(corrected serum calcium＞11.0 mg/dL或 2.75\nmmol/L)。\nⅳ.貧血(Hemoglobin 下降幅度≧ 2gm/dL 且無其他原因可以解釋)。\nⅴ.腎功能惡化(eGFR 需下降幅度≧25%)，且無其他原因可以解釋。\nⅵ.出現其他 end-organ dysfunctions。\n(3)須經事前審查核准後使用，每次申請事前審查之療程以4個療程為限，每4個療程須再次申請。\nⅠ.每天限給付1粒。\nⅡ.使用4個療程後，必須確定 paraprotein(M-protein)未上升(即表示對藥物有反應或為穩定狀態)或對部分 non-secretory type MM病人以骨髓檢查 plasma cell為療效依據，方可繼續使用。\n(4)每人終生至多給付24個療程為限（每療程為4週） 。使用Leavdo、Lelimide及 Revlimid 終生至多給付36個療程為限。 （106/10/1、109/2/1、109/8/1、112/4/1、115/3/1、115/4/1）\n(5)115年2月28日以前已核定使用 Leavdo 或 Lelimide，及115年3月31日以前已核定使用Revlimid 之病人，得經事前審查核准後，使用至總療程上限（即終生36個療程）或使用期間發生疾病惡化為止。（112/4/1、115/3/1、115/4/1）\n2.瀰漫性大型 B 細胞淋巴瘤：(114/10/1、115/3/1、115/4/1)\n(1)Lenalidomide(限使用 Leavdo、Lelimide 及 Revlimid)與 tafasitamab合併使用於經一線全身治療含 rituximab 治療復發型，不適合接受造血幹細胞移植瀰漫性大型B 細胞淋巴瘤(DLBCL)成人病人，病人須符合tafasitamab之藥品給付規定(114/10/1、115/3/1、115/4/1）。\n(2)須經事前審查核准後使用。\nⅠ.每人至多給付12個療程。\nⅡ.每天限給付1粒。","req":"官方條文原文，生效日 2026-04-01｜來源 9.43._20260401.pdf"},{"id":"9.44.1","name":"Azacitidine 注射劑","brand":"Vidaza","type":"CHEMO","cancers":["白血病","骨髓增生不良"],"verbatim":true,"eff":"2025-08-01","src":"9.44.1._20250801.pdf","ind":"9.44.Azacitidine： （102/1/1、111/5/1、111/8/1、112/2/1、112/8/1、114/3/1、114/5/1、114/8/1）\n9.44.1.Azacitidine 注射劑（如 Vidaza） ： （102/1/1、111/5/1、111/8/1、112/2/1、112/8/1、114/3/1、114/8/1）\n1.骨髓增生不良症候群高危險性病患：頑固性貧血併有過量芽細胞（RAwith excess blasts, RAEB）、轉變中的頑固性貧血併有過量芽細胞（RAEB in transformation, RAEB-T）、及慢性骨髓單核細胞性白血病（chronic myelomonocytic leukemia, CMMoL）。\n(1)需經事前審查核准後使用，申請事前審查時必須確定病患無病情惡化至急性骨髓性白血病，即可繼續使用。\nⅠ.第一次申請4個治療療程。\nⅡ.第二次開始每3個療程申請一次。\n(2)初次申請時需經事前審查核准後使用，續用不需再事前審查，惟病歷應留存確診之病理或影像診斷證明等報告，並記錄治療相關臨床資料。病患倘病情惡化至急性骨髓性白血病即應停藥。（111/8/1、112/2/1、112/8/1、114/3/1、114/8/1）\n(3)急性骨髓性白血病之定義：骨髓芽細胞（myeloblast）大於30%。\n(4)本藥品與 decitabine 僅能擇一使用，除因耐受性不良，不得互換。\n若因無法耐受 decitabine 而轉換至本藥品時需事前申請。使用本藥品無效後，不得再申請 decitabine。 （111/5/1）\n2.Azacitidine(除 Winduza 及 Azacitidine Lyophilized Inj100mg\"GBC\"以外)併用 venetoclax，使用於無法接受高強度化學治療之初診斷急性骨髓性白血病(AML)病人。(114/8/1)\n(1)需具有下列 I.或Ⅱ.的條件之一：\nI.75歲以上。\nⅡ.18歲以上但未滿75歲時，需 ECOG performance status為 2 或3，且符合下列任一條件者：\nⅰ.具有心臟衰竭治療病史，且 left ventricle ejectionfraction (LVEF)＜50%。\nⅱ.具慢性肺部疾病史，且 DLCO＜65%。\nⅲ.具肝功能異常：Bilirubin level在 1.5-3.0 倍正常值間。\n(2)需未曾因骨髓化生不良症候群(myelodysplastic syndrome, MDS)接受過 azacitidine 或 decitabine 治療者。\n(3)需經事前審查核准後使用，每2個療程需再次申請；再次申請時需檢附療效評估資料，若病情惡化應即停止使用。\n(4)最多給付6個療程。","req":"官方條文原文，生效日 2025-08-01｜來源 9.44.1._20250801.pdf"},{"id":"9.44.2","name":"Azacitidine 口服","brand":"Onureg","type":"CHEMO","cancers":["白血病"],"verbatim":true,"eff":"2025-10-01","src":"9.44.2._20251001.pdf","ind":"9.44.2.Azacitidine 口服製劑（如 Onureg） ：(114/5/1、114/10/1）\n1.用於不適合接受造血幹細胞移植(HSCT)之急性骨髓性白血病 (AML)成人病人，作為維持治療，且須同時符合下列條件：\n(1)55 歲以上具中度或高度不良風險染色體核型變化(intermediate-risk or poor-risk cytogenetics)之急性骨髓性白血病 (AML)病人。\n(2)在誘導治療後(不論是否接受鞏固治療)，首次達到完全緩解(CR)或完全緩解但血球計數未完全恢復正常 (CRi)。\n(3)之前未曾接受 azacitidine或 decitabine 藥物治療。\n2.需經事前審查核准後使用，初次申請為 3 個療程，需檢附染色體檢測結果報告；每 3 個療程需再次申請，可治療至疾病復發 (定義為周邊血或骨髓觀察到的芽細胞超過 5%或新出現髓外侵犯)或無法耐受藥物毒性為止。\n3.每人以 24 個療程為上限。\n4.不得與 midostaurin、venetoclax 及 gilteritinib 等標靶藥品併用。\n5.病人接受本藥物治療後，不再給付造血幹細胞移植。\n6.本藥品與 quizartinib 僅得擇一使用，除因耐受性不良，不得互換。\n(114/10/1)","req":"官方條文原文，生效日 2025-10-01｜來源 9.44.2._20251001.pdf"},{"id":"9.45","name":"Afatinib","brand":"Giotrif","type":"TARGETED","cancers":["肺癌"],"verbatim":true,"eff":"2024-06-01","src":"9.45._20240601.pdf","ind":"9.45.Afatinib（如 Giotrif）：(103/5/1、106/11/1、108/6/1、108/11/1、109/4/1、109/6/1、109/10/1、111/4/1、113/3/1、113/6/1)\n1. 限單獨使用於：\n(1)具有 EGFR-TK 基因突變之局部晚期或轉移性(即第ⅢB、ⅢC 期或第Ⅳ期)之肺腺癌病患之第一線治療，需檢附 EGFR 基因檢測結果報告，且需符合全民健康保險藥品給付規定之通則十二。(108/6/1、108/11/1、113/6/1)\n(2)先前已使用過第一線含鉑化學治療，但仍惡化的局部晚期或轉移性之鱗狀組織非小細胞肺癌之第二線治療。(108/6/1)\n2.使用注意事項(106/11/1、108/6/1、109/4/1、109/10/1、111/4/1、113/3/1）\n(1)用於具有 EGFR-TK 基因突變之局部晚期或轉移性肺腺癌之第一線治療：病歷應留存確實患有肺腺癌之病理或細胞檢查報告，及 EGFR-TK基因突變檢測報告。\n(2)用於局部晚期或轉移性之鱗狀組織非小細胞肺癌之第二線治療：病歷應留存曾經接受含鉑類化學治療之證明，及目前又有疾病惡化之影像診斷證明(如胸部 X 光、電腦斷層或其他可作為評估的影像)，此影像證明以可測量(measurable)的病灶為優先，如沒有可以測量的病灶，則可評估(evaluable)的病灶亦可採用。(108/6/1)\n(3)每次處方以4週為限，再次處方時需於病歷記錄治療後相關臨床資料，如每4週需追蹤胸部 X 光或電腦斷層等影像檢查，每8至12週需進行完整療效評估（如胸部 X 光或電腦斷層） 。(106/11/1）\n(4)使用本藥品後，除因耐受性不良，否則不得轉換類似藥理機轉之其他酪胺酸激酶阻斷劑（tyrosine kinase inhibitor, TKI）。\n(5)本藥品與 gefitinib 及 erlotinib 不得併用。(109/4/1)\n(6)本藥品於第一線使用時，與 osimertinib、dacomitinib 及bevacizumab 併用 erlotinib 之治療組合僅得擇一使用，除因耐受性不良，不得互換。(109/6/1、109/10/1、111/4/1、113/3/1)\nⅠ.如需更換使用 osimertinib，必須符合 osimertinib 第一線使用於具有 EGFR Exon 19 Del 基因突變且具腦轉移之轉移性（第Ⅳ期）肺腺癌之限制。(109/6/1、111/4/1)\nⅡ.如需更換使用 dacomitinib，必須符合 dacomitinib 第一線使用於具有 EGFR-TK Exon 19 Del 或 Exon 21 L858R 點突變，且無腦轉移(non-CNS)之局部侵犯性或轉移性肺腺癌之限制。\n(109/10/1）Ⅲ.如需更換使用 bevacizumab 併用 erlotinib 之治療組合，必須符合 bevacizumab 第一線使用於具有 EGFR Exon 21 L858R 突變且腦轉移之無法手術切除的轉移性（第Ⅳ期）非鱗狀非小細胞肺癌肺腺癌之限制。(113/3/1)","req":"官方條文原文，生效日 2024-06-01｜來源 9.45._20240601.pdf"},{"id":"9.46","name":"Tegafur/gimeracil/oteracil","brand":"TS-1","type":"CHEMO","cancers":["胰臟癌","胃癌","肺癌","膽道癌"],"verbatim":true,"eff":"2024-02-01","src":"9.46._20240201.pdf","ind":"9.46.Tegafur/gimeracil/oteracil 複方製劑(如 TS-1） ：(103/6/1、105/12/1、109/2/1、113/2/1)\n1.治療局部晚期無法手術切除或轉移性胰臟癌病人。\n2.胃癌(105/12/1)\n(1)胃癌術後輔助性化療，用於罹患 TNMS tageⅡ(排除 T1)、ⅢA 或ⅢB胃癌且接受過胃癌根除性手術的成年患者，限用1年。\n(2)需經事前審查核准後使用。\n3.非小細胞肺癌(109/2/1)\n(1)曾使用含鉑之化學藥物治療失敗的局部晚期或轉移性之非小細胞肺癌。\n(2)不得與標靶治療、其他化療或免疫檢查點抑制劑併用。\n4.與 gemcitabine 合併使用作為晚期或復發之膽道癌第一線治療。\n(113/2/1)","req":"官方條文原文，生效日 2024-02-01｜來源 9.46._20240201.pdf"},{"id":"9.47","name":"Lapatinib","brand":"Tykerb","type":"TARGETED","cancers":["乳癌"],"verbatim":true,"eff":"2025-02-01","src":"9.47._20250201.pdf","ind":"9.47.Lapatinib（如 Tykerb） ： （103/9/1、106/11/1、110/2/1、114/2/1)\n1.與 capecitabine 併用，使用於曾接受 anthracycline, taxane 以及trastuzumab 治療後病況惡化之轉移性乳癌併有腦部轉移，且為 HER2過度表現(IHC3+或 FISH+)病人。\n2. 每3個月需進行療效評估，病歷應留存評估紀錄，無疾病惡化方可繼續使用。(106/11/1)\n3.Lapatinib、trastuzumab emtansine 和 trastuzumab deruxtecan 僅能擇一給付，不得互換。(110/2/1、114/2/1)","req":"官方條文原文，生效日 2025-02-01｜來源 9.47._20250201.pdf"},{"id":"9.48","name":"Eribulin","brand":"Halaven","type":"CHEMO","cancers":["乳癌","軟組織肉瘤"],"verbatim":false,"eff":"","src":"","ind":"轉移性乳癌（先前anthracycline+taxane治療）；晚期無法手術/轉移性脂肪肉瘤（先前含anthracycline化療）\n★eribulin/ixabepilone僅擇一","req":"脂肪肉瘤需事前審查"},{"id":"9.49","name":"Abiraterone","brand":"Zytiga","type":"HORMONE","cancers":["攝護腺癌"],"verbatim":true,"eff":"2025-06-01","src":"9.49._20250601.pdf","ind":"9.49. Abiraterone(如 Zytiga） ： （103/12/1、105/9/1、106/9/1、108/3/1、109/5/1、109/10/1、110/2/1、110/3/1、110/11/1、111/3/1、112/9/1、113/8/1、113/9/1、114/6/1）\n1.與雄性素去除療法及 prednisone 或 prednisolone 併用，治療新診斷高風險轉移性的去勢敏感性前列腺癌(mCSPC)的成年男性(ECOG 分數須≦1)。高風險需符合下列三項條件中至少兩項：(109/5/1、110/2/1、113/8/1）\n(1)葛里森分數(Gleason score)≧8；\n(2)骨骼掃描出現三個(含)以上病灶且至少其中一處以上為非脊柱及非骨盆腔轉移；\n(109/5/1、113/8/1）\n(3)出現內臟轉移。\n2.與 prednisone 或 prednisolone 併用，治療藥物或手術去勢抗性的轉移性前列腺癌(mCRPC)，且在雄性素去除療法失敗後屬無症狀或輕度症狀(ECOG 分數0或1)，未曾接受化學治療者： （106/9/1）\n(1)若病患先前接受雄性素去除療法時，在小於12個月的時間內演化成去勢抗性前列腺癌(CRPC)，且葛里森分數(Gleason score)≧8時，不得於使用化學治療前使用abiraterone。 （106/9/1）\n(2)申請時需另檢附：\nI.用藥紀錄(證明未常規使用止痛藥物，屬無症狀或輕度症狀)。\nII.三個月內影像報告證明無臟器轉移。 （106/9/1）\n3.與 prednisone 或 prednisolone 併用，治療藥物或手術去勢抗性的轉移性前列腺癌(ECOG 分數須≦2)且已使用過 docetaxel 2個療程以上治療無效者。\n4.與 olaparib 及 prednisone 或 prednisolone，用於具 germline 或 somatic BRCA 1/2致病性或疑似致病性突變之成人病人，患者需符合 olaparib 藥品給付規定。(114/6/1)\n5.前述1、2、3項須經事前審查核准後使用，每3個月需再次申請。 （111/3/1）\n(1)申請時需檢附病理報告、使用雄性素去除療法紀錄及系列 PSA 和睪固酮數據。\n（106/9/1）\n(2)再申請時若 PSA 值下降未超過治療前的50%以上，則需停藥。(106/9/1、109/10/1)\n(3)下降達最低值後之持續追蹤出現 PSA 較最低值上升50%以上且 PSA≧2ng/ml，則需停藥，但影像學證據尚無疾病進展者，可以繼續使用。 （106/9/1、109/10/1）\n(4)用於治療新診斷高風險轉移性的去勢敏感性前列腺癌(mCSPC)的成年男性，總療程以36個月為上限（惟 Ateron 總療程以24個月為上限） 。(109/5/1、110/2/1、113/8/1、113/9/1）\n(5)去勢抗性前列腺癌(CRPC)病患若於化學治療前先使用過 abiraterone，當化學治療失敗後不得再申請使用 abiraterone。 （106/9/1）\n6.不論病人處於轉移或非轉移的狀態下，新型荷爾蒙藥品(abiraterone、apalutamide、darolutamide 和 enzalutamide) 及 olaparib 與 abiraterone 併用，終生僅給付一種治療，且除非出現嚴重不耐受反應導致必須永久停止治療，不得互換。(112/9/1、114/6/1)\n7.本品與 radium-223 dichloride 不得合併使用。(108/3/1)","req":"官方條文原文，生效日 2025-06-01｜來源 9.49._20250601.pdf"},{"id":"9.50","name":"Crizotinib","brand":"Xalkori","type":"TARGETED","cancers":["肺癌"],"verbatim":true,"eff":"2024-06-01","src":"9.50._20240601.pdf","ind":"9.50.Crizotinib (如 Xalkori)：(104/9/1、106/11/1、107/5/1、108/7/1、108/9/1、108/12/1、110/7/1、111/2/1、111/8/1、112/11/1、113/6/1)\n1. 適用於 ALK 陽性之晚期非小細胞肺癌第一線治療。(106/11/1、111/8/1)\n2. 單獨使用於 ROS-1陽性之晚期非小細胞肺癌患者。(108/9/1)\n3. 須經事前審查核准後使用:\n(1)每次申請事前審查之療程以三個月為限，每三個月需再次申請。\n(2)初次申請時需檢具確實患有非小細胞肺癌之病理或細胞檢查報告，及ALK 突變檢測報告，或 ROS-1突變檢測報告，且需符合全民健康保險藥品給付規定之通則十二。(107/5/1、108/9/1、111/2/1、113/6/1)\n(3)再次申請時需附上治療後相關臨床資料，如給藥4週後，需追蹤胸部 X光或電腦斷層等影像檢查評估療效，往後每4週做胸部 X 光檢查，每3\n個月需追蹤其作為評估藥效的影像(如胸部 X 光或電腦斷層)，若病情惡化即不得再次申請。(108/12/1、112/11/1)\n4. Crizotinib 與 ceritinib、alectinib、brigatinib、lorlatinib 用於 ALK 陽性之晚期非小細胞肺癌第一線治療時，僅得擇一使用，除因病人使用後，發生嚴重不良反應或耐受不良之情形外，不得互換。\n(108/7/1、108/12/1、111/8/1、112/11/1)\n5. Crizotinib 與 entrectinib 用於 ROS-1陽性之晚期非小細胞肺癌時，僅得擇一使用，除因病人使用後，發生嚴重不良反應或耐受不良之情形外，不得互換。(110/7/1)\n6. 每日最大劑量限500mg。(108/9/1)","req":"官方條文原文，生效日 2024-06-01｜來源 9.50._20240601.pdf"},{"id":"9.51","name":"Regorafenib","brand":"Stivarga","type":"TARGETED","cancers":["大腸直腸癌","GIST","肝細胞癌"],"verbatim":true,"eff":"2024-06-01","src":"9.51._20240601.pdf","ind":"9.51.Regorafenib（如Stivarga）：（104/9/1、105/8/1、107/12/1、108/6/1、110/5/1、110/6/1、113/6/1）\n1.轉移性大腸直腸癌(mCRC)：\n(1)用於治療先前曾接受下列療法的轉移性大腸直腸癌(mCRC)患者，療法包括fluoropyrimidine、oxaliplatin、irinotecan為基礎的化療，和抗血管內皮生長因子(anti-VEGF)等療法；若K-ras為原生型(wildtype)，則需再加上接受過抗表皮生長因子受體(anti-EGFR)療法。需檢附All-RAS基因突變分析檢測結果報告，且需符合全民健康保險藥品給付規定之通則十二。（110/6/1、113/6/1）\n(2)須經事前審查核准後使用，每次申請事前審查之療程以8週為限，再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。\n2.胃腸道間質瘤(GIST) (105/8/1）\n(1)先前曾接受imatinib與sunitinib治療的局部晚期、無法切除或轉移性的胃腸道間質瘤患者。\n(2)需經事前審查核准後使用，每次申請之療程以3個月為限，送審時需檢送影像資料，每3個月評估一次。\n3.肝細胞癌(HCC)：(108/6/1、110/5/1)\n(1)適用於曾接受sorafenib治療失敗後之轉移性或無法手術切除且不適合局部治療或局部治療失敗之Child-Pugh A class晚期肝細胞癌成人患者。\n(2)需經事前審查核准後使用，初次申請之療程以12週為限，之後每8週評估一次。送審時需檢送影像資料，無疾病惡化方可繼續使用。\n(3)每日至多處方4粒。\n(4)Regorafenib與ramucirumab、nivolumab僅能擇一使用，不得互換。\n(110/5/1)\n4.本藥品不得與trifluridine/tipiracil併用。(107/12/1)","req":"官方條文原文，生效日 2024-06-01｜來源 9.51._20240601.pdf"},{"id":"9.52","name":"Vemurafenib","brand":"Zelboraf","type":"TARGETED","cancers":["黑色素瘤"],"verbatim":true,"eff":"2024-06-01","src":"9.52._20240601.pdf","ind":"9.52.Vemurafenib(如 Zelboraf)：(104/11/1、110/3/1、113/6/1）\n1.用於治療 BRAF V600突變陽性 ECOG≤2且罹患無法切除(第ⅢC 期)或轉移性(第Ⅳ期)黑色素瘤之病人。需檢附 BRAF V600基因突變分析檢測報告，且需符合全民健康保險藥品給付規定之通則十二。(113/6/1)\n2.需經事前審查核准後使用，每次申請療程以三個月為限，如發現病情惡化應停止使用。再申請應檢附前次治療結果評估資料。\n3.本品與 dabrafenib (併用 trametinib) 僅能擇一使用，除因耐受性不良，不得互換。(110/3/1）","req":"官方條文原文，生效日 2024-06-01｜來源 9.52._20240601.pdf"},{"id":"9.53","name":"Panitumumab","brand":"Vectibix","type":"TARGETED","cancers":["大腸直腸癌"],"verbatim":true,"eff":"2026-02-01","src":"9.53._20260201.pdf","ind":"9.53.Panitumumab（如 Vectibix）：(105/4/1、107/6/1、110/6/1、113/6/1、115/2/1)\n1.與 FOLFOX（folinicacid/ 5-fluorouracil/oxaliplatin）或 FOLFIRI（folinic acid/ 5-fluorouracil/irinotecan）合併使用於治療 RAS 原生型(wild-type)之轉移性直腸結腸癌病人之第一線治療。需檢附 All-RAS 基因突變分析檢測報告，且需符合全民健康保險藥品給付規定之通則十二。\n(98/8/1、110/6/1、113/6/1、115/2/1)\n(1)本藥品須經事前審查核准後使用，每次申請之療程以18週為限，再次申請必須提出客觀證據(如：影像學)證實無惡化，才可繼續使用。\n(2)Panitumumab 與 cetuximab 二者僅能擇一使用。 (107/6/1、115/2/1)\n(3)本藥品不得與 bevacizumab 併用。(107/6/1)\n(4)經手術完全切除(R0切除)且查無轉移病灶者不得申請給付。(115/2/1)\n2.治療已接受過含 5 fluorouracil 、 irinotecan 及 oxaliplatin 二線以上之細胞毒性治療失敗、RAS 原生型(wild-type)的轉移性直腸結腸癌的病人。\n需檢附 All-RAS 基因突變分析檢測報告，且需符合全民健康保險藥品給付規定之通則十二。 (115/2/1)\n(1)病人先前未曾接受過抗表皮生長因子受體(anti-EGFR)藥品治療。\n(2)本藥品須經事前審查核准後使用，每次申請之療程以9週為限，再次申請必須提出客觀證據(如：影像學)證實無惡化，才可繼續使用。\n(3)使用總療程以 18 週為上限。","req":"官方條文原文，生效日 2026-02-01｜來源 9.53._20260201.pdf"},{"id":"9.54","name":"Enzalutamide","brand":"Xtandi","type":"HORMONE","cancers":["攝護腺癌"],"verbatim":true,"eff":"2025-10-01","src":"9.54._20251001.pdf","ind":"9.54. Enzalutamide（如 Xtandi）：（105/9/1、106/9/1、108/3/1、109/10/1、110/3/1、110/11/1、111/3/1、112/9/1、113/8/1、114/6/1、114/10/1）\n1.治療高風險非轉移性去勢抗性前列腺癌(high risk nmCRPC)的成年男性。(112/9/1)\n(1)須經事前審查核准後使用。\n(2)初次申請時需檢附病理報告、使用雄性素去除療法紀錄，系列 PSA和睪固酮數據，三個月內影像報告證明無遠端轉移。\n(3)ECOG 分數須≦1。\n(4)PSA doubling time≦10個月，PSA 倍增之時間，應依線性回歸模型計算，且其參數取得需基於下列原則：\nⅠ.至少三個連續 PSA 測量值，且各測量值皆≧0.2 ng/mL（最高的PSA 值必須>1.0ng/ml）。\nⅡ.應包含先前 ADT 治療期間的測量值，且最少一測量值為最近3個月內測得之 PSA 數值。\nⅢ.第一個和最後一個 PSA 測量值間隔需≧8週，但≦12個月。\n(5)每3個月需再次申請，申請之療程以3個月為限。再次申請時，有PSA progression 者，需檢附影像學報告，若影像學報告證實轉移，則需停藥;無 PSA progression 者，則每6個月需檢附影像學報告，若影像學報告證實轉移，則需停藥。\n註：\nPSA progression 定義為:PSA 下降達最低值(nadir)後，出現 PSA 值上升較 nadir≧25%，且 PSA≧2 ng/mL，並於至少3週後，再次抽血確認 PSA 值有上升趨勢。\n2.治療高風險轉移性的去勢敏感性前列腺癌(mCSPC)，且與雄性素去除療法併用，總療程以36個月為上限。高風險需符合下列三項條件中至少兩項：（111/3/1、113/8/1、114/10/1）\n(1)葛里森分數(Gleason score)≧8。\n(2)骨骼掃描出現三個(含)以上病灶且至少其中一處以上為非脊柱及非骨盆腔轉移。 （111/3/1、113/8/1）\n(3)出現內臟轉移。\n3.治療藥物或手術去勢抗性的轉移性前列腺癌(mCRPC)，且在雄性素去除療法失敗後屬無症狀或輕度症狀(ECOG 分數0或1)，未曾接受化學治療者：(106/9/1)\n(1)若病患先前接受雄性素去除療法時，在小於12個月的時間內演化成去勢抗性前列腺癌(CRPC)，且葛里森分數(Gleason score)≧8時，不得於使用化學治療前使用 enzalutamide。(106/9/1)\n(2)申請時需另檢附：(106/9/1)\nI.用藥紀錄(證明未常規使用止痛藥物，屬無症狀或輕度症狀)。\nII.三個月內影像報告證明無臟器轉移。\n4.治療藥物或手術去勢抗性的轉移性前列腺癌(ECOG 分數須≦2)且已使用過 docetaxel 2個療程以上治療無效者。\n5.前述2、3、4項須經事前審查核准後使用，每3個月需再次申請。\n（111/3/1、112/9/1）\n(1)申請時需檢附病理報告、使用雄性素去除療法紀錄及系列 PSA 和睪固酮數據。(106/9/1)\n(2)再申請時若 PSA 值下降未超過治療前的50%以上，則需停藥。\n(106/9/1、109/10/1)\n(3)下降達最低值後之持續追蹤出現 PSA 較最低值上升50%以上且PSA≧2ng/ml，則需停藥，但影像學證據尚無疾病進展者，可以繼續使用。(106/9/1、109/10/1)\n6.去勢抗性前列腺癌(CRPC)病患若於化學治療前先使用過 enzalutamide，當化學治療失敗後不得再申請使用 enzalutamide。(106/9/1)\n7.不論病人處於轉移或非轉移的狀態下，新型荷爾蒙藥品(abiraterone、apalutamide、darolutamide 和 enzalutamide) 及 olaparib 與abiraterone 併用，終生僅給付一種治療，且除非出現嚴重不耐受反應導致必須永久停止治療，不得互換。(112/9/1、114/6/1)\n8.本品與 radium-223 dichloride 不得合併使用。(108/3/1)","req":"官方條文原文，生效日 2025-10-01｜來源 9.54._20251001.pdf"},{"id":"9.55","name":"Ruxolitinib","brand":"Jakavi","type":"TARGETED","cancers":["骨髓纖維化"],"verbatim":true,"eff":"2025-10-01","src":"9.55._20251001.pdf","ind":"9.55.Ruxolitinib(如Jakavi)：(105/10/1、113/3/1、113/6/1、114/1/1、114/10/1)\n1.用於治療International Working Group(IWG) ConsensusCriteria中度風險-2或高風險之骨髓纖維化，包括原發性骨髓纖維化、真性紅血球增多症後骨髓纖維化、或血小板增多症後骨髓纖維化等疾病所造成脾臟腫大(symptomatic splenomegaly)及/或其他相關全身症狀且不適於接受幹細胞移植的病人(stem celltransplantation)。\n(1)需經事前審查核准後使用，每次申請之療程以6個月為限，送審時需檢送影像資料及症狀改善之病歷紀錄，每6個月評估一次。\n(2)用藥後第一次評估時，需達到症狀反應(symptom response)或脾臟體積無惡化兩者之一，且同時無AML tranformation，方得以繼續使用。分別定義如下：(113/6/1)\nⅠ.症狀反應：MPN-SAF-TSS分數或MPN-10與治療前基準值相比，需下降超過50%。\nⅡ.脾臟體積無惡化：使用電腦斷層評估，脾臟長度未增加超過治療前基準值之40%以上(或體積增加未達25%以上)。\nⅢ.AML transformation：骨髓中之芽細胞≥20%或血液中之芽細胞≥20%合併芽細胞數值≥1×10\n9\n/L。\n(3)用藥後第二次及其後的評估，必須顯示無疾病惡化（無症狀惡化且脾臟體積無惡化，並同時無AML transformation），方得以繼續使用。分別定義如下：(113/6/1)\nⅠ.無症狀惡化：未出現新症狀，且MPN-SAF-TSS分數或MPN-10\n未超過治療前的基準值。\nⅡ.脾臟體積無惡化：使用電腦斷層評估，脾臟長度未增加超過最佳反應(best response)時之脾臟長度40%以上(或體積增加未達25%以上)。\nⅢ.AML transformation：骨髓中之芽細胞≥20%或血液中之芽細胞≥20%合併芽細胞數值≥1×10\n9\n/L。\n(4)Jakavi 5mg每日限最多使用4粒，Jakavi 15mg或20mg每日限最多使用2粒，且其5mg不得與15mg或20mg併用。\n(5)本藥品與fedratinib、momelotinib用於中度風險或高風險之骨髓纖維化治療時，僅得擇一給付。fedratinib、momelotinib治療後如疾病惡化不得換用本藥品。(114/1/1、114/10/1)\n2.移植物抗宿主疾病，限用Jakavi 5mg，每日最多使用4 粒。\n(113/3/1)\n(1)用於治療12歲以上之青少年及成人，且先前曾接受皮質類固醇(corticosteroids)後反應不佳的第2級(含)以上急性移植物抗宿主疾病(acute graft-versus-host disease,GvHD)病人。\nⅠ.首次治療，可免事前審查，以28天為限，但須於病歷記載診斷、嚴重度評估以及先前藥物治療反應評估。若使用後疾病持續進展，即不得再使用。\nⅡ.續用時需經事前審查核准後使用，限續申請一次並以2個月為限，申請時須檢附先前治療處方紀錄及療效評估。用藥後，若有疾病持續進展，則應停藥。\nⅢ.使用總療程以3個月為上限。\nⅣ.若後續轉變為慢性移植物抗宿主疾病（chronic GvHD）時，需依慢性移植物抗宿主疾病之給付規定申請。\nⅤ.先前曾接受皮質類固醇（corticosteroids）後反應不佳需符合以下任一條件：\nⅰ.≧1mg/kg/day methylprednisolone (or equivalentprednisone dose) 3天後，疾病仍持續進展。\nⅱ.≧1mg/kg/day methylprednisolone (or equivalentprednisone dose) 開始的5天後未見改善。\nⅲ.發生皮質類固醇依賴性：在逐漸調降皮質類固醇期間，無法將 methylprednisolone (or equivalentprednisone dose)劑量調降<0.5mg/kg/day維持至少7\n天。\nⅳ.發生皮質類固醇不耐受性：初始治療後，發生CTCAEG3之嚴重不良反應情形。\n(2)用於治療12歲以上之青少年及成人，且先前曾接受皮質類固醇(corticosteroids)後反應不佳的慢性移植物抗宿主疾病(chronic graft-versus-host disease,GvHD)病人。\nⅠ.限用於發生肺部之慢性移植物抗宿主疾病，須同時符合下列條件:ⅰ.肺功能檢查之FEV1<80%。\nⅱ.檢附CT報告帶有 air trapping, small airwaythickening或bronchiectasis 等肺部侵犯的表徵。\nⅡ.需經事前審查核准後使用。\nⅢ.第一次療程為3個月，續用申請之療程以3個月為限，送審時需檢送療效評估，每3個月評估一次。用藥後，若有疾病持續進展，則不予同意使用。\nⅣ.使用總療程以24個月為上限。\nⅤ.先前曾接受皮質類固醇（corticosteroids）後反應不佳需符合以下任一條件：\nⅰ.每日施用 ≥ 0.5 mg/kg/day prednisone 治療至少7\n天後，疾病仍持續進展。\nⅱ.每日平均施用 ≥ 0.5 mg/kg/day prednisone (或隔日≥1 mg/kg) ，治療至少1個月後，疾病仍未改善。\nⅲ.發生皮質類固醇依賴性：在逐漸調降皮質類固醇期間，無法將劑量調降至每日0.25 mg/kg 以下維持至少7 天。\nⅳ.發生皮質類固醇不耐受性:初始治療後，發生 CTCAEG3 嚴重不良反應之情形。","req":"官方條文原文，生效日 2025-10-01｜來源 9.55._20251001.pdf"},{"id":"9.56","name":"Brentuximab vedotin","brand":"Adcetris","type":"TARGETED","cancers":["淋巴瘤"],"verbatim":true,"eff":"2022-02-01","src":"9.56._20220201.pdf","ind":"9.56.Brentuximab vedotin(如 Adcetris)：(105/10/1、106/4/1、109/2/1、111/2/1、114/12/1)\n限用於成人患者：\n1.何杰金氏淋巴瘤(HL)：（111/2/1)\n(1)與 doxorubicin、vinblastine 和 dacarbazine 併用適用於先前未曾接受治療，且IPS (International Prognostic Score)為4-7 分的 CD30+第 IV 期何杰金氏淋巴瘤(HL)成人病人。 （111/2/1）\n(2)CD30+何杰金氏淋巴瘤(HL)病患接受 ASCT 後仍具有高復發風險之病患：需先前未曾使用過本品，並於 ASCT 前具有下列任一危險因子者：(109/2/1)\nⅠ.對於第1線治療未達完全緩解。\nⅡ.第1線治療結束後12個月內復發或惡化。\nⅢ.ASCT 前出現的復發具有淋巴結外侵犯。\n(3)治療復發或頑固型 CD30+何杰金氏淋巴瘤(HL)：\nⅠ.已接受自體幹細胞移植(ASCT)，或Ⅱ.無法使用 ASCT 或多重藥物化療，且先前至少已接受兩種治療。\n(4)須經事前審查核准後使用：\nⅠ.前述(1)之病患：首次申請療程以4個療程為限，再申請應檢附前次治療結果評估資料。若病人病情已達完全緩解，得再給付2個療程；若病情惡化即須停止使用。健保給付以6個療程為上限。(111/2/1)\nⅡ.前述(2)之病患：每次申請療程以4個療程為限，再申請應檢附疾病無惡化之評估資料，若病情惡化即須停止使用。曾依本項核准使用之病患，若之後疾病惡化或復發後將不再給付本藥品。(109/2/1、111/2/1)\nⅢ.前述(3)之病患：每次申請療程以4個療程為限，再申請應檢附前次治療結果評估資料。若病人病情已達完全緩解，得再給付4個療程;若病情惡化即須停止使用。(106/4/1、109/2/1、111/2/1)\nⅣ.同一病患於前述（1）、（2）及（3）之終身給付療程數以總共16個療程為上限。\n(111/2/1)\n2.全身性退行分化型大細胞淋巴瘤(systemic anaplastic large cell lymphoma；\nsALCL)：（111/2/1)\n(1)與 cyclophosphamide、doxorubicin 和 prednisone 併用適用於先前未曾接受治療且為 ALK 陰性的全身性退行分化型大細胞淋巴瘤(systemic anaplastic largecell lymphoma；sALCL)成人病人。 （111/2/1）\n(2)治療復發或頑固型全身性退行分化型大細胞淋巴瘤(systemic anaplastic largecell lymphoma；sALCL)。\n(3)須經事前審查核准後使用：\nⅠ.前述(1)之病患：首次申請療程以4個療程為限，再申請應檢附前次治療結果評估資料。若病人病情已達完全緩解，得再給付2個療程；若病情惡化即須停止使用。健保給付以6個療程為上限。(111/2/1)\nⅡ.前述(2)之病患：每次申請療程以4個療程為限，再申請應檢附前次治療結果評估資料。若病人病情已達完全緩解，得再給付4個療程;若病情惡化即須停止使用。\n(106/4/1、109/2/1、111/2/1)\nⅢ.同一病患於前述(1)及(2)之終身給付療程數以總共16個療程為上限。(111/2/1)\n3.CD30+皮膚 T 細胞淋巴瘤(CTCL)：（111/2/1、114/12/1）\n(1)單獨用於先前已接受照光療法與至少一種注射型(含血管內注射、肌肉內注射、皮下注射等)之全身性化學藥物治療的 CD30+皮膚 T 細胞淋巴瘤(CTCL)成人病人，病人須診斷為蕈狀肉芽腫 (MF，第ⅡB 期或以上)、Sezary 症候群(SS)或原發性皮膚退行分化型大細胞淋巴瘤（pcALCL） ，且CD30需於超過10%的腫瘤細胞呈現陽性。\n（111/2/1、114/12/1）\n(2)須經事前審查核准後使用，首次申請療程以4個療程為限，再申請應檢附前次治療結果評估資料。若病人病情已達完全緩解，得再給付2個療程；若病情惡化即須停止使用。健保給付以6個療程為上限。（111/2/1）","req":"官方條文原文，生效日 2022-02-01｜來源 9.56._20220201.pdf"},{"id":"9.57","name":"Clofarabine","brand":"Evoltra","type":"CHEMO","cancers":["白血病"],"verbatim":false,"eff":"","src":"","ind":"先前≥2種化療失敗或復發第≥2次之ALL（≤21歲），計畫進行幹細胞移植。限1療程","req":"需事前審查；不得與blinatumomab併用"},{"id":"9.58","name":"Axitinib","brand":"Inlyta","type":"TARGETED","cancers":["腎細胞癌"],"verbatim":false,"eff":"","src":"","ind":"sunitinib或cytokine治療失敗的晚期腎細胞癌","req":"需影像資料；每3個月評估"},{"id":"9.59","name":"Ceritinib","brand":"Zykadia","type":"TARGETED","cancers":["肺癌"],"verbatim":true,"eff":"2024-06-01","src":"9.59._20240601.pdf","ind":"9.59.Ceritinib(如 Zykadia)：(106/9/1、106/11/1、108/7/1、108/12/1、111/2/1、111/8/1、112/11/1、113/6/1)\n1. 適用於 ALK 陽性之晚期非小細胞肺癌第一線治療。(108/7/1、111/8/1)\n2. 須經事前審查核准後使用：\n(1)每次申請事前審查之療程以三個月為限，每三個月需再次申請。\n(2)初次申請時需檢具確實患有非小細胞肺癌之病理或細胞檢查報告及ALK 突變檢測報告，且需符合全民健康保險藥品給付規定之通則十二。(108/12/1、111/2/1、113/6/1)\n(3)再次申請時並需附上治療後相關臨床資料，如給藥 4 週後，需追蹤胸部 X 光或電腦斷層等影像檢查評估療效，往後每 4 週做胸部 X 光檢查，每 3 個月需追蹤其作為評估藥效的影像（如胸部 X 光或電腦斷層） ，若病情惡化即不得再次申請。(108/12/1、112/11/1)\n3. Ceritinib 與 crizotinib、alectinib、brigatinib、lorlatinib 用於 ALK 陽性之晚期非小細胞肺癌第一線治療時，僅得擇一使用，除因病人使用後，發生嚴重不良反應或耐受不良之情形外，不得互換。\n(108/7/1、108/12/1、111/8/1、112/11/1)\n4. 每日最大劑量限 450mg。(108/7/1)","req":"官方條文原文，生效日 2024-06-01｜來源 9.59._20240601.pdf"},{"id":"9.60","name":"Alectinib","brand":"Alecensa","type":"TARGETED","cancers":["肺癌"],"verbatim":true,"eff":"2024-06-01","src":"9.60._20240601.pdf","ind":"9.60.Alectinib(如 Alecensa)：(106/11/1、108/12/1、111/2/1、111/8/1、112/11/1、113/6/1)\n1. 適用於 ALK 陽性之晚期非小細胞肺癌第一線治療。(108/12/1、111/8/1)\n2. 須經事前審查核准後使用:\n(1)每次申請事前審查之療程以三個月為限，每三個月需再次申請。\n(2)初次申請時需檢具確實患有非小細胞肺癌之病理或細胞檢查報告及ALK 突變檢測報告，且需符合全民健康保險藥品給付規定之通則十二。(108/12/1、111/2/1、113/6/1)\n(3)再次申請時並需附上治療後相關臨床資料，如給藥 4 週後，需追蹤胸部 X 光或電腦斷層等影像檢查評估療效，往後每 4 週做胸部 X 光檢查，每 3 個月需追蹤其作為評估藥效的影像（如胸部 X 光或電腦斷層） ，若病情惡化即不得再次申請。(112/11/1)\n3. Alectinib 與 ceritinib、crizotinib、brigatinib、lorlatinib 用於ALK 陽性之晚期非小細胞肺癌第一線治療時，僅得擇一使用，除因病人使用後，發生嚴重不良反應或耐受不良之情形外，不得互換。\n(108/12/1、111/8/1、112/11/1)\n4. 每日最大劑量限 1200mg。(108/12/1)","req":"官方條文原文，生效日 2024-06-01｜來源 9.60._20240601.pdf"},{"id":"9.61","name":"Ibrutinib","brand":"Imbruvica","type":"TARGETED","cancers":["淋巴瘤","白血病"],"verbatim":true,"eff":"2026-05-01","src":"9.61._20260501.pdf","ind":"9.61.Ibrutinib (如 Imbruvica)：(106/11/1、108/9/1、111/1/1、112/7/1、112/12/1、113/2/1、114/10/1、115/5/1)\n1.單獨使用於先前接受過至少一種化學或標靶治療方式無效或復發的被套細胞淋巴瘤成年病人。 （106/11/1、112/7/1、112/12/1、115/5/1)\n(1)需經事前審查核准後使用。首次申請事前審查之療程以 4 個月為限，之後每 3 個月需再次申請，再次申請時應檢附前次治療結果評估資料，如影像學檢查報告。\n(2)若疾病進展，則必須停止使用。 （106/11/1、112/7/1)\n(3)每日至多處方 4 粒。(108/9/1)\n(4)zanubrutinib、ibrutinib 和 acalabrutinib 僅能擇一使用，唯有在出現無法忍受其副作用時方可互換。與 acalabrutinib 互換時二者使用總療程合併計算，以全部 20 個月為上限。 （112/7/1、112/12/1、115/5/1）\n2.單獨使用於慢性淋巴球性白血病(CLL)成年病人。 （108/9/1、112/7/1、113/2/1、115/5/1)\n(1)ECOG 分數須≦2。(115/5/1)\n(2)需符合下列任一情況：\nⅠ.具有 17p 缺失。\nⅡ.非 IGHV 突變且曾接受至少 1 種包括 alkylating agent 與 anti-CD20(如 R-CVP、RCHOP、rituximab 加 bendamustine 等)的治療 2 個療程以上仍惡化或復發者。(115/5/1)\nⅢ.CLL 病人需先前曾接受至少 2 線治療(排除僅有口服藥物之療程)，治療中須包括 alkylating agent與 anti-CD20(如 R-CVP、RCHOP、rituximab 加 bendamustine等)的治療，每線治療至少 2 個療程以上後，仍惡化或復發者。(115/5/1)\n(3)開始使用前之疾病狀態需出現下列任一情形：\nⅠ.進行性的血液相惡化至 Hb < 10.0 gm/dL 或 PLT < 100 K/uL，且無其他原因可以解釋。\nⅡ.脾臟腫大超過左肋骨下緣 6cm。\nⅢ.淋巴結腫大，最長徑超過 10cm。\nⅣ.周邊血液淋巴球在 2 個月內增加 50%以上，或倍增時間(doublingtime)小於 6 個月。\nⅤ.出現自體免疫併發症，且經類固醇治療無效。\nⅥ.出現具症狀的淋巴結外病灶。\n(4)需經事前審查核准後使用，每 3 個月需再次申請。再次申請時需檢附療效評估資料，若未達 iwCLL (International Workshop on CLL)最新定義之partial remission 或 complete remission，則不予給付。\n(5)在具有 17p 缺失病人，ibrutinib、acalabrutinib、venetoclax 與zanubrutinib 四者僅能擇一使用，唯有在出現無法忍受其副作用時方可互換。四者使用總療程合併計算，以全部 24 個月為上限。 （108/9/1、112/7/1、114/10/1）\n(6)在非 IGHV 突變二線以上病人及 CLL 三線以上病人，ibrutinib、acalabrutinib 與 zanubrutinib 三者僅能擇一使用，唯有在出現無法忍受其副作用時方可互換。三者使用總療程合併計算，以全部 24 個月為上限。 （115/5/1)\n(7)每日至多處方 3 粒。","req":"官方條文原文，生效日 2026-05-01｜來源 9.61._20260501.pdf"},{"id":"9.62","name":"Pomalidomide","brand":"Pomalyst","type":"TARGETED","cancers":["骨髓瘤"],"verbatim":true,"eff":"2024-09-01","src":"9.62._20240901.pdf","ind":"9.62.Pomalidomide( 如 Pomalyst):(107/1/1 、109/2/1 、112/4/1 、113/9/1)\n1. 與 dexamethasone 合併使用，核准用於多發性骨髓瘤病人，且先前接受過含lenalidomide 和bortezomib 在內的至少兩種療法，且確認完成前次治療時或結束治療後六十天內發生疾病惡化 (disease progression) 。\n2. 限與 elotuzumab 及dexamethasone 併用，治療之前曾接受過至少兩種療法（包括 lenalidomide 和蛋白酶體抑制劑）的多發性骨髓瘤成年病人。\n（113/9/1 ）\n3. 需經事前審查核准後使用： （ 107/1/1 、112/4/1 ）\n(1) 初次申請以 3個療程為限，且需同時符合下列 Ⅰ.與Ⅱ.的條件： （ 112/4/1 ）Ⅰ.具有下列任一疾病惡化的指標： 病人開始治療前須在連續 2次評估中均符合同一指標 ( 但若為 plamacytoma 體積增加，或是新產生的 bone lesion(s)\n或新 plasmacytoma ，則僅需 1次評估 )： （ 112/4/1 ）ⅰ.若前一線治療中 M component 最低值 ≧5 g/dL ，血清 M 蛋白需增加 ≧1\ng/dL ；若前一線治療中 M component 最低值＜5 g/dL ，血清 M 蛋白需增加≧0.5g/dL 。\nⅱ.Urine M-protein 需增加 ≧0.2 gm/24Hr ，且需較前一線治療中的最低值增加≧25% 。\niii. 在 non-secretary myeloma 病人，骨髓漿細胞 (plasma cells) 之比例絕對值增加 ≧10% ，且需較前一線治療中的最低值增加 ≧25% 。\niv. 新產生的 bone lesion(s) 或plasmacytoma ；且須經病理切片證實。\nv.Plasmacytoma 體積增加 ≧50% 。\nvi. 周邊血液中漿細胞比例 ≧20% 或漿細胞絕對值 ≧2000 cells/ μL。\nⅡ.出現下列任一臨床症狀： （ 112/4/1 ）ⅰ.新產生的 bone lesion(s) 或plasmacytoma ；且須經病理切片證實。\nⅱ.Plasmacytoma 體積增加 ≧50% 。\niii. 高血鈣 (corrected serum calcium ＞11.0 mg/dL 或 2.75 mmol/L) 。\niv. 貧血 (Hemoglobin 下降幅度 ≧ 2gm/dL 且無其他原因可以解釋 )。\nv. 腎功能惡化 (eGFR 需下降幅度 ≧25%) ，且無其他原因可以解釋。\nvi. 出現其他 end-organ dysfunctions 。\n(2) 再次申請時必須確定 paraprotein (M-protein) 未上升 (即表示對藥物有反應或為穩定狀態 ); 或對部分 non-secretory type 多發性骨髓瘤病人以骨髓檢查plasma cell 為療效依據，證明為對藥物有反應或為穩定狀態，方可繼續使用。續用時的申請以 3個療程為限。疾病若發生惡化情形應即停止使用。\n（107/1/1 、112/4/1 ）\n4. 每人終生以 10 個療程為上限，Pomado 則每人以 6個療程為上限。 （ 107/1/1 、112/4/1 、113/9/1 ）\n5. 不得與其他蛋白酶體抑制劑 (proteasome inhibitor) 或免疫調節劑(immunomodulatory drugs) 併用。 (109/2/1 、112/4/1)\n6.112 年3月31 日以前已核定用藥之病人，得經事前審查核准後，使用至總療程上限（即終生 10 個療程，Pomado 則每人 6個療程）或使用期間發生疾病惡化為止。 （ 112/4/1 、113/9/1 ）\n7. 每日最多處方 1粒(113/9/1)","req":"官方條文原文，生效日 2024-09-01｜來源 9.62._20240901.pdf"},{"id":"9.63","name":"Lenvatinib","brand":"Lenvima","type":"TARGETED","cancers":["甲狀腺癌","肝細胞癌"],"verbatim":true,"eff":"2025-06-01","src":"9.63._20250601.pdf","ind":"9.63.Lenvatinib(如 Lenvima)：(107/7/1、109/1/1、109/8/1、112/8/1、114/2/1、114/6/1)\n1.用於放射性碘治療無效之局部晚期或轉移性的進行性(progressive)分化型甲狀腺癌(RAI-RDTC)：\n(1)需經事前審查核准後使用，每次申請之療程以3個月為限，送審時需檢送影像資料，每3個月評估一次。\n(2)Lenvatinib 與 sorafenib 不得合併使用。(109/8/1)\n2.晚期肝細胞癌部分：(109/1/1、109/8/1、112/8/1、114/2/1、114/6/1)\n(1)轉移性或無法手術切除且不適合局部治療或局部治療失敗之Child-Pugh A class晚期肝細胞癌成人患者，並符合下列條件之一：\nI.肝外轉移（遠端轉移或肝外淋巴結侵犯）。\nII.大血管侵犯（腫瘤侵犯主門靜脈或侵犯左/右靜脈第一或第二分支）。\nIII.經導管動脈化學藥物栓塞治療（Transcatheter arterial chemoembolization, T.A.C.E.）失敗者，需提供患者於12個月內>=3\n次局部治療之記錄。\n(2)需經事前審查核准後使用，初次申請之療程以3個月為限，之後每3個月評估一次。送審時需檢送影像資料，無疾病惡化方可繼續使用。(109/1/1、114/6/1)\n(3)Lenvatinib、sorafenib、atezolizumab 併用 bevacizumab、tremelimumab 併用 durvalumab 僅得擇一給付，不得互換；且lenvatinib 治療失敗後，不得申請使用 regorafenib 或ramucirumab。(109/1/1、109/8/1、112/8/1、114/2/1)","req":"官方條文原文，生效日 2025-06-01｜來源 9.63._20250601.pdf"},{"id":"9.64","name":"Blinatumomab","brand":"Blincyto","type":"IMMUNO","cancers":["白血病"],"verbatim":true,"eff":"2023-12-01","src":"9.64._20231201.pdf","ind":"9.64.Blinatumomab(如 Blincyto)：(107/9/1、109/12/1、112/12/1)\n1. 適用於治療先前接受至少兩種化療療程(如 TPOG 之療程表)治療無效或已復發第二次或以上費城染色體陰性復發型或頑固型 B 細胞前驅因子之急性淋巴芽細胞白血病之(Ph(-) Relapse/Refractory B-cell precursor Acute Lymphoblastic Leukemia；\nPh(-) B-cell precursor R/R ALL)成人病人，且計畫進行造血幹細胞移植的病人，每位病人限給付2療程。\n2.用於復發型或頑固型 B 細胞前驅細胞之急性淋巴芽細胞白血病之未滿18歲兒童病人，且計畫進行造血幹細胞移植的病人，每位病人限給付2療程，不得與clofarabine 併用。 （109/12/1）\n3.用於治療微量殘留病灶(MRD)陽性 B 細胞前驅細胞之急性淋巴芽細胞白血病：\n(112/12/1)\n(1)符合以下任一條件：\nI.初次治療 B 細胞前驅細胞之急性淋巴芽細胞白血病成人病人，接受過至少三次高強度化學治療療程後，達第一次完全緩解，但仍有大於或等於0.1%微量殘留病灶，且計畫進行造血幹細胞移植，需附上至少三次微量殘留病灶檢驗報告。\nII.第一線治療無效，經第二線治療達到第一次完全緩解之成人病人，但仍有大於或等於0.1%微量殘留病灶，且計劃進行造血幹細胞移植。需附上一次治療無效(骨髓或周邊血芽細胞大於5%)之檢驗報告，及一次經化學治療後微量殘留病灶檢驗報告。\n(2)需為計畫進行造血幹細胞移植者。\n(3)偵測微量殘留病灶之檢測，其敏感度需達10\n-3\n(0.1%)，可用 qPCR (real-timequantitative polymerase chain reaction)，或八色流式細胞儀（8-colormultiparameter flow cytometry）檢查。\n(4)不得與酪胺酸激酶抑制劑(TKI)（如 imatinib、dasatinib、nilotinib、ponatinib）等併用。\n(5)若使用 blinatumomab 後，MRD 若未消失但疾病仍在完全緩解時，不得申請給付inotuzumab ozogamicin。\n(6)每位病人限給付2療程 （56支）。\n4. 須事前審查核准後使用，申請時須檢附完整之造血幹細胞移植計畫，並詳細記載確認捐贈者名單、確認移植之執行醫院及移植前調適治療等資料。\n5.病人已依前述第3項獲得給付治療者，不得再申請前述之第1、2項給付治療。\n(112/12/1)","req":"官方條文原文，生效日 2023-12-01｜來源 9.64._20231201.pdf"},{"id":"9.65","name":"Pralatrexate","brand":"Folotyn","type":"CHEMO","cancers":["淋巴瘤"],"verbatim":false,"eff":"","src":"","ind":"化療失敗後復發/頑固型周邊T細胞淋巴瘤（PTCL）（作為移植銜接治療），限3療程","req":"需事前審查；初次需附移植計畫"},{"id":"9.66","name":"Trifluridine/tipiracil","brand":"Lonsurf","type":"CHEMO","cancers":["大腸直腸癌","胃癌"],"verbatim":true,"eff":"2026-06-01","src":"9.66._20260601.pdf","ind":"9.66.Trifluridine/tipiracil(如Lonsurf)：(107/12/1、109/12/1、110/6/1、113/6/1、115/2/1、115/6/1)\n1.轉移性大腸直腸癌：(107/12/1、109/12/1、110/6/1、113/6/1、115/2/1、115/6/1)\n(1)用於治療先前曾接受下列療法的轉移性大腸直腸癌之成人病人，包括fluoropyrimidine, oxaliplatin及irinotecan為基礎的化療，和抗血管內皮生長因子(anti-VEGF)等療法；若RAS為原生型(wild type)，則需再加上接受過抗表皮生長因子受體(anti-EGFR)療法。需檢附All-RAS基因突變分析檢測結果報告，且需符合全民健康保險藥品給付規定之通則十二。（110/6/1、113/6/1)\n(2)本藥品不得與regorafenib或fruquintinib併用。(107/12/1、115/6/1）\n2.轉移性胃癌：(109/12/1、115/2/1)：用於治療先前曾接受兩種(含)以上治療（包括含 fluoropyrimidine–、platinum–、taxane–或irinotecan 為基礎的化學療法，以及 HER2/neu 標靶治療[如果適合]）的轉移性胃腺癌或胃食道接合處腺癌病人。\n3.病歷應留存確診之病理或檢查報告及影像診斷證明等，並紀錄治療相關臨床資料，以備查核。倘病人臨床症狀或影像顯示疾病惡化，則應停藥。(115/2/1)","req":"官方條文原文，生效日 2026-06-01｜來源 9.66._20260601.pdf"},{"id":"9.67","name":"Ponatinib","brand":"Iclusig","type":"TARGETED","cancers":["白血病"],"verbatim":true,"eff":"2026-02-01","src":"9.67._20260201.pdf","ind":"9.67.Ponatinib(如 Iclusig)：(107/12/1、113/6/1、115/2/1)\n1.用於費城染色體陽性或 BCR-ABL 融合基因陽性之慢性骨髓性白血病(CML)或急性淋巴性白血病(ALL)成人患者，且符合下列條件之一：\n(1).具有T315I 突變者；\n(2).加速期或急性期之慢性骨髓性白血病(CML)患者，先前曾使用 imatinib、nilotinib、dasatinib 與 bosutinib 其中兩種(含)以上藥物治療失敗或無法耐受；(107/12/1、115/2/1)\n(3).急性淋巴性白血病(ALL)患者，先前曾使用 imatinib 與 dasatinib 兩種藥物治療均失敗或無法耐受。\n2.需經事前審查核准後使用。首次申請事前審查之療程以3個月為限，之後每3個月需再次申請，再次申請時應檢附前次治療結果評估資料，包含 BCR-ABL 定量 RT-PCR報告。\n3.若使用後未出現治療反應、無法耐受藥物副作用或疾病進展，則必須停止使用。\n4.1~3項規定內之疾病診斷或追蹤若需依據基因檢測報告，則需符合全民健康保險藥品給付規定之通則十二。(113/6/1)","req":"官方條文原文，生效日 2026-02-01｜來源 9.67._20260201.pdf"},{"id":"9.68","name":"Radium-223","brand":"Xofigo","type":"CHEMO","cancers":["攝護腺癌"],"verbatim":false,"eff":"","src":"","ind":"去勢抗性攝護腺癌（mCRPC）合併症狀性骨轉移（≥2處）且無臟器轉移，最多6療程\n★不得與abiraterone/enzalutamide/denosumab/bisphosphonates合用","req":"需事前審查（每次需骨骼掃描影像）"},{"id":"9.69","name":"免疫檢查點抑制劑（ICI）","brand":"Keytruda/Opdivo/Tecentriq/Imfinzi等","type":"IMMUNO","cancers":["黑色素瘤","肺癌","泌尿道上皮癌","頭頸癌","肝細胞癌","食道癌","胃癌","大腸直腸癌","淋巴瘤","間皮瘤","乳癌","膽道癌"],"verbatim":true,"eff":"2026-06-01","src":"9.69._20260601.pdf","ind":"9.69.免疫檢查點抑制劑(如 atezolizumab；nivolumab；pembrolizumab；\navelumab；ipilimumab；durvalumab；tremelimumab；cemiplimab 製劑)：(108/4/1、108/6/1、109/4/1、109/6/1、109/11/1、110/5/1、110/10/1、111/4/1、111/6/1、112/8/1、112/10/1、112/12/1、113/2/1、113/4/1、113/5/1、113/6/1、113/8/1、114/1/1、114/2/1、114/6/1、114/8/1、114/10/1、115/2/1、115/4/1、115/5/1、115/6/1)\n1.本類藥品得於藥品許可證登載之適應症及藥品仿單內，單獨使用於下列患者：\n(1)黑色素瘤：腫瘤無法切除或轉移之第三期或第四期黑色素瘤病人，先前曾接受過至少一次全身性治療失敗者。\n(2)非小細胞肺癌：(109/4/1、109/11/1、114/6/1、114/8/1)\nI. 鞏固治療：限 durvalumab 用於第三期局部晚期、無法手術切除且腫瘤表現 PD-L1 ≥ 1%之非小細胞肺癌成人病人，非鱗狀癌者需為EGFR/ALK/ROS-1腫瘤基因原生型、鱗狀癌者需為 EGFR/ALK 腫瘤基因原生型，病人須於接受根治性同步放射治療合併至少2個週期含鉑化療後無惡化(無 PD)，且至多使用12個月。(114/8/1)\nII. 非小細胞肺癌第一線用藥：轉移性非小細胞肺癌成人病人，非鱗狀癌者需為 EGFR/ALK/ROS-1腫瘤基因原生型、鱗狀癌者需為EGFR/ALK 腫瘤基因原生型。(114/6/1)\nIII. 鱗狀非小細胞肺癌第二線用藥：先前已使用過 platinum 類化學治療失敗後，又有疾病惡化，且 EGFR/ALK 腫瘤基因為原生型之晚期鱗狀非小細胞肺癌成人病人。\nIV. 肺腺癌第三線用藥：先前已使用過 platinum 類及docetaxel/paclitaxel 類二線(含)以上化學治療均失敗，又有疾病惡化，且 EGFR/ALK/ROS-1腫瘤基因為原生型之晚期非小細胞肺腺癌成人病人。\n(3)典型何杰金氏淋巴瘤：先前已接受自體造血幹細胞移植(HSCT)與移植後 brentuximab vedotin (BV)治療，但又復發或惡化的典型何杰金氏淋巴瘤成人患者。\n(4)泌尿道上皮癌：使用含 atezolizumab 藥品成分須於113年8月1日前審核同意用藥。(109/11/1、112/10/1、113/8/1)\nI.不適合接受化學治療之轉移性泌尿道上皮癌成人患者，且需符合下列條件之一：\ni.CTCAE(the common terminology criteria for adverseevents) v4.0 grade≧2 audiometric hearing lossii.CTCAE v4.0 grade≧2 peripheral neuropathyiii.CIRS(the cumulative illness rating scale) score >6\nII.先前已使用過 platinum 類化學治療失敗後疾病惡化的局部晚期無法切除或轉移性泌尿道上皮癌成人患者。\nIII.限 avelumab 用於接受第一線含鉑化學治療4至6個療程後，疾病未惡化，且達部分緩解（PR）或疾病呈穩定狀態者(SD)之無法手術切除局部晚期(stage Ⅲ)或轉移性泌尿上皮癌(stageⅣ)成人患者之維持療法。(112/10/1）\n(5)頭頸部鱗狀細胞癌(不含鼻咽癌)：(108/4/1、109/11/1、112/12/1、115/2/1)\nI.先前未曾接受全身性治療且無法手術切除之復發性或轉移性(第三期或第四期)頭頸部鱗狀細胞癌成人患者。（112/12/1)\nII.先前已使用過 platinum 類化學治療失敗後，又有疾病惡化的復發性或轉移性(第三期或第四期)頭頸部鱗狀細胞癌成人患者。\n(108/4/1、109/11/1、112/12/1）\n(6)轉移性胃癌：先前已使用過二線(含)以上化學治療均失敗，又有疾病惡化的轉移性胃腺癌成人患者，且於109年4月1日前經審核同意用藥，後續評估符合續用申請條件者。(109/4/1)\n(7)晚期腎細胞癌：先前已使用過至少二線標靶藥物治療均失敗，又有疾病惡化之晚期腎細胞癌，其病理上為亮細胞癌(clear cell renalcarcinoma)之成人患者。\n(8)晚期肝細胞癌：需同時符合下列所有條件：\nⅠ.Child-Pugh A class肝細胞癌成人患者。\nⅡ.先前經 T.A.C.E.於12個月內>=3次局部治療失敗者。\nⅢ.已使用過至少一線標靶藥物治療失敗，又有疾病惡化者。本類藥品與 regorafenib、ramucirumab 僅能擇一使用，且治療失敗時不可互換。(108/6/1、110/5/1)\nⅣ.未曾進行肝臟移植。\nⅤ.於109年4月1日前經審核同意用藥，後續評估符合續用申請條件者。(109/4/1)\n(9)默克細胞癌：限 avelumab 用於先前已使用過 platinum 類化學治療失敗後，又有疾病惡化之轉移性第四期默克細胞癌(Merkel CellCarcinoma)之成人患者。(109/6/1)\n(10)食道鱗狀細胞癌：限 nivolumab 用於曾接受合併含鉑及fluoropyrimidine 化學治療之後惡化的無法切除晚期或復發性食道鱗狀細胞癌病人。(113/4/1、113/6/1、115/2/1)\n(11)大腸直腸癌：限 pembrolizumab 做為無法切除或轉移性高微衛星不穩定性(MSI-H)或錯誤配對修復功能不足性(dMMR)大腸直腸癌(CRC)\n之成年病人第一線治療。(114/6/1)\n2.本類藥品得於藥品許可證登載之適應症及藥品仿單內，併用其他藥品於下列患者：\n(112/12/1、113/4/1、113/6/1、113/8/1、114/2/1、114/6/1、115/2/1、115/4/1、115/6/1)\n(1)晚期肝細胞癌第一線用藥(112/8/1、112/10/1、114/2/1):Ⅰ.限 atezolizumab 與 bevacizumab 併用，或限 durvalumab 與tremelimumab 併用，適用於治療未曾接受全身性療法之轉移性或無法手術切除且不適合局部治療或局部治療失敗之 Child-Pugh Aclass 晚期肝細胞癌成人患者，並符合下列條件之一：\n（112/8/1、112/10/1、114/2/1)\ni.肝外轉移（遠端轉移或肝外淋巴結侵犯）。\nii.大血管侵犯（腫瘤侵犯主門靜脈或侵犯左/右靜脈第一或第二分支）。\niii.經導管動脈化學藥物栓塞治療（Transcatheter arterialchemo embolization, T.A.C.E.）失敗者，需提供患者於12\n個月內>=3次局部治療之紀錄。\nII.須排除有以下任一情形：\ni.曾接受器官移植。\nii.正在接受免疫抑制藥物治療。\niii.有上消化道出血之疑慮且未接受完全治療 (須有半年內之內視鏡評估報告)。\nIII.sorafenib、lenvatinib、atezolizumab 與 bevacizumab 併用、durvalumab 與 tremelimumab併用僅得擇一給付，不得互換。\n(114/2/1)\nIV.atezolizumab 與 bevacizumab 併用或 durvalumab 與tremelimumab 併用治療失敗後，不得申請使用 regorafenib 或ramucirumab。(114/2/1)\n(2)非小細胞肺癌：(112/12/1、113/4/1、113/8/1、114/6/1、115/6/1)\nI.非小細胞肺癌術前輔助治療：限用於可切除（腫瘤≧4 公分或淋巴結陽性 N1/N2(排除 N3)，且無疾病轉移 M0）之不具 EGFR 或 ALK 腫瘤基因異常成人病人，且至多 3 個療程，並依下列條件使用(115/6/1)\ni.非鱗狀非小細胞肺癌：限 nivolumab 與 pemetrexed(限使用Pexeda、Apeta 或 Pemetrexed Sandoz)及含鉑化療併用。\nii.鱗狀細胞非小細胞肺癌：限 nivolumab 與含鉑化療併用。\nII. 轉移性鱗狀非小細胞肺癌第一線用藥：限 pembrolizumab 與carboplatin 及 paclitaxel 併用至多使用 4 個療程，接續單用pembrolizumab 治療。(112/12/1、113/4/1、113/8/1)\nIII. 轉移性非鱗狀非小細胞肺癌第一線：限 pembrolizumab 與pemetrexed(限使用Pexeda、Apeta 或 Pemetrexed Sandoz)及含鉑類化學療法併用 ， 或限atezolizumab與bevacizumab(限使用Alymsys、Avastin、Abevmy、Vegzelma 或 Mvasi)及 carboplatin、paclitaxel併用，做為轉移性且不具有EGFR/ALK/ROS-1 腫瘤基因異常的非鱗狀非小細胞肺癌第一線治療。(114/6/1、114/8/1)\n(3)小細胞肺癌：限 atezolizumab 與 carboplatin 及 etoposide 併用，或 durvalumab 與 etoposide 及 carboplatin 或 cisplatin 兩者之一併用，適用於先前未曾接受化療，且無腦部或無脊髓轉移之擴散期(extensive stage)小細胞肺癌成人患者。(112/12/1、114/2/1)\n(4)惡性肋膜間皮瘤：限 ipilimumab 與 nivolumab 併用於無法切除之惡性肋膜間皮瘤且病理組織顯示為非上皮型(Non-epithelioid)成人病人的第一線治療。(113/4/1、113/6/1、115/2/1)\n(5)胃癌（不含胃腸基質瘤及神經內分泌腫瘤/癌）：(113/4/1、113/6/1、115/2/1、115/4/1)\nI.限 nivolumab 併用 fluoropyrimidine（5-FU 或 capecitabine）及 oxaliplatin，用於第一線治療晚期或轉移性且不具有 HER2過度表現的胃癌病人。(113/4/1、113/6/1、115/2/1)\nII. 與 zolbetuximab 僅得擇一使用，且治療失敗時不可互換。\n(115/4/1)\n(6)膽道癌第一線用藥：限 durvalumab 與 cisplatin 及 gemcitabine 併用至多使用8個療程，接續單用 durvalumab 於先前未接受過治療或不可手術之局部晚期或轉移性膽道癌 (biliary tract cancer)，並須排除以下任一情形：(114/2/1)\nⅠ.壺腹癌。\nⅡ.曾接受異體器官移植。\nⅢ.具有或曾有活動性自體免疫或發炎性疾病。\n(7)早期三陰性乳癌：非轉移性、第 II 期至第 IIIb 期（cT1c N1-2或T2-4 N0-2）成年病人(114/6/1)：\nI.術前前導性治療：限 pembrolizumab 每3週1次與 carboplatin 和paclitaxel 併用至多4個療程，接續限pembrolizumab每3週1次與 cyclophosphamide 和 doxorubicin 或 epirubicin 併用至多4\n個療程，做為初診斷病人前導性治療用藥。\nII.術後輔助治療：上述病人接受過術前前導性治療後，限手術後未達 pCR 者，單用pembrolizumab 每
