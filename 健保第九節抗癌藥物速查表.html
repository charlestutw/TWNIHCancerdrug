估疾病呈未確認疾病惡化者(iUPD)，可持續用藥4-8週後再次評估；如再次評估，結果為疾病惡化 iCPD (PD)\n者，應停止用藥。(115/6/1)\nⅢ.出現疾病惡化 iCPD (PD)或出現中、重度或危及生命之藥物不良反應者，應停止用藥；(109/4/1、115/6/1)\nⅢ.出現疾病併發症或輕度藥物不良反應等，暫停用藥超過原事前審查核定日起24週期限者，不得申請續用。\nⅣ.使用atezolizumab、pembrolizumab、durvalumab、tremelimumab後評估疾病呈穩定狀態者(SD)，可持續再用藥12週，並於12週後再次評估；經連續二次評估皆為 SD 者，不得申請續用。\ndurvalumab 用於非小細胞肺癌之鞏固治療不在此限。(114/8/1、115/6/1)\nⅤ使用於早期三陰性乳癌，術前前導性治療腫瘤惡化 iCPD 者，或術後輔助治療復發者，不得申請續用。(114/6/1、115/6/1)\n(9)申請續用時，需檢附病人12週內之評估資料如下：(108/6/1、109/11/1、115/6/1)\nI.病人身體狀況良好(ECOG≦1)及心肺與肝腎功能之評估資料。\nII.以 i-RECIST 標準(HCC 患者以 mRECIST 標準)評定之藥物療效反應(PR、CR、SD)資料、影像檢查及報告(如胸部 X 光、電腦斷層或其他可作為評估的影像)，此影像證明以可測量(measurable)的病灶為優先，如沒有可以測量的病灶，則可評估(evaluable)的病灶亦可採用。(108/6/1、115/6/1)\n備註：上述影像檢查之給付範圍不包括正子造影(PET)。\nⅢ.單獨使用 pembrolizumab於泌尿道上皮癌第一線用藥時，須另檢附下列其中一項佐證資料：(108/6/1、109/11/1、114/6/1、115/2/1)\ni.CTCAE(the common terminology criteria for adverseevents) v4.0 grade≧2 audiometric hearing lossⅱ.CTCAE v4.0 grade≧2 peripheral neuropathyⅲ.CIRS(the cumulative illness rating scale) score >6\nIV.使用於早期三陰性乳癌術後輔助治療時，須檢附於乳房和/或手術切除的淋巴結中發現有殘餘的侵襲性癌症(non-pCR)佐證。\n(114/6/1)\nⅤ其他佐證病歷資料。\n4.登錄與結案作業：(109/11/1、114/1/1）\n(1)醫師處方使用本類藥品，倘病人結束治療、停止用藥、未通過續用申請或達給付時程期限時，醫事機構須在28天內於 VPN 系統登錄結案。逾期未登錄結案者，系統自動結案，且不予支付該個案自前次事前審查核定日後申報之藥費。(109/11/1、114/1/1)\n(2)已結案者自結案日後不予支付藥費。","req":"官方條文原文，生效日 2026-06-01｜來源 9.69._20260601.pdf"},{"id":"9.70","name":"Pertuzumab","brand":"Perjeta","type":"TARGETED","cancers":["乳癌"],"verbatim":true,"eff":"2025-12-01","src":"9.70._20251201.pdf","ind":"9.70.Pertuzumab(如 Perjeta)：(108/5/1、108/12/1、112/8/1、113/12/1、114/1/1、114/5/1、114/12/1)\n1.本藥品與 trastuzumab 及化學療法併用於具 HER2過度表現（IHC3+或FISH+），且具腋下淋巴結轉移但無遠處臟器轉移之早期乳癌病人（113/12/1、114/5/1、114/12/1）\n(1)使用於術前輔助治療，經外科手術後達病理上完全緩解者（pCR），得繼續使用至18個療程為上限。\n(2)若未接受術前輔助治療，即先行手術者，可給予術後輔助治療，以18個療程為使用上限。\n(3)下列Ｉ~Ⅲ使用於外科手術前後之總療程合併計算，依藥品仿單記載以18個療程為上限：\nＩ：pertuzumab 與 trastuzumab 併用Ⅱ：trastuzumabⅢ：pertuzumab 與 trastuzumab 皮下注射複方製劑(如 Phesgo)\n(4)須經事前審查核准後使用，核准後每24週須檢附療效評估資料再次申請，若疾病有惡化情形即不應再行申請。（113/12/1、114/5/1）\n2.轉移性乳癌(108/5/1、108/12/1、112/8/1、113/12/1)\n(1)Pertuzumab 與 trastuzumab 及 docetaxel 併用於治療轉移後未曾以抗 HER2或化學療法治療之 HER2過度表現(IHC3+或 FISH+)轉移性乳癌病人。(108/12/1、112/8/1)\n(2)須經事前審查核准後使用，核准後每18週須檢附療效評估資料再次申請，若疾病有惡化情形即不應再行申請，每位病人至多給付18個月為限。(108/5/1)\n(3)下列Ｉ~Ⅱ使用於轉移性乳癌總療程合併計算，以全部18個月為上限(113/12/1)：\nＩ：pertuzumab 與 trastuzumab 併用Ⅱ：pertuzumab 與 trastuzumab 皮下注射複方製劑(如 Phesgo)\n(4)先前於早期乳癌已使用 pertuzumab 與 trastuzumab 併用或使用pertuzumab 與 trastuzumab 皮下注射複方製劑(如 Phesgo)者，不得再次申請 pertuzumab 與 trastuzumab 併用，惟於早期乳癌治療結束至首次疾病復發轉移時間超過12個月以上者得再次申請。\n(113/12/1)","req":"官方條文原文，生效日 2025-12-01｜來源 9.70._20251201.pdf"},{"id":"9.71","name":"Venetoclax","brand":"Venclexta","type":"TARGETED","cancers":["白血病"],"verbatim":true,"eff":"2025-10-01","src":"9.71._20251001.pdf","ind":"9.71. Venetoclax (如 Venclexta)：(108/9/1、110/7/1、112/7/1、114/8/1、114/10/1)\n1.單獨使用於具有17p 缺失的慢性淋巴球性白血病(CLL) 成年患者。 （108/9/1、112/7/1、114/10/1)\n(1)限先前曾接受至少1種包括 alkylating agent 與 anti-CD20 (如 R-CVP、R-CHOP、rituximab 加 bendamustine 等)的治療2個療程以上仍惡化或復發者。\n(2)開始使用前之疾病狀態需出現下列任一情形：\nⅠ.進行性的血液相惡化至 Hb< 10.0gm/dL 或 PLT<100K/uL，且無其他原因可以解釋。\nⅡ.脾臟腫大超過左肋骨下緣6cm。\nⅢ.淋巴結腫大，最長徑超過10cm。\nⅣ.周邊血液淋巴球在2個月內增加50%以上，或倍增時間(doubling time)小於6\n個月。\nⅤ.出現自體免疫併發症，且經類固醇治療無效。\nⅥ.出現具症狀的淋巴結外病灶。\n(3)需經事前審查核准後使用，每3個月需再次申請。再次申請時需檢附療效評估資料，若未達 iwCLL(International Workshop on CLL)最新定義之 partialremission 或 complete remission，則不予給付。\n(4) 在具有17p 缺失病人，venetoclax、acalabrutinib、ibrutinib 及zanubrutinib 四者僅能擇一使用，唯有在出現無法忍受其副作用時方可互換。\n三者使用總療程合併計算，以全部24個月為上限。 （108/9/1、112/7/1、114/10/1)\n(5)每日至多處方4粒。\n2.併用低劑量 cytarabine 或 azacitidine(除 Winduza 及 Azacitidine LyophilizedInj 100mg\"GBC\"以外)，使用於無法接受高強度化學治療之初診斷急性骨髓性白血病(AML)病人：(110/7/1、114/8/1)\n(1)需具有下列 I.或Ⅱ.的條件之一：\nI.75歲以上。\nⅡ.18歲以上但未滿75歲時，需ECOG performance status 為2或3，且符合下列任一條件者：\nA.具有心臟衰竭治療病史，且 left ventricle ejection fraction (LVEF)\n＜50%。\nB.具慢性肺部疾病史，且 DLCO＜65%。\nC.具肝功能異常：Bilirubin level 在1.5-3.0倍正常值間。\n(2)需未曾因骨髓化生不良症候群(myelodysplastic syndrome, MDS)接受過azacitidine 治療者。\n(3)需經事前審查核准後使用，每2個療程需再次申請；再次申請時需檢附療效評估資料，若病情惡化應即停止使用。\n(4)若併用低劑量 cytarabine，每日至多處方6粒，最多給付4個療程。若併用azacitidine 治療，每日至多處方4粒，最多給付6個療程。(110/7/1、114/8/1)","req":"官方條文原文，生效日 2025-10-01｜來源 9.71._20251001.pdf"},{"id":"9.72","name":"CDK4/6抑制劑","brand":"Kisqali（ribociclib）/ Ibrance（palbociclib）","type":"TARGETED","cancers":["乳癌"],"verbatim":true,"eff":"2025-07-01","src":"9.72._20250701.pdf","ind":"9.72.CDK4/6抑制劑 (如 ribociclib；palbociclib)：(108/10/1、108/12/1、109/4/1、109/10/1、110/5/1、110/10/1、113/1/1、113/3/1、114/7/1)\n1.用於停經後乳癌婦女發生遠端轉移後之全身性藥物治療，須完全符合以下條件：(109/10/1、110/5/1、110/10/1、113/1/1)\n(1)荷爾蒙接受體為：ER 或 PR >30%。（109/10/1、113/1/1)\n(2)HER-2 檢測為陰性。\n(3)經完整疾病評估後未出現器官轉移危急症狀 (visceral crisis)且無中樞神經系統(CNS)轉移。 （110/10/1）\n(4)骨轉移不可為唯一轉移部位。 （110/10/1）\n(5)病患目前未接受卵巢功能抑制治療 (包含 GnRH analogue 等) 且滿足下列條件之一： （110/5/1）Ⅰ.年齡滿55歲。\nⅡ.曾接受雙側卵巢切除術。\nⅢ.FSH 及 estradiol 血液檢測值在停經後數值範圍內。\n2.用於停經前/正在停經乳癌婦女及男性乳癌發生遠端轉移後之全身性藥物治療，須與芳香環轉化酶抑制劑及 GnRH analogue 併用。 （113/1/1、114/7/1）\n(1)荷爾蒙接受體為：ER 或 PR >30%。\n(2)HER-2 檢測為陰性。\n(3)經完整疾病評估後未出現器官轉移危急症狀 (visceral crisis)且無中樞神經系統(CNS)轉移。\n(4)骨轉移不可為唯一轉移部位。\n3.經事前審查核准後使用，核准後每24週須檢附療效評估資料再次申請，若疾病惡化即必須停止使用，且後續不得再申請使用本類藥品。\n（110/10/1）\n4.使用限制：\n(1)ribociclib 每日最多處方3粒。\n(2)palbociclib 每日最多處方1粒。\n(3)本類藥品僅得擇一使用，唯有在耐受不良時方可轉換使用，使用總療程合併計算，以每人終生給付24個月為上限。\n5.110年9月30日以前已核定用藥之病人，得經事前審查核准後，使用至總療程(即終生24個月)或總療程期間疾病惡化為止，且後續不得再申請使用本類藥品。 （110/10/1、113/1/1）\n6.若先前使用 everolimus 無效後，不得再申請本類藥品。(109/4/1)\n7.若先前於早期乳癌使用 abemaciclib 無效後，不得再申請本類藥品。\n(113/3/1)","req":"官方條文原文，生效日 2025-07-01｜來源 9.72._20250701.pdf"},{"id":"9.73","name":"Inotuzumab ozogamicin","brand":"Besponsa","type":"TARGETED","cancers":["白血病"],"verbatim":true,"eff":"2023-12-01","src":"9.73._20231201.pdf","ind":"9.73.Inotuzumab ozogamicin (如 Besponsa)：(108/11/1、112/12/1)\n1.適用於治療患有復發型或頑固型且 CD22為陽性之 B 細胞前驅因子之急性淋巴芽細胞白血病(B-ALL)，且計畫進行造血幹細胞移植之成人病患。\n2.上述成人病患如具費城染色體陽性(Ph+)，應至少使用過兩種酪胺酸激酶抑制劑(TKI)藥物治療無效。\n3.每位病人限給付2療程，需事前審查核准後使用。申請時需檢附完整之造血幹細胞移植計畫，並詳細記載確認移植之執行醫院及移植前調適治療等資料。\n4.不得與 blinatumomab（如 Blincyto）或酪胺酸激酶抑制劑(TKI)（如 imatinib、dasatinib、ponatinib）等併用。\n5.病人若已依達完全緩解但仍有殘餘疾病(MRD)之條件取得 blinatumomab 給付同意並接受治療後 ，MRD 若未消失但疾病仍在完全緩解時 ，不得申請給付 inotuzumabozogamicin。 （112/12/1）","req":"官方條文原文，生效日 2023-12-01｜來源 9.73._20231201.pdf"},{"id":"9.74","name":"Cabozantinib","brand":"Cabometyx","type":"TARGETED","cancers":["腎細胞癌","甲狀腺癌"],"verbatim":true,"eff":"2025-08-01","src":"9.74._20250801.pdf","ind":"9.74.Cabozantinib (如 Cabometyx)： (108/12/1、110/12/1、114/8/1)\n1.腎細胞癌(108/12/1、110/12/1)\n(1)適用於未曾接受過治療的中度/重度風險晚期腎細胞癌病人。\n（110/12/1）Ⅰ.無效後則不給付 temsirolimus。\nⅡ.病人若對藥物產生耐受性不佳（intolerance），則以原來藥物減量為原則，若嚴重耐受性不佳，可以換其他 TKI。\n(2)適用於先前經抗血管新生療法 (anti-angiogenic therapy)治療無效的晚期腎細胞癌病人。\n(3)須經事前審查核准後使用，每次申請療程以3個月為限，送審時需檢送影像資料，每3個月評估一次，無疾病惡化方可繼續使用。\n（110/12/1）\n(4)病人於第一線使用本藥物後再復發或惡化時，不得再次申請使用。\n（110/12/1）\n2.甲狀腺癌(114/8/1)\n(1)適用於治療成人及12歲以上兒童曾接受 VEGFR 標靶治療後惡化、放射碘治療無效或不適用放射碘治療的局部晚期或轉移性分化型甲狀腺癌病人。\n(2)須經事前審查核准後使用，每次申請療程以3個月為限，送審時需檢送影像資料，每3個月評估一次，無疾病惡化方可繼續使用。\n3.每日限用1粒。","req":"官方條文原文，生效日 2025-08-01｜來源 9.74._20250801.pdf"},{"id":"9.75","name":"Carfilzomib","brand":"Kyprolis","type":"TARGETED","cancers":["骨髓瘤"],"verbatim":true,"eff":"2024-04-01","src":"9.75._20240401.pdf","ind":"9.75. Carfilzomib (如 Kyprolis)：(109/2/1、112/4/1、113/4/1)\n1.與 dexamethasone 合併使用於先前曾接受含 bortezomib 及lenalidomide 兩種治療後無法耐受或惡化之病患，且須具有良好日常體能狀態(ECOG < 2)及足夠腎功能(CrCl≥50 ml/minute)的多發性骨髓瘤成年患者。\n2.與 isatuximab/dexamethasone 併用，治療先前曾接受至少一種含bortezomib 或 lenalidomide 之療法治療失敗的多發性骨髓瘤成人患者，且須具有良好日常體能狀態 (ECOG < 2) 者。 （113/4/1）\n3.需經事前審查核准後使用： （109/2/1、112/4/1）\n(1)初次申請以4個療程(每療程為4週)為限，且需同時符合下列Ⅰ.與Ⅱ.的條件： （109/2/1、112/4/1）Ⅰ.具有下列任一疾病惡化的指標： 病患開始治療前須在連續2次評估中均符合同一指標 (但若為 plamacytoma 體積增加，或是新產生的 bonelesion(s)或新 plasmacytoma，則僅需1次評估)： （112/4/1）o.若前一線治療中 M component 最低值≧5 g/dL，血清 M 蛋白需增加≧1 g/dL；若前一線治療中 M component 最低值＜5 g/dL，血清 M 蛋白需增加≧0.5g/dL。\np.Urine M-protein 需增加≧0.2 gm/24Hr，且需較前一線治療中的最低值增加≧25%。\niii.在 non-secretary myeloma 病患，骨髓漿細胞 (plasma cells)之比例絕對值增加≧10%，且需較前一線治療中的最低值增加≧25%。\niv.新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。\nv. Plasmacytoma 體積增加≧50%。\nvi.周邊血液中漿細胞比例≧20%或漿細胞絕對值≧2000 cells/μL。\nⅡ.出現下列任一臨床症狀： （112/4/1）o.新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。\np.Plasmacytoma 體積增加≧50%。\niii.高血鈣(corrected serum calcium＞11.0 mg/dL 或 2.75\nmmol/L)。\niv.貧血(Hemoglobin 下降幅度≧ 2gm/dL 且無其他原因可以解釋)。\nv.腎功能惡化(eGFR 需下降幅度≧25%)，且無其他原因可以解釋。\nvi.出現其他 end-organ dysfunctions。\n(2)再次申請時必須確定 paraprotein (M-protein)未上升(即表示對藥物有反應或為穩定狀態);或對部分 non-secretory type MM 病人以骨髓檢查 plasma cell 為療效依據，證明為對藥物有反應或為穩定狀態，方可繼續使用。續用時的申請每次以3個療程為限。\n(3)每人終生以10個療程為上限。 （109/2/1、112/4/1）\n4. 不得與其他蛋白酶體抑制劑(proteasome inhibitor)或免疫調節劑(immunomodulatory drugs) 或 daratumumab 併用。 （109/2/1、112/4/1、113/4/1）\n5. 112年3月31日以前已核定用藥之病人，得經事前審查核准後，使用至總療程上限（即終生10個療程）或使用期間發生疾病惡化為止。\n（112/4/1）","req":"官方條文原文，生效日 2024-04-01｜來源 9.75._20240401.pdf"},{"id":"9.76","name":"Midostaurin","brand":"Rydapt","type":"TARGETED","cancers":["白血病"],"verbatim":true,"eff":"2025-10-01","src":"9.76._20251001.pdf","ind":"9.76.Midostaurin (如 Rydapt)：(109/2/1、113/6/1、114/10/1)\n1.限用於新確診為 FLT3突變陽性的急性骨髓性白血病(AML)成人病患之標準前導與鞏固性化療時合併使用。\n2.需排除急性前骨髓性細胞白血病（acute promyelocytic leukemia，APL）的患者。\n3.首次用於標準前導期，可免事前審查，以2個療程為限，若2個療程後仍未達完全緩解之病患即不得再使用。\n4.續用時需經事前審查核准後使用，申請時須檢附 FLT3突變陽性檢測結果報告，且需符合全民健康保險藥品給付規定之通則十二，及日期、化學治療處方紀錄及療效評估，每次續用申請以2個療程為限，並需檢附前次治療結果評估資料證實無疾病進展，才可繼續使用。每人以總共給付6個療程為上限。(113/6/1)\n5.若病患接受造血幹細胞移植後則將不再給付本藥品。\n6.本藥品與 quizartinib 僅得擇一使用，除因耐受性不良，不得互換。\n(114/10/1)","req":"官方條文原文，生效日 2025-10-01｜來源 9.76._20251001.pdf"},{"id":"9.77","name":"Ixazomib","brand":"Ninlaro","type":"TARGETED","cancers":["骨髓瘤"],"verbatim":true,"eff":"2023-04-01","src":"9.77._20230401.pdf","ind":"9.77. Ixazomib (如 Ninlaro)：(109/3/1、112/4/1)\n1.與 lenalidomide 及 dexamethasone 合併使用於先前已接受至少一種治療失敗之多發性骨髓瘤病患，並符合下列條件之一：\n(1)體能不適合(unfit)化療標靶注射治療者。\n(2) 曾接受 bortezomib 治療失敗，但有嚴重心血管共病無法接受 carfizomib 治療之病患。 （109/3/1、112/4/1）\n2.前述病患若於第二線治療使用，則需為具高風險細胞遺傳異常的病人群 (包括具del（17p） 、t（4；14） 、t(14；16)及1q21 amplification 等染色體變化者)；若為第三線以上治療使用，則不需為具高風險遺傳異常者。\n3. 需經事前審查核准後使用： （109/3/1、112/4/1）\n(1) 初次申請以4個療程為限，且需同時符合下列Ⅰ.與Ⅱ.的條件： （109/3/1、112/4/1）Ⅰ.具有下列任一疾病惡化的指標： 病患開始治療前須在連續2次評估中均符合同一指標 (但若為 plamacytoma 體積增加，或是新產生的 bone lesion(s)或新plasmacytoma，則僅需1次評估)： （112/4/1）o.若前一線治療中 M component 最低值≧5 g/dL，血清 M 蛋白需增加≧1 g/dL；\n若前一線治療中 M component 最低值＜5 g/dL，血清 M 蛋白需增加≧0.5g/dL。\np.Urine M-protein 需增加≧0.2 gm/24Hr，且需較前一線治療中的最低值增加≧25%。\niii.在 non-secretary myeloma 病患，骨髓漿細胞 (plasma cells)之比例絕對值增加≧10%，且需較前一線治療中的最低值增加≧25%。\niv.新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。\nv. Plasmacytoma 體積增加≧50%。\nvi.周邊血液中漿細胞比例≧20%或漿細胞絕對值≧2000 cells/μL。\nⅡ.出現下列任一臨床症狀： （112/4/1）o.新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。\np. Plasmacytoma 體積增加≧50%。\niii.高血鈣(corrected serum calcium＞11.0 mg/dL 或 2.75 mmol/L)。\niv.貧血(Hemoglobin 下降幅度≧ 2gm/dL 且無其他原因可以解釋)。\nv.腎功能惡化(eGFR 需下降幅度≧25%)，且無其他原因可以解釋。\nvi.出現其他 end-organ dysfunctions。\n(2) 後續每次申請以4個療程(每療程為4週)為限，續用申請時必須確定paraprotein (M-protein)未上升(即表示對藥物有反應或為穩定狀態)或對部分non-secretory type MM 病人以骨髓檢查 plasma cell 為療效依據，方可繼續使用。 （109/3/1、112/4/1）\n(3) 每人終生以12個療程為上限。 （109/3/1、112/4/1）\n4. 除 lenalidomide 外，本案藥品不得與其他蛋白酶體抑制劑(proteasomeinhibitor)或免疫調節劑(immunomodulatory drugs)併用。 （109/3/1、112/4/1）\n5. 112年3月31日以前已核定用藥之病人，得經事前審查核准後，使用至總療程上限（即終生12個療程）或使用期間發生疾病惡化為止。 （112/4/1）","req":"官方條文原文，生效日 2023-04-01｜來源 9.77._20230401.pdf"},{"id":"9.78","name":"Daratumumab","brand":"Darzalex","type":"TARGETED","cancers":["骨髓瘤"],"verbatim":true,"eff":"2025-09-01","src":"9.78._20250901.pdf","ind":"9.78.Daratumumab(如 Darzalex 靜脈注射劑與皮下注射劑)：(109/4/1、112/4/1、113/4/1、114/9/1)\n1.治療適合接受自體幹細胞移植的新診斷多發性骨髓瘤成人病人：\n(114/9/1)\n(1) 限與 bortezomib、thalidomide及 dexamethasone 併用。\n(2) 開始治療時病人須同時符合下列Ⅰ.與Ⅱ.的條件：\nI. 骨髓漿細胞(plasma cells)比例≧10%，或是經切片確認且有≧1 顆的plasmacytoma。\nII. 出現下列任一臨床症狀：\ni. 腎功能不全：serum creatinine＞2.0mg/dL 或 estimated GFR(eGFR)＜40 ml/min，且無其他原因可以解釋。\nii. 高血鈣(corrected serum calcium＞11.0 mg/dL 或 2.75\nmmol/L)。\niii. 貧血(Hemoglobin＜10 gm/dL 且無其他原因可以解釋)。\niv. 影像檢查確認之 osteolytic bone lesion(s)。\nv. 骨髓漿細胞(plasma cells)比例≧60%。\nvi. Serum free light-chain ratio≧100。\n(3) 首次申請為 12 次輸注，須檢附完整之造血幹細胞移植計畫，並詳細記載確認捐贈者名單及移植前調適治療等資料。需由具訓練血液及骨髓移植醫師能力之醫院申請，並由完成血液及骨髓移植訓練之醫師確認移植計畫。\n(4) 再次申請為 4 次輸注，應檢附移植相關資料，且第一線治療總共以 16\n次輸注為上限。\n2.限與 bortezomib/dexamethasone 或 lenalidomide/dexamethasone 併用，治療先前曾接受至少 1 種含 bortezomib 或 lenalidomide 之療法治療失敗的多發性骨髓瘤成人患者，且須具有良好日常體能狀態(ECOG < 2)者，以總共 22 次輸注為上限。(109/4/1、112/4/1、114/9/1)\n(1)須經事前審查核准後使用：首次申請為 10 次輸注，且需同時符合下列Ⅰ.、Ⅱ.與Ⅲ.的條件：(109/4/1、112/4/1、114/9/1)\nI. 病人先前未曾接受過 daratumumab 之治療。(114/9/1)\nII. 具有下列任一疾病惡化的指標：病患開始治療前須在連續 2 次評估中均符合同一指標(但若為 plamacytoma 體積增加，或是新產生的bone lesion(s)或新 plasmacytoma，則僅需 1 次評估)：（112/4/1）i.若前一線治療中 M component 最低值≧5 g/dL，血清 M 蛋白需增加≧1 g/dL；若前一線治療中 M component 最低值＜5 g/dL，血清 M蛋白需增加≧0.5g/dL。\nii.Urine M-protein 需增加≧0.2 gm/24Hr，且需較前一線治療中的最低值增加≧25%。\niii.在 non-secretary myeloma 病患，骨髓漿細胞 (plasma cells)之比例絕對值增加≧10%，且需較前一線治療中的最低值增加≧25%。\niv.新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。\nv.Plasmacytoma 體積增加≧50%。\nvi.周邊血液中漿細胞比例≧20%或漿細胞絕對值≧2000 cells/μL。\nIII. 出現下列任一臨床症狀： （112/4/1）i. 新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。\nii. Plasmacytoma 體積增加≧50%。\niii. 高血鈣(corrected serum calcium＞11.0 mg/dL 或 2.75 mmol/L)。\niv. 貧血(Hemoglobin 下降幅度≧ 2gm/dL 且無其他原因可以解釋)。\nv. 腎功能惡化(eGFR 需下降幅度≧25%)，且無其他原因可以解釋。\nvi. 出現其他 end-organ dysfunctions。\n(2)之後申請則為每次 4 次輸注，申請時必須確定 paraprotein (M-protein)未上升(即表示對藥物有反應或為穩定狀態)，或對部分 non-secretory type MM 病人以骨髓檢查 plasma cell 為療效依據，方可繼續使用。(109/4/1、112/4/1)\n3.除 lenalidomide、thalidomide或 bortezomib 外，本案藥品不得與其他蛋白酶體抑制劑(proteasome inhibitor)或免疫調節劑(immunomodulatory drugs)併用。(109/4/1、112/4/1、114/9/1)\n4.112 年 3 月 31 日以前已核定用藥之病人，得經事前審查核准後，使用至總療程上限（第一線治療以總共 16 輸注為上限，第二線以上治療以總共 22\n次輸注為上限，接受第一線治療以後，不再給付第二線以上治療）或使用期間發生疾病惡化為止。 （112/4/1、114/9/1）\n5.Daratumumab 與 isatuximab二者僅能擇一使用，除因藥物耐受不良以外，不可以其他原因申請互換使用。 （113/4/1）","req":"官方條文原文，生效日 2025-09-01｜來源 9.78._20250901.pdf"},{"id":"9.79","name":"Obinutuzumab","brand":"Gazyva","type":"TARGETED","cancers":["淋巴瘤","白血病"],"verbatim":true,"eff":"2025-08-01","src":"9.79._20250801.pdf","ind":"9.79.Obinutuzumab(如 Gazyva)： （109/4/1、113/2/1、114/8/1）\n1.限用於第一次接受含 rituximab治療後治療無效或治療結束後6個月內復發的濾泡性淋巴瘤(follicular lymphoma)患者。\n(1)需經事前審查核准後使用：\nⅠ.首次申請限6個療程(共8次治療)，且需與 bendamustine 併用。\nⅡ.經治療後達 partial remission或 complete remission病患可續申請 obinutuzumab 單一藥物維持治療，每次申請最多12個月(6個療程)，每12個月須進行疾病評估，若病情惡化應即停止使用。\nⅢ.每位病人最多給付24個月(12個療程)維持治療。\n(2)病患曾使用本藥物後再復發或惡化時，不得再申請使用。\n2.限與 chlorambucil 併用於治療先前未曾接受過治療，且具有合併症(comorbidities)而不適合接受含 fludarabine 治療的 CD20陽性慢性淋巴球性白血病（CLL）患者。 （113/2/1）\n(1)Rai StageⅢ/Ⅳ(或Binet C級)之 CLL 病人。若用於 RaiStageⅠ/Ⅱ(或 Binet A/B級)併有疾病相關免疫性症候(如自體免疫性溶血、免疫性血小板低下紫瘢症等)的病人時，需符合具有CD20陽性。\n(2)需經事前審查核准後使用，首次申請限6個療程(共8次治療)。\n(3)病患曾使用本藥物後再復發或惡化時，不得再申請使用。\n3.限與 zanubrutinib 併用，治療先前曾接受至少兩線(每線至少4個療程)全身性治療無效或復發的濾泡性淋巴瘤成人病人。(114/8/1)\n(1)需曾接受過至少一種anti-CD20 monoclonal antibody及一種靜脈注射型之 alkylating agent治療。\n(2)需符合 WHO 淋巴瘤分類為I、II 或 IIIa 期的診斷。\n(3)開始使用前之疾病狀態需出現下列任一情形：\nI. 有單一腫瘤直徑7公分以上者；\nII. 有三顆以上之腫瘤其直徑大於3公分以上者；\nIII.脾臟腫大，其長度16公分以上者；\nIV. 對 vitalorgans 造成擠壓者；\nV. 周邊血中出現淋巴球增生超過5000/mm3\n者；\nVI. 出現任一系列血球低下者（platelet<100,000/ mm3\n，或Hb<10gm/dL，或 absolute neutrophil count<1500/ mm3\n)。\nVII.B symptoms。\n(4)需經事前審查核准後使用，每3 個月需再次申請，再次申請時需檢附療效評估資料，若未達 partial remission或 completeremission，則不予給付。\n(5)總療程以全部24個月為上限。Obinutuzumab 總療程以給付18支為限。\n4.限以 obinutuzumab 1,000mg作為 glofitamab 用於治療先前曾接受至少兩線全身治療之復發性或難治性瀰漫性大 B 細胞淋巴瘤 (DLBCL)\n的成人病人之前置治療，需與 glofitamab 首次治療同時申請事前審查並經核准後使用。(114/8/1）","req":"官方條文原文，生效日 2025-08-01｜來源 9.79._20250801.pdf"},{"id":"9.80","name":"Osimertinib","brand":"Tagrisso","type":"TARGETED","cancers":["肺癌"],"verbatim":true,"eff":"2024-10-01","src":"9.80._20241001.pdf","ind":"9.80.Osimertinib (如 Tagrisso)：(109/4/1、109/6/1、109/10/1、111/4/1、113/6/1、113/10/1)\n1.限單獨使用於：\n(1)  具有 EGFR Exon 19 Del 或 Exon 21 L858R 基因突變之局部侵犯性或轉移性（即為 IIIB、IIIC 期或第Ⅳ期）肺腺癌病患之第一線治療。 (111/4/1、113/10/1)\n(2)先前已使用過 EGFR 標靶藥物 gefitinib、erlotinib、afatinib或 dacomitinib 治療失敗，且具有 EGFR T790M 基因突變之局部侵犯性或轉移性之非小細胞肺癌之第二線治療。(109/10/1）\n2.使用注意事項：(109/10/1、111/4/1、113/6/1、113/10/1）\n(1)須經事前審查核准後使用：\nI.每次申請事前審查之療程以三個月為限，每三個月需再次申請。\nII.初次申請時需檢具確實患有肺腺癌或非小細胞肺癌之病理或細胞檢查報告，及檢附 EGFR 基因檢測結果報告，且需符合全民健康保險藥品給付規定之通則十二。(113/6/1、113/10/1)\nIII.再次申請時需附上治療後相關臨床資料（如：影像學）證實無惡化，才可繼續使用。每次處方以4週為限，如給藥4週後需追蹤胸部 X 光或電腦斷層等影像檢查評估療效，每8至12週需進行完整療效評估(如胸部 X 光或電腦斷層)，若病情惡化、復發或產生不可接受之毒性，即不得再次申請。\n(2)用於第一線治療用藥：與 gefitinib、erlotinib、afatinib 及dacomitinib 僅得擇一使用，除因耐受性不良，不得互換。如需更換使用本藥品，必須符合本藥品具有 EGFR Exon 19 Del 或 Exon 21\nL858R 基因突變之局部侵犯性或轉移性（即為 IIIB、IIIC 期或第Ⅳ期）肺腺癌病患。(109/6/1、111/4/1、113/10/1)\n(3)用於第二線治療用藥：須符合本藥品具有 EGFR T790M 基因突變，及檢附曾經接受 gefitinib、erlotinib、afatinib 或 dacomitinib 治療之證明，以及目前又有疾病惡化之影像診斷證明（如胸部 X 光、電腦斷層或其他可作為評估的影像），此影像證明以可測量（measurable）的病灶為優先，如沒有可以測量的病灶，則可評估（evaluable）的病灶亦可採用。 (109/10/1、113/10/1)\n(4)每日限用1粒。","req":"官方條文原文，生效日 2024-10-01｜來源 9.80._20241001.pdf"},{"id":"9.81","name":"Lorlatinib","brand":"Lorviqua","type":"TARGETED","cancers":["肺癌"],"verbatim":true,"eff":"2024-06-01","src":"9.81._20240601.pdf","ind":"9.81.Lorlatinib (如 Lorviqua)：(109/6/1、112/11/1、113/4/1、113/6/1)\n1.適用於 ALK 陽性的晚期非小細胞肺癌第一線治療。(112/11/1)\n(1)須經事前審查核准後使用：\nI.每次申請事前審查之療程以三個月為限，每三個月需再次申請。\nII.初次申請時需檢具確實患有非小細胞肺癌之病理或細胞檢查報告，及 ALK 突變檢測報告且需符合全民健康保險藥品給付規定之通則十二。\nIII.再次申請時並需附上治療後相關臨床資料，如給藥4週後，需追蹤胸部 X 光或電腦斷層等影像檢查評估療效，往後每4週做胸部 X光檢查，每3個月需追蹤其作為評估藥效的影像（如胸部 X 光或電腦斷層） ，若病情惡化即不得再次申請。\n(2)Lorlatinib 與 alectinib、ceritinib、crizotinib、brigatinib用於 ALK 陽性之晚期非小細胞肺癌第一線治療時，僅得擇一使用，除因病人使用後，發生嚴重不良反應或耐受不良之情形外，不得互換。\n2.適用於在 ceritinib、alectinib 或 brigatinib 治療中惡化之 ALK 陽性的晚期非小細胞肺癌患者。(109/6/1、112/11/1、113/4/1)\n(1)須經事前審查核准後使用。\n(2)每次申請事前審查之療程以三個月為限，每三個月需再次申請，再次申請時並需附上治療後相關臨床資料，若病情惡化即不得再次申請。","req":"官方條文原文，生效日 2024-06-01｜來源 9.81._20240601.pdf"},{"id":"9.82","name":"Brigatinib","brand":"Alunbrig","type":"TARGETED","cancers":["肺癌"],"verbatim":true,"eff":"2024-06-01","src":"9.82._20240601.pdf","ind":"9.82.Brigatinib (如 Alunbrig)：(109/8/1、111/8/1、112/11/1、113/6/1)\n1. 適用於 ALK 陽性的晚期非小細胞肺癌第一線治療。 （111/8/1、113/6/1)\n(1)需經事前審查核准後使用：\nI. 每次申請事前審查之療程以 3 個月為限，每 3 個月需再次申請。\nII. 初次申請時需檢具確實患有非小細胞肺癌之病理或細胞檢查報告，及 ALK 突變檢測報告且需符合全民健康保險藥品給付規定之通則十二。\nIII. 再次申請時並需附上治療後相關臨床資料，如給藥 4 週後，需追蹤胸部 X 光或電腦斷層等影像檢查評估療效，往後每 4 週做胸部 X 光檢查，每 3 個月需追蹤其作為評估藥效的影像（如胸部 X 光或電腦斷層） ，若病情惡化即不得再次申請。(112/11/1)\n(2)Brigatinib 與 alectinib、ceritinib、crizotinib、lorlatinib用於 ALK 陽性之晚期非小細胞肺癌第一線治療時，僅得擇一使用，除因病人使用後，發生嚴重不良反應或耐受不良之情形外，不得互換。(112/11/1)\n2. 適用於在 crizotinib 治療中惡化之 ALK 陽性的晚期非小細胞肺癌患者。\n(1)需經事前審查核准後使用。\n(2)每次申請事前審查之療程以 3 個月為限，每 3 個月需再次申請，再次申請時並需附上治療後相關臨床資料，若病情惡化即不得再次申請。\n3.每日最大劑量限180mg。(111/8/1)。","req":"官方條文原文，生效日 2024-06-01｜來源 9.82._20240601.pdf"},{"id":"9.83","name":"Dacomitinib","brand":"Vizimpro","type":"TARGETED","cancers":["肺癌"],"verbatim":true,"eff":"2024-06-01","src":"9.83._20240601.pdf","ind":"9.83.Dacomitinib (如 Vizimpro)：(109/10/1、111/9/1、113/6/1)\n1.限單獨使用具有 EGFR-TK Exon 19 Del 或 Exon 21 L858R 點突變，且無腦轉移 (non-CNS)之局部侵犯性或轉移性(即第ⅢB、ⅢC 或第Ⅳ期)之肺腺癌病患之第一線治療，需檢附 EGFR 基因檢測結果報告，且需符合全民健康保險藥品給付規定之通則十二。\n2.使用注意事項\n(1)病歷應留存確實患有肺腺癌之病理或細胞檢查報告，及 EGFR-TK 基因突變檢測報告。\n(2)每次處方以4週為限，再次處方時需於病歷記錄治療後相關臨床資料，如每4週需追蹤胸部 X 光或電腦斷層等影像檢查，每8至12週需進行完整療效評估（如胸部 X 光或電腦斷層） 。\n(3)本藥品與 gefitinib、erlotinib 及 afatinib，僅得擇一使用，除因耐受性不良，不得互換。如需更換使用本藥品，必須符合本藥品第一線使用於具有 EGFR-TK Exon 19 Del或 Exon 21 L858R 點突變，且無腦轉移(non-CNS)之局部侵犯性或轉移性(即第ⅢB、ⅢC 或第Ⅳ期)肺腺癌之限制。(111/9/1)\n(4)每日限用1粒。","req":"官方條文原文，生效日 2024-06-01｜來源 9.83._20240601.pdf"},{"id":"9.85","name":"PARP抑制劑","brand":"Lynparza（olaparib）/ Zejula（niraparib）/ Talzenna（talazoparib）","type":"TARGETED","cancers":["卵巢癌","乳癌","攝護腺癌"],"verbatim":true,"eff":"2025-10-01","src":"9.85._20251001.pdf","ind":"9.85.PARP 抑制劑(如 olaparib、niraparib、talazoparib)：(109/11/1、111/6/1、111/8/1、112/1/1、112/11/1、113/3/1、113/6/1、113/9/1、114/3/1、114/6/1、114/8/1、114/10/1)\n1.卵巢、輸卵管或原發性腹膜癌(olaparib、niraparib)：(109/11/1、111/6/1、111/8/1、112/1/1、113/3/1、113/6/1、113/9/1、114/3/1、114/6/1、114/8/1)\n(1)單獨使用 olaparib 於具下列所有條件的病人做為維持治療，限用兩年：\nI.對第一線含鉑化療有治療反應後使用。\nⅡ.具 germline or somatic BRCA 1/2致病性或疑似致病性突變。\n(109/11/1、111/8/1)\nⅢ.FIGO (International Federation of Gynecology andObstetrics)\nStage III or IV disease。\n(2)單獨使用 niraparib 於具下列所有條件的病人做為維持治療，限用兩年：\nI.對第一線含鉑化療有治療反應後使用。\nⅡ.檢測結果符合下列任一情形之病人：\ni.具 germline or somatic BRCA 1/2 致病性或疑似致病性突變病人。\nii.具同源重組缺陷(Homologous Recombination Deficient,HRD)陽性且 BRCA wild type 之高度惡性病人。\nⅢ.FIGO (International Federation of Gynecology andObstetrics) Stage III or IV disease。\n(3)限 olaparib 併用 bevacizumab(限使用 Alymsys、Abevmy、Vegzelma 或Mvasi)，使用於具下列所有條件的成年病人做為維持治療，限用兩年：(114/6/1、114/8/1)：\nI.對第一線含鉑化療合併 bevacizumab 有反應(完全反應或部分反應)。\nⅡ.其癌症帶有下列任一定義的 DNA 同源修復系統缺失 (homologousrecombination deficiency, HRD)：\ni.致病性或疑似致病性 BRCA 突變。\nii.基因體不穩定(genomic instability)。\n(4)須經事前審查核准後使用：(109/11/1、111/6/1、111/8/1、113/6/1、114/6/1)\nI.每次申請之療程以6個月為限。\nⅡ.初次申請時需檢附 germline or somatic BRCA 1/2突變檢測報告或 HRD 陽性檢測報告，且需符合全民健康保險藥品給付規定之通則十二。 (111/6/1、111/8/1、113/6/1、114/6/1)\nⅢ.再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。\n(5)用於具 germline or somatic BRCA 1/2 致病性或疑似致病性突變時，olaparib 與 niraparib 僅能擇一使用，除因耐受不良，不得互換。(112/1/1、114/6/1)\n(6)倘因併用 bevacizumab 耐受性不良，在維持性治療可再換成olaparib 單獨使用，總療程數合併計算，限用兩年。(114/6/1)\n(7) niraparib 使用時，體重大於(含)77公斤且基期血小板高於(含)15萬/uL，每日最多使用300mg；體重小於77公斤或基期血小板低於15萬/uL，每日最多使用200mg。(112/1/1)\n(8)FIGO Stage IV disease 具 germline or somatic BRCA 1/2致病性或疑似致病性突變者，若已經申請 niraparib 用於第一線化學治療後維持性治療時不得另外申請 bevacizumab 併用，除因 niraparib耐受性不良，在維持性治療可再換成 bevacizumab(除 Zirabev 以外)單獨使用，總申請療程以17個療程為上限。(113/3/1、113/9/1、114/3/1、114/6/1、114/10/1)\n2.三陰性乳癌(olaparib、talazoparib)：(109/11/1、111/6/1、111/8/1、112/1/1、113/6/1)\n(1)olaparib 單獨使用於曾接受前導性、術後輔助性或轉移性化療，且具 germline BRCA 1/2致病性或疑似致病性突變之三陰性(荷爾蒙接受體及 HER2受體皆為陰性)轉移性乳癌病人。(109/11/1、111/8/1、112/1/1)\n(2)talazoparib 限用於治療同時符合下列條件之18歲以上局部晚期或轉移性乳癌病患：(110/3/1、111/8/1、112/1/1)\nI.曾接受前導性、術後輔助性或轉移性化療者，或是無法接受化療者。\nⅡ.具 germline BRCA 1/2突變(110/3/1、111/8/1)\nⅢ.第二型人類表皮生長因子接受體(HER2)、雌激素受體(ER)以及黃體素受體(PR)均呈現陰性。\n(3)須經事前審查核准後使用：(109/11/1、111/6/1、111/8/1、112/1/1、113/6/1)\nI.每次申請之療程以3個月為限。\nⅡ.初次申請時需檢附 ER、PR、HER2皆為陰性之檢測報告，以及germline BRCA 1/2突變之檢測報告，且需符合全民健康保險藥品給付規定之通則十二。 (111/6/1、111/8/1、113/6/1)\nⅢ.再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。\n(4)Olaparib 與 talazoparib 僅得擇一使用，除因耐受性不良，不得互換。（111/8/1、112/1/1)\n3.去勢療法無效的轉移性攝護腺癌 (mCRPC) (olaparib)：（112/11/1、113/6/1、114/6/1)\n(1)單獨使用於具 germline or somatic BRCA 1/2致病性或疑似致病性突變且先前接受過新荷爾蒙藥物(novel hormonal agents)治療後惡化之成人病人。\n(2) 併用 abiraterone 及 prednisone 或 prednisolone，用於具germline 或 somatic BRCA 1/2致病性或疑似致病性突變且尚未接受化學治療之成人病人：(114/6/1）I.需符合下列條件之 一：\ni.未曾使用新型荷爾蒙藥品(abiraterone、apalutamide、darolutamide 和 enzalutamide)治療前列腺癌。\nii.於 mCRPC 階段使用 abiraterone 治療未超過4個月且使用期間未惡化。\nⅡ.不論病人處於轉移或非轉移的狀態下，新型荷爾蒙藥品(abiraterone、apalutamide、darolutamide 和 enzalutamide) ，及 olaparib 與 abiraterone 併用，終生僅能接受一種治療，且除非出現嚴重不耐受反應導致必須永久停止治療，不得互換。\n(3)經事前審查核准後使用，每3個月需再次申請：(113/6/1)\nⅠ.初次申請時需檢附 germline or somatic BRCA 1/2突變檢測報告，且需符合全民健康保險藥品給付規定之通則十二。\nⅡ.申請時需檢附病理報告、使用雄性素去除療法紀錄及系列 PSA和睪固酮數據。\nⅢ.再申請時若 PSA 值下降未超過治療前的50%以上，則需停藥。\nIV.下降達最低值後之持續追蹤出現 PSA 較最低值上升50%以上且PSA≧2ng/ml，則需停藥，但影像學證據尚無疾病進展者，可以繼續使用。\n(3)不得合併化療使用。\n4.高復發風險之早期乳癌(olaparib)：(114/6/1)\n(1)Olaparib 適用於曾接受前導性化療或術後輔助性化療，且具遺傳性 BRCA1/2 (germline BRCA1/2)突變併 HER2陰性而有高復發風險之早期乳癌成年病人術後輔助治療，依藥品仿單記載以1年為上限。\n(2)病人須完成至少6個週期的前導性化療或術後輔助性化療，且化療處方須含有 anthracyclines 類藥物、taxane 類藥物，或兩者的複方；亦允許含鉑化療。\n(3)病人須在最後一次治療(包括手術、化療或放療)完成後的12週內使用 olaparib。\n(4)須符合下列之高復發風險條件：\nⅠ.三陰性乳癌：\ni.針對曾接受前導性化療的病人，須符合於乳房和/或手術切除的淋巴結中發現有殘餘的侵襲性癌症(non-pCR)。\nii.針對曾接受手術且接續術後輔助性化療的病人，須具有腋窩淋巴結陽性(≧pN1)，或腋窩淋巴結陰性(pN0)且原發性病理腫瘤大小≧2公分(≧pT2)。\nⅡ.HR 陽性且 HER2陰性乳癌：\ni.針對曾接受前導性化療的病人，須為 non-pCR。\nii 針對曾接受手術且接續術後輔助性化療的病人，須具有4個以上經病理學證實的陽性淋巴結。\n(5)須經事前審查核准後使用：\nⅠ.每次申請之療程以3個月為限。\nII.初次申請時需檢附 HER2為陰性之檢測報告、ER 和 PR 之檢測報告，以及 germline BRCA 1/2突變之檢測報告，且需符合全民健康保險藥品給付規定之通則十二。\nIII.再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。\nIV. 用於術後輔助治療，olaparib 與 pembrolizumab 僅能擇一給付。\n5.Olaparib 每日最多使用4粒(112/1/1)","req":"官方條文原文，生效日 2025-10-01｜來源 9.85._20251001.pdf"},{"id":"9.86","name":"Vandetanib","brand":"Caprelsa","type":"TARGETED","cancers":["甲狀腺癌"],"verbatim":false,"eff":"","src":"","ind":"無法手術切除之局部侵犯或轉移性甲狀腺髓質癌（症狀性且疾病侵襲性）","req":"需事前審查（每6個月申請）；每日限300mg"},{"id":"9.87","name":"Trastuzumab emtansine","brand":"Kadcyla (T-DM1)","type":"TARGETED","cancers":["乳癌"],"verbatim":true,"eff":"2025-05-01","src":"9.87._20250501.pdf","ind":"9.87.Trastuzumab emtansine (如 Kadcyla)：(110/2/1、113/8/1、114/2/1、114/5/1)\n1.早期乳癌(113/8/1、114/2/1、114/5/1)\n(1)使用於具 HER2過度表現(IHC 3+或 FISH+)之早期乳癌病人，曾接受過至少6個療程（每3週一療程，至少16週）的化學治療（其中至少3個療程(9週)的 taxane 藥物）和至少3個療程(9週)的 trastuzumab術前輔助治療後，仍有殘留病灶的術後輔助治療，且需符合下列任一條件：\nI.具腋下淋巴結轉移但無遠處臟器轉移之早期乳癌病人。\nⅡ.未發生腋下淋巴結轉移，但雌激素受體(ER)為陰性且腫瘤大於2\n公分之早期乳癌病人。\n(2)經事前審查核准後使用，核准後每24週須檢附療效評估資料再次申請，若疾病有惡化情形即不應再行申請。每位病人使用本藥品以14\n個療程為上限。 （113/8/1、114/5/1）\n(3)排除使用本藥品條件：\nI.未於術後12週內開始治療或提出治療申請。\nⅡ.左心室射出分率少於45%或有症狀的心衰竭病人。\nⅢ.不得與其他抗 HER2藥物併用。\n(4)本藥品申請通過後，如轉換成 trastuzumab 或其他抗 HER2藥物後不得再次申請本藥品，且本藥品與 trastuzumab 使用於早期乳癌手術前後的總療程合併計算，每位病人以全部18個療程為上限。\n2.轉移性乳癌(110/2/1、113/8/1、114/2/1)\n(1)限單獨使用於先前未使用過本藥品且 HER2過度表現(IHC3+或 FISH+)\n之轉移性乳癌病人作為二線治療，並同時符合下列情形：\nI.之前分別接受過 trastuzumab 與一種 taxane 藥物治療，或其合併療法，或 pertuzumab 與 trastuzumab 與一種 taxane 藥物治療。\nⅡ.之前已經接受過轉移性癌症治療，或在輔助療法治療期間或完成治療後6個月內癌症復發。\nⅢ.合併有主要臟器(不包含骨及軟組織)轉移。\n(2)經事前審查核准後使用，核准後每12週須檢附療效評估資料再次申請，若疾病有惡化情形即不應再行申請，每位病人至多給付10個月(13個療程為上限)。\n(3)Trastuzumab emtansine、lapatinib 和 trastuzumab deruxtecan僅能擇一給付，不得互換。(114/2/1)","req":"官方條文原文，生效日 2025-05-01｜來源 9.87._20250501.pdf"},{"id":"9.88","name":"Ixabepilone","brand":"Ixempra","type":"CHEMO","cancers":["乳癌"],"verbatim":false,"eff":"","src":"","ind":"+capecitabine用於局部晚期/轉移性乳癌（taxane抗藥且無法接受anthracycline，或兩者均無效）\n★ixabepilone/eribulin僅擇一","req":"每3療程評估一次"},{"id":"9.90","name":"Apalutamide","brand":"Erleada","type":"HORMONE","cancers":["攝護腺癌"],"verbatim":true,"eff":"2025-06-01","src":"9.90._20250601.pdf","ind":"9.90. Apalutamide (如 Erleada)：(110/3/1、110/11/1、111/3/1、112/9/1、113/8/1、114/6/1)\n1.治療高風險非轉移性去勢抗性前列腺癌(high risk nmCRPC)的成年男性。\n(1)須經事前審查核准後使用。\n(2)初次申請時需檢附病理報告、使用雄性素去除療法紀錄，系列 PSA 和睪固酮數據，三個月內影像報告證明無遠端轉移。\n(3)ECOG 分數須≦1。\n(4)PSA doubling time≦10個月，PSA 倍增之時間，應依線性回歸模型計算，且其參數取得需基於下列原則： （112/9/1）Ⅰ.至少三個連續 PSA 測量值，且各測量值皆≧0.2 ng/mL（最高的 PSA 值必須>1.0ng/ml） 。\nⅡ.應包含先前 ADT 治療期間的測量值，且最少一測量值為最近3個月內測得之 PSA 數值。\nⅢ.第一個和最後一個 PSA 測量值間隔需≧8週，但≦12個月。\n(5)每3個月需再次申請，申請之療程以3個月為限。再次申請時，有 PSA progression者，需檢附影像學報告，若影像學報告證實轉移，則需停藥;無 PSA progression 者，則每6個月需檢附影像學報告，若影像學報告證實轉移，則需停藥。 （112/9/1）註：\nPSA progression 定義為:PSA 下降達最低值(nadir)後，出現 PSA 值上升較nadir≧25%，且 PSA≧2 ng/mL，並於至少3週後，再次抽血確認 PSA 值有上升趨勢。\n2.治療高風險轉移性的去勢敏感性前列腺癌(mCSPC)，總療程以36個月為上限。 （110/3/1、111/3/1、113/8/1）\n(1)須經事前審查核准後使用。\n(2)每3個月需再次申請，再申請時若 PSA 值下降未超過治療前的50%以上，則需停藥。\n(3)下降達最低值後之持續追蹤出現 PSA 較最低值上升50%以上且 PSA≧2ng/mL，則需停藥，但影像學證據尚無疾病進展者，可以繼續使用。\n(4)前述高風險需符合下列三項條件中至少兩項： （111/3/1、113/8/1）Ⅰ.葛里森分數(Gleason score)≧8。\nⅡ. 骨骼掃描出現三個(含)以上病灶且至少其中一處以上為非脊柱及非骨盆腔轉移。\n（111/3/1、113/8/1）Ⅲ.出現內臟轉移。\n3. 不論病人處於轉移或非轉移的狀態下，新型荷爾蒙藥品(abiraterone、apalutamide、darolutamide 和 enzalutamide) ，及 olaparib 與 abiraterone併用，終生僅給付一種治療，且除非出現嚴重不耐受反應導致必須永久停止治療，不得互換。 (112/9/1、114/6/1)","req":"官方條文原文，生效日 2025-06-01｜來源 9.90._20250601.pdf"},{"id":"9.91","name":"Dabrafenib + Trametinib","brand":"Tafinlar + Mekinist","type":"TARGETED","cancers":["黑色素瘤","肺癌"],"verbatim":true,"eff":"2024-06-01","src":"9.91._20240601.pdf","ind":"9.91.Dabrafenib (如 Tafinlar)、Trametinib (如 Mekinist)：(110/3/1、113/3/1、113/6/1)\n1.Dabrafenib 和 trametinib 併用於治療 BRAF V600突變陽性 ECOG≤ 2且罹患無法切除(第ⅢC 期)或轉移性(第Ⅳ期)黑色素瘤之病人：\n(1)需經事前審查核准後使用，每次申請療程以3個月為限，如發現病情惡化應停止使用。\n(2)再申請時應檢附前次治療結果評估資料。\n2.Dabrafenib 和 trametinib 併用於 BRAF V600突變陽性且完全切除之第三期黑色素瘤病人術後輔助治療：\n(1)需經事前審查核准後使用，每次申請療程以6個月為限，如發現病情惡化應停止使用。\n(2)限用1年。\n3.本品(dabrafenib 併用 trametinib 之治療組合)與 vemurafenib 僅能擇一使用，除因耐受性不良，不得互換。\n4.Dabrafenib 與 trametinib 併用於治療 BRAF V600E 突變之轉移性(第 IV期)非小細胞肺癌成人病人：(113/3/1、113/6/1)\n(1)作為先前已接受過第一線含鉑化學治療，但仍惡化的轉移性(第 IV期)非小細胞肺癌成人病人第二線治療，使用本品無效後則不再給付該適應症相關之免疫檢查點 PD-1、PD-L1抑制劑。\n(2)須經事前審查核准後使用:I.初次申請時需檢附確實患有非小細胞肺癌之病理或細胞檢查報告以及 BRAF V600E 突變檢測報告，且需符合全民健康保險藥品給付規定之通則十二。\nII.每次申請事前審查之療程以3個月為限，每3個月需再次申請，再次申請時並需附上治療後相關臨床資料，若病情惡化即不得再次申請。","req":"官方條文原文，生效日 2024-06-01｜來源 9.91._20240601.pdf"},{"id":"9.92","name":"Ramucirumab","brand":"Cyramza","type":"TARGETED","cancers":["肝細胞癌"],"verbatim":false,"eff":"","src":"","ind":"sorafenib失敗且AFP≥400ng/mL之Child-Pugh A晚期肝細胞癌\n★ramucirumab/regorafenib/nivolumab僅擇一（肝癌）","req":"需事前審查（每8週評估一次）"},{"id":"9.93","name":"Entrectinib","brand":"Rozlytrek","type":"TARGETED","cancers":["肺癌"],"verbatim":true,"eff":"2024-06-01","src":"9.93._20240601.pdf","ind":"9.93.Entrectinib (如 Rozlytrek)：(110/7/1、113/6/1)\n1.單獨使用於 ROS-1陽性之局部晚期或轉移性非小細胞肺癌的成人病人。\n2.須經事前審查核准後使用：(113/6/1)\n(1) 需檢具確實患有非小細胞肺癌之病理或細胞檢查報告，以及符合診斷之 ROS-1突變檢測報告，且需符合全民健康保險藥品給付規定之通則十二。\n(2) 每次申請事前審查之療程以三個月為限，每三個月需再次申請，再次申請時並需附上治療後相關臨床資料，如給藥4週後，需追蹤胸部X 光或電腦斷層等影像檢查評估療效，往後每4週做胸部 X 光檢查，每隔8週需追蹤其作為評估藥效的影像(如胸部 X 光或電腦斷層)，若病情惡化即不得再次申請。\n3.Entrectinib 與 crizotinib 用於 ROS-1陽性之晚期非小細胞肺癌時，僅得擇一使用，除因病人使用後，發生嚴重不良反應或耐受不良之情形外，不得互換。\n4.每日最大劑量限600mg。","req":"官方條文原文，生效日 2024-06-01｜來源 9.93._20240601.pdf"},{"id":"9.94","name":"Darolutamide","brand":"Nubeqa","type":"HORMONE","cancers":["攝護腺癌"],"verbatim":true,"eff":"2026-04-01","src":"9.94._20260401.pdf","ind":"9.94.Darolutamide(如 Nubeqa)：(110/11/1、112/9/1、113/5/1、113/8/1、115/4/1)\n1.作為單一療法或與 docetaxel 併用於治療高風險轉移性的去勢敏感性前列腺癌(mCSPC)，總療程以36個月為上限。(113/5/1、114/6/1、115/4/1)\n(1)須經事前審查核准後使用。\n(2)每3個月需再次申請，再申請時若 PSA 值下降未超過治療前的50%以上，則需停藥。\n(3)下降達最低值後之持續追蹤出現 PSA 較最低值上升50%以上且 PSA≧2ng/mL，則需停藥，但影像學證據尚無疾病進展者，可以繼續使用。\n(4)前述高風險需符合下列三項條件中至少兩項(113/5/1、113/8/1)：\nⅠ.葛里森分數(Gleason score)≧8。\nⅡ. 骨骼掃描出現三個(含)以上病灶且至少其中一處以上為非脊柱及非骨盆腔轉移。(113/5/1、113/8/1)\nⅢ.出現內臟轉移。\n(5)與 docetaxel 併用，docetaxel限使用6個療程，且須符合下列所有條件：\nⅠ.ECOG≦1。\nⅡ.絕對嗜中性球計數≧1500/mm3。\nⅢ.血小板計數≧100,000/mm3。\nIV.GPT≦2倍之正常值上限。\nV.Total bilirubin≦正常值上限。\nVI.eGFR≧30mL/min/1.73m2\n2.治療高風險非轉移性去勢抗性前列腺癌(high risk nmCRPC)的成年男性。\n(1)須經事前審查核准後使用。\n(2)初次申請時需檢附病理報告、使用雄性素去除療法紀錄，系列 PSA 和睪固酮數據，三個月內影像報告證明無遠端轉移。\n(3)ECOG 分數須≦1。\n(4)PSA doubling time≦10個月，PSA 倍增之時間，應依線性回歸模型計算，且其參數取得需基於下列原則：（112/9/1）Ⅰ.至少三個連續PSA 測量值，且各測量值皆≧0.2 ng/mL（最高的 PSA 值必須>1.0ng/ml）。\nⅡ.應包含先前ADT 治療期間的測量值，且最少一測量值為最近3個月內測得之 PSA數值。\nⅢ.第一個和最後一個PSA 測量值間隔需≧8週，但≦12個月。\n(5)每3個月需再次申請，申請之療程以3個月為限。再次申請時，有 PSA progression者，需檢附影像學報告，若影像學報告證實轉移，則需停藥;無 PSA progression者，則每6個月需檢附影像學報告，若影像學報告證實轉移，則需停藥。（112/9/1）註：\nPSA progression 定義為:PSA 下降 達最低值(nadir)後，出現 PSA 值上升較nadir≧25%，且 PSA≧2 ng/mL，並於至少3週後，再次抽血 確認 PSA 值有上升趨勢。\n3. 不論病人處於轉移或非轉移的狀態下，新型荷爾蒙藥品(abiraterone、apalutamide、darolutamide 和 enzalutamide) ，及 olaparib 與 abiraterone 併用，終生僅給付一種治療，且除非出現嚴重不耐受反應導致必須永久停止治療，不得互換。(112/9/1、114/6/1)","req":"官方條文原文，生效日 2026-04-01｜來源 9.94._20260401.pdf"},{"id":"9.95","name":"Larotrectinib","brand":"Vitrakvi","type":"TARGETED","cancers":["多種實體腫瘤"],"verbatim":true,"eff":"2024-06-01","src":"9.95._20240601.pdf","ind":"9.95.Larotrectinib (如 Vitrakvi)：(111/3/1、111/6/1、112/12/1、113/6/1)\n1. 適用於有 NTRK 基因融合的實體腫瘤成人和兒童病人，並應符合以下條件：(112/12/1)\n(1)具 NTRK 基因融合且無已知的後天阻抗性突變(acquired resistancemutation)。\n(2)為轉移性實體腫瘤，或手術切除極可能造成嚴重病症(severemorbidity)。\n(3)沒有合適的替代治療選項(包含免疫檢查點抑制劑)。\n2.前述1.之兒童(未滿18 歲)病人，除了嬰兒纖維肉瘤可作為(含)一線以上使用外，其餘適應症須為曾接受一線治療後無效或復發的病人。\n（112/12/1)\n3.前述1.之成人(≧18歲)病人，包括之適應症有:（112/12/1)\n(1)非小細胞肺癌:I.不適合接受化學治療之晚期非小細胞肺癌成人患者，非鱗狀癌者需為 EGFR/ALK/ROS-1 腫瘤基因原生型、鱗狀癌者需為 EGFR/ALK腫瘤基因原生型。\nⅡ.先前已使用過 platinum 類化學治療失敗後，又有疾病惡化，且EGFR/ALK 腫瘤基因為原生型之晚期鱗狀非小細胞肺癌患者。\nⅢ.先前已使用過 platinum 類及 docetaxel /paclitaxel 類二線(含)以上化學治療均失敗，又有疾病惡化，且 EGFR/ALK/ROS-1\n腫瘤基因為原生型之晚期非小細胞肺腺癌患者。\nⅣ.先前曾接受過至少一線 anti-EGFR TKI 治療失敗，且因 NTRK 基因融合對 anti-EGFR TKI 產生抗性之局部侵犯性或轉移性之 EGFR突變非小細胞肺癌患者。\n(2)大腸直腸癌:先前已使用過 FOLFIRI（folinic acid/5-fluorouracil/irinotecan）或 FOLFOX（folinic acid/5-fluorouracil/oxaliplatin）治療失敗，又有疾病惡化之轉移性直腸結腸癌患者。\n(3)黑色素瘤:先前曾接受過至少一次全身性治療失敗，又有疾病惡化，且 BRAF 腫瘤基因為原生型之無法手術切除或轉移的第三期或第四期黑色素瘤患者。\n(4)胰臟癌:先前曾接受過至少一次全身性治療失敗，又有疾病惡化，無法手術切除或轉移性胰臟癌患者。\n(5)甲狀腺癌:用於放射性碘治療無效之局部晚期或轉移性的進行性(progressive)甲狀腺癌。\n(6)惡性神經膠質瘤或退行性星狀細胞瘤:先前曾接受過標準放射線治療以及化學藥物治療失敗之高度惡性神經膠質瘤(WHO 第4級)或退行性星狀細胞瘤(WHO 第3-4 級)。\n(7)肝內膽管癌:先前曾接受過至少一次全身性治療失敗，又有疾病惡化，無法手術切除或晚期或復發之膽道癌(含肝內膽管)病患。\n(8)軟組織肉瘤:用於治療先前曾接受化療失敗的晚期軟組織肉瘤(STS)患者。其病情若能接受手術治療者，須先經手術治療。\n(9)胃腸道基質瘤:先前曾接受過至少一次全身性治療失敗，又有疾病惡化，無法手術切除或轉移的惡性胃腸道基質瘤。\n(10)唾液腺腫瘤:無法手術切除或轉移的唾液腺腫瘤。\n(11)骨癌:無法手術切除或轉移的骨癌。\n(12)闌尾癌:先前曾接受過至少一次全身性治療失敗，又有疾病惡化，無法手術切除或轉移的闌尾癌。\n(13)分泌型乳腺癌:先前曾接受過前導性、術後輔助性或轉移性化學治療的轉移性分泌型乳腺癌。\n4.需經事前審查核准後使用：(111/3/1、111/6/1、113/6/1)\n(1)每次申請之療程以12週為限。\n(2)初次申請時需檢附NTRK 基因融合檢測報告。NTRK 1/2/3檢測需符合全民健康保險藥品給付規定之通則十二。(111/6/1、113/6/1)\n(3)再次申請時需檢附療效評估資料證實無疾病進展，才可繼續使用。","req":"官方條文原文，生效日 2024-06-01｜來源 9.95._20240601.pdf"},{"id":"9.96","name":"Decitabine","brand":"","type":"CHEMO","cancers":["骨髓增生不良"],"verbatim":true,"eff":"2022-05-01","src":"9.96._20220501.pdf","ind":"9.96.Decitabine ：(111/5/1)\n1.骨髓增生不良症候群高危險性病患：頑固性貧血併有過量芽細胞（RA withexcess blasts, RAEB）、轉變中的頑固性貧血併有過量芽細胞（RAEB intransformation, RAEB-T）、及慢性骨髓單核細胞性白血病（chronicmyelomonocytic leukemia, CMMoL）。\n2.初次申請時需經事前審查核准後使用。\n3.續用本藥品不需再事前審查，惟病歷應留存確診之病理或影像診斷證明等報告，並記錄治療相關臨床資料。病患倘病情惡化至急性骨髓性白血病即應停藥。\n4.急性骨髓性白血病之定義：骨髓芽細胞（myeloblast）大於30%。\n5.本藥品與 azacitidine 僅能擇一使用，除因耐受性不良，不得互換。使用本藥品無效後，不得再申請 azacitidine。","req":"官方條文原文，生效日 2022-05-01｜來源 9.96._20220501.pdf"},{"id":"9.97","name":"Avapritinib","brand":"Ayvakit","type":"TARGETED","cancers":["GIST"],"verbatim":true,"eff":"2024-06-01","src":"9.97._20240601.pdf","ind":"9.97.Avapritinib (如 Ayvakit)：(111/6/1、113/6/1)\n1.治療具有血小板衍生生長因子α受體(PDGFRA)D842V 突變之無法切除或轉移性腸胃道間質瘤的成年病人。\n2.需經事前審查核准後使用，初次申請時需檢附血小板衍生生長因子α受體(PDGFRA)D842V 突變檢測報告，且需符合全民健康保險藥品給付規定之通則十二。(111/6/1、113/6/1)\n3.每次申請事前審查之療程以6個月為限，再次申請必須提出客觀證據(如：影像學)證實無惡化，才可繼續使用。\n4.每日至多處方100mg 2粒或300mg 1粒。","req":"官方條文原文，生效日 2024-06-01｜來源 9.97._20240601.pdf"},{"id":"9.98","name":"Pemigatinib","brand":"Pemazyre","type":"TARGETED","cancers":["膽道癌"],"verbatim":true,"eff":"2024-06-01","src":"9.98._20240601.pdf","ind":"9.98. Pemigatinib (如 Pemazyre)：(112/5/1、113/6/1)\n1. 適用於成人接受過全身性藥物治療、腫瘤具有 FGFR2融合或重排、不可手術切除的局部晚期或轉移性肝內膽管癌。\n2. 需經事前審查核准後使用，初次申請需檢附腫瘤組織具有 FGFR2基因融合或重排之基因變異檢測報告，且需符合全民健康保險藥品給付規定之通則十二。(113/6/1)\n3. 核准後每12週需再次申請，再次申請時需檢附療效評估資料證實無疾病惡化，才可繼續使用。\n4. 每日限處方1粒。","req":"官方條文原文，生效日 2024-06-01｜來源 9.98._20240601.pdf"},{"id":"9.99","name":"Gilteritinib","brand":"Xospata","type":"TARGETED","cancers":["白血病"],"verbatim":true,"eff":"2024-06-01","src":"9.99._20240601.pdf","ind":"9.99.Gilteritinib(如 Xospata)：(112/6/1、113/6/1)\n1.限單獨使用於具有 FLT3突變的復發性或難治性急性骨髓性白血病(R/RAML)且計畫進行造血幹細胞移植的成年病人，限移植前使用，每位病人限給付6療程。病患須至少接受過一次 含 anthracycline 藥物的化學治療。\n2.須事前審查核准後使用，初次申請時須檢附：\n(1)相關病歷資料。\n(2)完整之造血幹細胞移植計畫，並詳細記載確認捐贈者名單及移植前調適治療等資料。需由具訓練血液及骨髓移植醫師能力之醫院申請，並由完成血液及骨髓移植訓練之醫師確認移植計畫。\n(3)染色體檢驗報告，若為 unfavorable karyotype(包含 complexkaryotype、-5、-5q、 -7、-7q、除 t(9;11)外的11q23\nabnormalities、inv(3)、(3;3)、t(6;9)以及 t(9;22)等) 則不予給付。\n(4)檢附之 FLT3突變檢測結果報告，需符合全民健康保險藥品給付規定之通則十二。(113/6/1)\n3.每次申請為二個療程；續申請次二個療程時須檢附達到 PR、CRi 或 CR的證明方可續用。申請劑量以每日120mg 為上限。","req":"官方條文原文，生效日 2024-06-01｜來源 9.99._20240601.pdf"},{"id":"9.100","name":"Acalabrutinib","brand":"Calquence","type":"TARGETED","cancers":["淋巴瘤","白血病"],"verbatim":true,"eff":"2026-05-01","src":"9.100._20260501.pdf","ind":"9.100.Acalabrutinib(如 Calquence)：(112/7/1、112/12/1、114/10/1、115/5/1)\n1.單獨使用於先前接受過至少一種化學或標靶治療方式無效或復發的被套細胞淋巴瘤成年病人。\n(1)需經事前審查核准後使用。首次申請事前審查之療程以 4 個月為限，之後每 3 個月需再次申請，再次申請時應檢附前次治療結果評估資料，如影像學檢查報告。\n(2)若疾病進展，則必須停止使用。\n(3)每位病人限給付 20 個月。\n(4)每日至多處方 2 粒。\n(5)zanubrutinib、ibrutinib 及 acalabrutinib 僅能擇一使用，唯有在出現無法忍受其副作用時方可互換。三者使用總療程合併計算，以全部 20 個月為上限。(112/12/1)\n2.單獨使用於慢性淋巴球性白血病(CLL)成年病人。(112/7/1、112/12/1、114/10/1、115/5/1)\n(1)ECOG 分數須≦2。(114/10/1)\n(2)需符合下列任一情況：\nI.具有 17p 缺失。\nII.非 IGHV 突變且曾接受至少 1 種包括 alkylating agent 與 anti-CD20(如 R-CVP、RCHOP、rituximab 加 bendamustine 等)的治療 2 個療程以上仍惡化或復發者。(114/10/1)\nIII.CLL 病人需先前曾接受至少 2 線治療(排除僅有口服藥物之療程)，治療中須包括 alkylating agent與 anti-CD20(如 R-CVP、RCHOP、rituximab 加 bendamustine等)的治療，每線治療至少 2 個療程以上後，仍惡化或復發者。(114/10/1)\n(3)開始使用前之疾病狀態需出現下列任一情形：\nI.進行性的血液相惡化至 Hb < 10.0 gm/dL 或 PLT < 100 K/uL，且無其他原因可以解釋。\nII.脾臟腫大超過左肋骨下緣 6cm。\nIII.淋巴結腫大，最長徑超過 10cm。\nIV.周邊血液淋巴球在 2 個月內增加 50%以上，或倍增時間(doublingtime)小於 6 個月。\nV.出現自體免疫併發症，且經類固醇治療無效。\nVI.出現具症狀的淋巴結外病灶。\n(4)需經事前審查核准後使用，每 3 個月需再次申請。再次申請時需檢附療效評估資料，若未達 iwCLL (International Workshop on CLL)最新定義之partial remission 或 complete remission，則不予給付。\n(5)在具有 17 缺失病人，acalabrutinib、ibrutinib、venetoclax 與zanubrutinib 四者僅能擇一使用，唯有在出現無法忍受其副作用時方可互換。四者使用總療程合併計算，以全部 24 個月為上限。(112/7/1、114/10/1)\n(6)在非 IGHV 突變二線以上病人及 CLL 三線以上病人，acalabrutinib、ibrutinib 與 zanubrutinib 三者僅能擇一使用，唯有在出現無法忍受其副作用時方可互換。三者使用總療程合併計算，以全部 24 個月為上限。\n(114/10/1、115/5/1)\n(7)每日至多處方 2 粒。","req":"官方條文原文，生效日 2026-05-01｜來源 9.100._20260501.pdf"},{"id":"9.101","name":"Tepotinib","brand":"Tepmetko","type":"TARGETED","cancers":["肺癌"],"verbatim":true,"eff":"2024-06-01","src":"9.101._20240601.pdf","ind":"9.101.Tepotinib (如 Tepmetko):(112/7/1、113/6/1)\n1.適用於治療轉移性非小細胞肺癌的成人病人，其腫瘤帶有導致間質上皮轉化因子外顯子14 跳讀式突變(MET exon 14 skipping mutation)。\n2.須經事前審查核准後使用:\n(1)初次申請時需檢具確實患有非小細胞肺癌之病理或細胞檢查報告,以及符合診斷之間質上皮轉化因子外顯子14跳讀式突變(MET exon 14\nskipping mutation)檢測報告，且需符合全民健康保險藥品給付規定之通則十二。\n(2)每次申請事前審查之療程以3個月為限，每3個月需再次申請，再次申請時並需附上治療後相關臨床資料，若病情惡化即不得再次申請。\n3.使用本品無效後則不再給付該適應症相關之免疫檢查點 PD-1、PD-L1抑制劑。\n4.每日最多處方2粒。","req":"官方條文原文，生效日 2024-06-01｜來源 9.101._20240601.pdf"},{"id":"9.102","name":"Dinutuximab beta","brand":"Qarziba","type":"IMMUNO","cancers":["神經母細胞瘤"],"verbatim":true,"eff":"2023-08-01","src":"9.102._20230801.pdf","ind":"9.102.Dinutuximab beta (如Qarziba)：(112/8/1)\n1.限用於年齡12個月以上的初診斷高危險神經母細胞瘤病人之初次使用GD2免疫治療；且在接受自體幹細胞移植前至少達到部分緩解，在自體幹細胞移植後，可申請以1次治療所需的5個療程為限。\n2.限移植後12個月內開始使用。\n3.自初診斷至使用本品前，出現復發、新轉移或疾病惡化者，不得申請給付。\n4.經事前審查核准後使用。","req":"官方條文原文，生效日 2023-08-01｜來源 9.102._20230801.pdf"},{"id":"9.103","name":"Tisagenlecleucel","brand":"Kymriah（CAR-T）","type":"CART","cancers":["白血病","淋巴瘤"],"verbatim":true,"eff":"2025-08-01","src":"9.103._20250801.pdf","ind":"9.103.Tisagenlecleucel(如Kymriah)：(112/11/1、113/2/1、114/8/1)\n1.治療患有難治型、移植後復發、第二次或二次以上復發之 B 細胞急性淋巴性白血病（ALL），且需符合以下條件:\n(1)年齡25歲以下。\n(2)為經過二線標準治療(包括 TPOG protocol、GRAALL、Hyper-CVAD 等或是造血幹細胞移植後)之復發型 B 細胞急性淋巴性白血病，或是需經過2位具有血液及造血幹細胞移植訓練之專科醫師確認無法進行造血幹細胞移植之難治型 B 細胞急性淋巴性白血病。(112/11/1、114/8/1)\n(3)若病人已接受過異體造血幹細胞移植後復發，則不論病人疾病狀態處於完全緩解、部分緩解或疾病惡化均可接受本藥品治療。(114/8/1)\n(4)病人預期壽命至少3個月以上，且完全符合以下條件:Ⅰ.ECOG < 2 (需有3次以上之醫療紀錄)。\nⅡ.腎功能:腎絲球過濾速率 Estimated Glomerular Filtration Rate(eGFR) ≥ 60 mL/min/1.73 m2或肌酸酐 creatinine ≤1.5 xULN。\nⅢ.肝功能: ALT≤ 5 x ULN且 bilirubin <2.5mg；Gilbert-Meulengracht syndrome患者須符合 total bilirubin is≤ 3.0\nx ULN且 direct bilirubin≤ 1.5 x ULN。\nⅣ.心臟功能: 左心室射出率 > 50%，沒有心包膜積液，且過去一年無任何重大心臟疾病。\nⅤ.肺功能:血氧 > 92% on room air (需有兩次以上的醫療紀錄)。\n2.治療經二線或二線以上全身治療後之復發性或難治性瀰漫性大 B 細胞淋巴瘤（DLBCL）的成人病人。且需符合以下條件:(112/11/1、114/8/1)\n(1)經自體造血幹細胞移植後疾病復發或惡化（不論其後續治療處於完全緩解、部分緩解或疾病惡化）。\n(2)或需經過具有骨髓移植訓練的骨髓移植專科醫師確認無法進行造血幹細胞移植者，無法進行造血幹細胞移植之定義，符合以下五個條件之一：(112/11/1、114/8/1)\nⅠ.年齡75歲以上。\nⅡ.年齡70歲以上且 HCT-CI 分數在1分或以上。\nⅢ.年齡65歲以上且 HCT-CI 分數在2分或以上。\nⅣ.HCT-CI 分數在4分或以上。\nⅤ.經收集自體造血幹細胞2次後仍無法收集超過2*106 CD34+細胞/公斤。\n(3)病人預期壽命至少3個月以上，且符合以下條件:Ⅰ. ECOG<2 (需有3次以上之醫療紀錄)。\nⅡ Extranodal site≤ 3 (需有 PET 或 CT 的影像報告)。\nⅢ. 腎功能:腎絲球過濾速率 Estimated Glomerular Filtration Rate(eGFR) ≥ 60 mL/min/1.73 m2或肌酸酐 creatinine ≤1.5 x ULN。\nⅣ. 肝功能: ALT≤ 5 x ULN且 bilirubin <2.5mg；Gilbert-Meulengracht syndrome患者須符合 total bilirubin is≤ 3.0 xULN 且 direct bilirubin≤ 1.5 x ULN。\nⅤ. 心臟功能: 左心室射出率 > 50%且過去一年無任何重大心臟疾病(包含但不限於不穩定心絞痛、心肌梗塞、冠狀動脈繞道手術、中風) 。\nⅥ. 肺功能:血氧 > 92% on room air (需有兩次以上的醫療紀錄)。\nⅦ. 淋巴球收集時，患者須符合全血細胞計數標準: ANC≧1000/uL、ALC≧100/uL、Hb≧8.0 g/dL; Plt≧50000/uL。\nⅧ.於治療前兩年任何無自體免疫疾病。\nⅨ. 無 DLBCL 之外的併發惡性腫瘤，但充分治療的基底細胞癌或鱗狀細胞癌不在此限（申請時需要充分的傷口癒合）；若為子宮頸或乳腺癌原位癌，在申請前至少 3 年經過治愈性治療且無復發證據；原發惡性腫瘤已完全切除且申請時須處於完全緩解5年以上。\n3.前述1、2項均須符合下列條件：\n(1)需證實癌細胞仍帶有 CD19。\n(2)終身限給付1次療程，須於特殊專案審查通過後6個月內完成輸注。\n(3)病人不得有 HIV 感染，曾經感染但已控制之病人亦不得接受。\n(4)病人不得有 active hepatitis B virus or hepatitis C virus感染(評估和輸注 CAR-T 時需為 viral load undetectable)。\n(5)病人不得有原發性中樞神經系統淋巴瘤(Primary CNS 1ymphoma)。\n(6)病人不得有活躍的次發性中樞神經系統淋巴癌侵犯。\n(7)追蹤方式：依保險人公布要求之檢驗項目與頻率執行。\n(8)應提供本藥品治療申請日2個月內腦部 MRI 報告，無法進行腦部 MRI檢查者，應提供1個月內腦脊髓液檢查報告與 CT 檢查報告並需照會神經科醫師，證明無淋巴瘤中樞神經侵犯。(114/8/1)\n(9)併用藥品規範：不得併用化療藥(淋巴清除化療除外)、免疫抑制劑或標靶藥物。(112/11/1、114/8/1)\n4.執行醫師須完全符合下列資格：\n(1)醫師必須為血液病和造血幹細胞移植專科醫師且須完成血液病和造血幹細胞移植的相關照護訓練。\n(2)每兩年接受至少6小時中華民國血液及骨髓移植學會或中華民國血液病學會舉辦之 CAR-T 教育訓練。(112/11/1、114/8/1)\n(3)由保險人每年委託相關學會定期稽核醫師資格。\n5.執行醫院須完全符合下列條件：\n(1)須為血液病和造血幹細胞移植專科醫師的訓練醫院。\n(2)每年平均須進行20例以上造血幹細胞移植，以過去3年平均為準，並每年進行確認。\n(3)須建立 CAR-T 多專科團隊，包含醫師、護理師、藥師、醫檢師、細胞蒐集專門技術人員，經團隊討論後同意治療，並須於事前審查時，檢附會議紀錄。\n(4)CAR-T多專科團隊成員，包括醫師、護理師、藥師、醫檢師、細胞蒐集專門技術人員各至少一人，須每兩年接受至少6小時中華民國血液及骨髓移植學會或中華民國血液病學會舉辦之 CAR-T 教育訓練。\n(112/11/1、114/8/1)\n(5)醫院藥局至少需庫存10支靜脈注射 tocilizumab。(112/11/1、114/8/1)\n(6)細胞蒐集和處理實驗室須於2029年1月1日前取得相關國際認證(AABB或 FACT-JACIE)。\n(7)由保險人每年委託相關學會定期稽核醫院符合前述條件。\n6.須經專家小組特殊專案審查核准後使用，並須檢附下列文件：\n(1)CAR-T多科團隊會議紀錄。\n(2)符合前述第4、5項之醫院條件及醫師資格之相關文件。\n(3)經臨床醫師確認無法接受造血幹細胞移植者，須檢附相關文件。","req":"官方條文原文，生效日 2025-08-01｜來源 9.103._20250801.pdf"},{"id":"9.104","name":"Zanubrutinib","brand":"Brukinsa","type":"TARGETED","cancers":["淋巴瘤","白血病"],"verbatim":true,"eff":"2025-10-01","src":"9.104._20251001.pdf","ind":"9.104. Zanubrutinib(如 Brukinsa)：(112/12/1、114/8/1、114/10/1)\n1. 單獨使用於先前接受過至少一種化學或標靶治療方式無效或復發的被套細胞淋巴瘤成年病人。(112/12/1、114/8/1、114/10/1)\n(1) 需經事前審查核准後使用(事審代碼：C83N2)。首次申請事前審查之療程以 4 個月為限，之後每 3 個月需再次申請，再次申請時應檢附前次治療結果評估資料，如影像學檢查報告。(114/8/1)\n(2) 若疾病進展，則必須停止使用。\n(3) 每日至多處方 4 粒。\n(4) Zanubrutinib、ibrutinib 及 acalabrutinib 僅能擇一使用，使用 zanubrutinib者無疾病惡化，可繼續使用，唯出現無法忍受其副作用時，與 ibrutinib 及acalabrutinib 互換時限使用 20 個月，三者使用總療程合併計算。(112/12/1、114/10/1)\n2. 單獨使用於曾接受含一種單株抗體及一種靜脈注射之 alkylating agent 之chemoimmunotherapy 至少 4 個療程以上後復發者的華氏巨球蛋白血症成年病人。\n(112/12/1、114/8/1)。\n(1) 病患須具下列至少 3 種條件：\nI.年齡＞65 歲。\nII. 血紅素計數≦11g/dL。\nIII. 血小板計數≦100×109/L。\nIV. β2-microglobulin>3mg/L。\nV. 免疫球蛋白 IgM>7g/dL。\n(2) 需經事前審查核准後使用(事審代碼：C88N3)。首次申請事前審查之療程以 4 個月為限，之後每 3 個月需再次申請，再次申請時應檢附前次治療結果評估資料，如影像學檢查報告。(114/8/1)\n(3) 若疾病進展，則必須停止使用。\n(4) 每位病人限給付 20 個月。\n(5) 每日至多處方 4 粒。\n3. 與 obinutuzumab併用，治療先前曾接受至少兩線(每線至少 4 個療程)全身性治療無效或復發的濾泡性淋巴瘤成人病人。(114/8/1)\n(1) 需曾接受過至少一種 anti-CD20 monoclonal antibody 及一種靜脈注射型之alkylating agent 治療。\n(2) 需符合 WHO 淋巴瘤分類為I、II 或 IIIa 期的診斷。\n(3) 開始使用前之疾病狀態需出現下列任一情形：\nI. 有單一腫瘤直徑 7 公分以上者；\nII. 有三顆以上之腫瘤其直徑大於 3 公分以上者；\nIII. 脾臟腫大，其長度 16 公分以上者；\nIV. 對 vitalorgans 造成擠壓者；\nV. 周邊血中出現淋巴球增生超過 5000/ mm3\n者；\nVI. 出現任一系列血球低下者（platelet<100,000/ mm3\n，或 Hb<10gm/dL，或absolute neutrophil count<1500/mm3\n)。\nVII. B symptoms。\n(4) 需經事前審查核准後使用(事審代碼：C82N3)，每 3 個月需再次申請，再次申請時需檢附療效評估資料，若未達 partial remission 或 complete remission，則不予給付。\n(5) 總療程以全部 24 個月為上限。Zanubrutinib 每日至多處方 4 粒。\n4. 單獨使用於慢性淋巴球性白血病(CLL)成人病人。(114/10/1)\n(1) ECOG 分數須≦2。\n(2) 需符合下列任一情況：\nI. 具有 17p 缺失。\nII. 非 IGHV 突變且曾接受至少1 種包括 alkylating agent 與 anti-CD20(如 R-CVP、RCHOP、rituximab加 bendamustine 等)的治療 2 個療程以上仍惡化或復發者。\nIII.CLL 病人需先前曾接受至少 2 線治療(排除僅有口服藥物之療程)，治療中須包括 alkylating agent 與 anti-CD20(如 R-CVP、RCHOP、rituximab 加bendamustine 等)的治療，每線治療至少 2 個療程以上後，仍惡化或復發者。\n(3) 開始使用前之疾病狀態需出現下列任一情形：\nI. 進行性的血液相惡化至 Hb < 10.0 gm/dL 或 PLT < 100 K/uL，且無其他原因可以解釋。\nII. 脾臟腫大超過左肋骨下緣 6cm。\nIII.淋巴結腫大，最長徑超過 10cm。\nIV. 周邊血液淋巴球在 2 個月內增加 50%以上，或倍增時間(doubling time)小於 6 個月。\nV. 出現自體免疫併發症，且經類固醇治療無效。\nVI. 出現具症狀的淋巴結外病灶。\n(4) 需經事前審查核准後使用(事審代碼：C91N1)，每 3 個月需再次申請。再次申請時需檢附療效評估資料，若未達 iwCLL (International Workshop on CLL)最新定義之 partial remission 或 complete remission，則不予給付。\n(5) 在具有 17 缺失病人，acalabrutinib、ibrutinib、venetoclax 與zanubrutinib 四者僅能擇一使用，唯有在出現無法忍受其副作用時方可互換。\n四者使用總療程合併計算，以全部 24 個月為上限。\n(6) 在非 IGHV 突變二線以上病人及 CLL 三線以上病人，acalabrutinib 與zanubrutinib 二者僅能擇一使用，唯有在出現無法忍受其副作用時方可互換。\n二者使用總療程合併計算，以全部 24 個月為上限。\n(7) 每日至多處方 4 粒。","req":"官方條文原文，生效日 2025-10-01｜來源 9.104._20251001.pdf"},{"id":"9.105","name":"Polatuzumab vedotin","brand":"Polivy","type":"TARGETED","cancers":["淋巴瘤"],"verbatim":true,"eff":"2025-08-01","src":"9.105._20250801.pdf","ind":"9.105.Polatuzumab vedotin (如 Polivy)：(113/2/1、114/8/1)\n1.限與 bendamustine 和 rituximab 併用，適用於第三線治療復發型（relapsed）或難治型（refractory）且未曾接受及不適合接受造血幹細胞移植的瀰漫性大型 B 細胞淋巴瘤（DLBCL）成年病人，並須完全符合下列條件：\n(1)ECOG 分數≦2。\n(2)未曾接受幹細胞移植且需先經兩位曾接受血液及骨髓移植訓練並合格之醫師評估為不適合接受移植之病人並滿足下列條件之一：\nⅠ.年齡在65歲（含）以上，且使用過的第二線治療含鉑類藥物（cisplatin、oxaliplatin、carboplatin）後，以影像學檢查證實疾病惡化中。\nⅡ.年齡在65歲以下，符合 HCT-CI≧3分，且使用過的第二線治療含鉑類藥物（cisplatin、oxaliplatin、carboplatin）後，以影像學檢查證實疾病惡化中。\nⅢ.使用過第二線治療含鉑類藥物（cisplatin、oxaliplatin、carboplatin）後，在收集造血幹細胞時，即使使用 plerixafor後收集的 CD34陽性原始細胞仍未達每公斤體重200萬顆細胞，且以影像學檢查證實疾病惡化中。\n(3)一線曾接受經兩次（含）以上 rituximab 合併化學治療，治療4個療程以上復發或是於治療中發生疾病惡化者。(113/2/1、114/8/1)\n(4)救援治療需符合以下任一條件：(114/8/1)\nI. 治療2個療程以上復發或是於治療中發生疾病惡化者。\nII.經造血幹細胞移植治療失敗者。\n2.需經事前審查核准後使用：\n(1)每次申請事前審查以3個療程為限，再次申請必須提出客觀證據（如：\n影像學）證實無惡化，若病情惡化即不得再次申請。\n(2)每位病人終生限給付6個療程。\n3.病人接受本藥物治療後，不給付造血幹細胞移植。(113/2/1、114/8/1)\n4.本藥品、glofitamab 及 epcoritamab 僅得擇一給付，治療失敗後不得互換。(114/8/1)","req":"官方條文原文，生效日 2025-08-01｜來源 9.105._20250801.pdf"},{"id":"9.106","name":"Sacituzumab govitecan","brand":"Trodelvy","type":"TARGETED","cancers":["乳癌"],"verbatim":true,"eff":"2025-10-01","src":"9.106._20251001.pdf","ind":"9.106.Sacituzumab govitecan (如Trodelvy） ：(113/2/1、114/2/1、114/10/1)\n1.用於治療先前已接受兩次以上全身性治療無效(其中一次需為治療晚期疾病)之無法切除的局部晚期或轉移性的三陰性乳癌成人病人。(113/2/1、114/2/1)\n(1)須符合下列各項條件：\nⅠ.病人身體狀況良好（ECOG≦1）。\nⅡ.須使用過 taxane類藥物至少1個療程。\nⅢ.先前未接受過trastuzumab deruxtecan治療。(114/2/1)\n(2)須經事前審查核准後使用，每次申請之療程以3個月為限，初次申請時需檢附ER、PR、HER2皆為陰性之檢測報告。\n(3)再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。\n(4)Sacituzumab govitecan和trastuzumab deruxtecan僅能擇一給付，不得互換。(114/2/1)。\n2.用於治療患有無法切除的局部晚期或轉移性的HR陽性、HER2陰性之乳癌成人病人。(114/10/1)\n(1)須符合下列各項條件：\nⅠ.須排除活動性腦轉移。\nⅡ.曾接受 CDK4/6 抑制劑≦12個月，並有內臟轉移。\nⅢ.曾接受至少兩線(每線至少兩個完整療程或於第二個療程中產生疾病惡化)的轉移性乳癌化學治療。\n(2)須經事前審查核准後使用，每次申請之療程以3個月為限，初次申請時需檢附HR陽性、HER2陰性(IHC 0、IHC 1+或 IHC2+/ISH–)之檢測報告。\n(3)再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。","req":"官方條文原文，生效日 2025-10-01｜來源 9.106._20251001.pdf"},{"id":"9.107","name":"Abemaciclib","brand":"Verzenio","type":"TARGETED","cancers":["乳癌"],"verbatim":true,"eff":"2024-06-01","src":"9.107._20240601.pdf","ind":"9.107.Abemaciclib (如 Verzenio)：(113/3/1、113/6/1)\n1.併用內分泌療法(tamoxifen 或芳香環酶抑制劑)，作為荷爾蒙受體(HR)陽性(ER 或 PR>30%)、第二型人類表皮生長因子受體(HER2)陰性、淋巴結陽性，高復發風險之早期乳癌成年女性病人的輔助療法，須符合下列高復發風險條件之一(113/3/1、113/6/1)：\n(1)pALN (positive axillary lymph nodes，陽性腋下淋巴結) ≥4。\n(2)pALN (陽性腋下淋巴結)為1-3 且腫瘤大小≥5 cm。\n(3)pALN (陽性腋下淋巴結)為1-3 且腫瘤細胞分化第3級。\n2.使用前，須接受標準之化學及放射輔助治療方可申請使用。使用中，若疾病惡化須停止使用且不得再使用其他 CDK4/6抑制劑。\n3.使用前，僅能接受最多12週的內分泌治療，且應於手術切除後16個月內接受本品治療。\n4.須經事前審查核准後使用，每24週須再次申請並檢附療效評估資料，若疾病有惡化情形須停止使用。\n5.每日至多使用2錠，使用不得超過2年。","req":"官方條文原文，生效日 2024-06-01｜來源 9.107._20240601.pdf"},{"id":"9.108","name":"Isatuximab","brand":"Sarclisa","type":"TARGETED","cancers":["骨髓瘤"],"verbatim":true,"eff":"2025-09-01","src":"9.108._20250901.pdf","ind":"9.108.Isatuximab(如 Sarclisa)：(113/4/1、114/9/1)\n1.限與 carfilzomib/dexamethasone 併用，治療先前曾接受至少1種含bortezomib 或 lenalidomide 之療法治療失敗的多發性骨髓瘤成人患者，且須具有良好日常體能狀態(ECOG<2)者。\n2.須經事前審查核准後使用：(113/4/1、114/9/1)\n(1)首次申請為10次輸注，且需同時符合下列Ⅰ.、Ⅱ.與Ⅲ.的條件：\nⅠ.病人先前曾未接受過 daratumumab 之治療。(114/9/1)\nⅡ.具有下列任一疾病惡化的指標： 病患開始治療前須在連續2次評估中均符合同一指標 (但若為 plamacytoma 體積增加，或是新產生的bone lesion(s)或新 plasmacytoma，則僅需1次評估)：\nⅰ.若前一線治療中 M component 最低值≧5 g/dL，血清 M 蛋白需增加≧1 g/dL；若前一線治療中 M component 最低值＜5 g/dL，血清 M蛋白需增加≧0.5g/dL。\nⅱ.Urine M-protein 需增加≧0.2 gm/24Hr，且需較前一線治療中的最低值增加≧25%。\niii.在 non-secretary myeloma 病患，骨髓漿細胞 (plasma cells)之比例絕對值增加≧10%，且需較前一線治療中的最低值增加≧25%。\niv.新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。\nv.Plasmacytoma 體積增加≧50%。\nvi.周邊血液中漿細胞比例≧20%或漿細胞絕對值≧2000 cells/μL。\nⅢ.出現下列任一臨床症狀：\nⅰ.新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。\nⅱ.Plasmacytoma 體積增加≧50%。\niii.高血鈣(corrected serum calcium＞11.0 mg/dL 或 2.75\nmmol/L)。\niv.貧血(Hemoglobin 下降幅度≧ 2gm/dL 且無其他原因可以解釋)。\nv.腎功能惡化(eGFR 需下降幅度≧25%)，且無其他原因可以解釋。\nvi.出現其他 end-organ dysfunctions。\n(2)之後申請則為每次4次輸注，申請時必須確定 paraprotein (M-protein)\n未上升(即表示對藥物有反應或為穩定狀態)，或對部分 non-secretorytype MM 病人以骨髓檢查 plasma cell 為療效依據，方可繼續使用。\n3.每位病人終生限給付26次輸注。\n4.除 carfilzomib 外，本案藥品不得與其他蛋白酶體抑制劑(proteasomeinhibitor)或免疫調節劑(immunomodulatory drugs)併用。\n5.Isatuximab 與 daratumumab二者僅能擇一使用，除因藥物耐受不良以外，不可以其他原因申請互換使用。","req":"官方條文原文，生效日 2025-09-01｜來源 9.108._20250901.pdf"},{"id":"9.109","name":"Enfortumab vedotin","brand":"Padcev","type":"TARGETED","cancers":["泌尿道上皮癌"],"verbatim":true,"eff":"2024-05-01","src":"9.109._20240501.pdf","ind":"9.109.Enfortumab vedotin(如Padcev）：(113/5/1)\n1.適用於先前接受過含鉑化學治療，後續接受 免疫檢查點抑制劑 (如atezolizumab；nivolumab；pembrolizumab；avelumab；ipilimumab 製劑)治療失敗後疾病惡化的局部晚期或轉移性泌尿道上皮癌成人病人，須檢附接受過含鉑化學治療之病歷報告。\n2.使用條件：\n(1)病人身體狀況良好（ECOG≦2）且預期壽命至少 3 個月以上。\n(2)病人之心肺與肝腎功能須符合下列所有條件：\nI.NYHA(the New York Heart Association) Functional Class I 或II。\nII.GOT<60U/L 及 GPT<60U/L，且 T-bilirubin<1.5mg/dL。\nIII.腎功能: eGFR>30mL/min /1.73m2。\n(3)無中樞神經系統(CNS)轉移。\n(4)需排除病情控制不佳的糖尿病患者（HbA1c≧8%）。\n3.須經事前審查核准後使用。初次申請時需檢附以下資料：\n(1)病人身體狀況良好(ECOG≦2)及心肺與肝腎功能之評估資料。\n(2)病人 12 週內之疾病影像檢查及報告(如胸部 X 光、電腦斷層或其他可作為評估的影像)，此影像證明以可測量(measurable)的病灶為優先，如沒有可以測量的病灶，則可評估(evaluable)的病灶亦可採用。\n(3)其他佐證病歷資料。\n4.每次申請事前審查以 3 個療程為限，再次申請時需檢附療效評估資料，若病情惡化即不得再次申請，無效後或給付時程期滿後則不再給付該適應症相關之標靶藥物及免疫檢查點抑制劑。\n5.每位病人限給付 6 個療程。","req":"官方條文原文，生效日 2024-05-01｜來源 9.109._20240501.pdf"},{"id":"9.110","name":"Tirabrutinib","brand":"Velexbru","type":"TARGETED","cancers":["淋巴瘤"],"verbatim":true,"eff":"2024-06-01","src":"9.110._20240601.pdf","ind":"9.110.Tirabrutinib(如Velexbru）：(113/6/1)\n1.適用於治療成人復發或難治型原發性中樞神經系統B細胞淋巴瘤，且符合下列各項條件：\n(1)復發頑固型，曾接受過至少兩個療程HD-MTX治療。\n(2)細胞型態須為Large B cell。\n(3)須排除HIV(+)及Burkitt lymphoma患者。\n2.須經事前審查核准後使用。首次申請事前審查之療程以3個月為限，之後每3個月需再次申請，再次申請時應檢附前次治療結果評估資料，如影像學檢查報告。\n3.每日至多處方6粒。\n4.限給付9個月。\n5.限單獨使用，不得同時使用單株抗體及化療。","req":"官方條文原文，生效日 2024-06-01｜來源 9.110._20240601.pdf"},{"id":"9.111","name":"Elotuzumab","brand":"Empliciti","type":"IMMUNO","cancers":["骨髓瘤"],"verbatim":true,"eff":"2024-09-01","src":"9.111._20240901.pdf","ind":"9.111.Elotuzumab ( 如 Empliciti) ：(113/9/1)\n1. 與 pomalidomide 及dexamethasone 併用，治療之前曾接受過至少兩種療法（包括 lenalidomide 和蛋白酶體抑制劑）的多發性骨髓瘤成年病人，且完全符合下列條件：\n(1) 確認完成前次治療時或結束治療後六十天內發生疾病惡化 (diseaseprogression) 。\n(2) 須具有良好日常體能狀態 (ECOG < 2) 。\n2. 需經事前審查核准後使用：\n(1) 初次申請以 3個療程為限，且需同時符合下列 Ⅰ.與Ⅱ.的條件：\nⅠ.具有下列任一疾病惡化的指標： 病人開始治療前須在連續 2次評估中均符合同一指標 ( 但若為 plamacytoma 體積增加，或是新產生的 bone lesion(s)\n或新 plasmacytoma ，則僅需 1次評估 )：\nⅰ.若前一線治療中 M component 最低值 ≧5 g/dL ，血清 M 蛋白需增加 ≧1\ng/dL ；若前一線治療中 M component 最低值＜5 g/dL ，血清 M 蛋白需增加≧0.5g/dL 。\nⅱ.Urine M-protein 需增加 ≧0.2 gm/24Hr ，且需較前一線治療中的最低值增加≧25% 。\niii. 在 non-secretary myeloma 病人，骨髓漿細胞 (plasma cells) 之比例絕對值增加 ≧10% ，且需較前一線治療中的最低值增加 ≧25% 。\niv. 新產生的 bone lesion(s) 或plasmacytoma ；且須經病理切片證實。\nv.Plasmacytoma 體積增加 ≧50% 。\nvi. 周邊血液中漿細胞比例 ≧20% 或漿細胞絕對值 ≧2000 cells/ μL。\nⅡ.出現下列任一臨床症狀：\nⅰ.新產生的 bone lesion(s) 或plasmacytoma ；且須經病理切片證實。\nⅱ.Plasmacytoma 體積增加 ≧50% 。\niii. 高血鈣 (corrected serum calcium ＞11.0 mg/dL 或 2.75 mmol/L) 。\niv. 貧血 (Hemoglobin 下降幅度 ≧ 2gm/dL 且無其他原因可以解釋 )。\nv. 腎功能惡化 (eGFR 需下降幅度 ≧25%) ，且無其他原因可以解釋。\nvi. 出現其他 end-organ dysfunctions 。\n(2) 再次申請時必須確定 paraprotein (M-protein) 未上升 (即表示對藥物有反應或為穩定狀態 ); 或對部分 non-secretory type 多發性骨髓瘤病人以骨髓檢查plasma cell 為療效依據，證明為對藥物有反應或為穩定狀態，方可繼續使用。續用時的申請以 3個療程為限。疾病若發生惡化情形應即停止使用。\n(3) 每人以 10 個療程為上限。\n3. 不得與蛋白酶體抑制劑 (bortezomib 、carfilzomib) 或lenalidomide 併用。","req":"官方條文原文，生效日 2024-09-01｜來源 9.111._20240901.pdf"},{"id":"9.112","name":"Pertuzumab+Trastuzumab皮下注射","brand":"Phesgo","type":"TARGETED","cancers":["乳癌"],"verbatim":true,"eff":"2025-05-01","src":"9.112._20250501.pdf","ind":"9.112.Pertuzumab 與 trastuzumab 皮下注射複方製劑(如 Phesgo):(113/12/1、114/5/1)\n1.本藥品及化學療法併用於具 HER2過度表現（IHC3+或 FISH+），且具腋下淋巴結轉移但無遠處臟器轉移之早期乳癌病人（113/12/1、114/5/1）\n(1)使用於術前輔助治療，經外科手術後達病理上完全緩解者（pCR），得繼續使用至18個療程為上限。\n(2)若未接受術前輔助治療，即先行手術者，可給予術後輔助治療，以18個療程為使用上限。\n(3)下列Ｉ~Ⅲ使用於外科手術前後之總療程合併計算，依藥品仿單記載以18個療程為上限：\nＩ：本藥品Ⅱ：trastuzumabⅢ：pertuzumab 與 trastuzumab 併用\n(4)須經事前審查核准後使用，核准後每24週須檢附療效評估資料再次申請，若疾病有惡化情形即不應再行申請。（113/12/1、114/5/1）\n2.轉移性乳癌\n(1)與 docetaxel 併用於治療轉移後未曾以抗 HER2或化學療法治療之HER2過度表現(IHC3+或 FISH+)轉移性乳癌病人。\n(2)須經事前審查核准後使用，核准後每18週須檢附療效評估資料再次申請，若疾病有惡化情形即不應再行申請，每位病人至多給付18個月為限。\n(3)下列Ｉ~Ⅱ使用於轉移性乳癌總療程合併計算，以全部18個月為上限：\nＩ：本藥品Ⅱ：pertuzumab 與 trastuzumab 併用\n(4)先前於早期乳癌已使用過本藥品或 pertuzumab 與 trastuzumab 併用者，不得再次申請本藥品，惟於早期乳癌治療結束至首次疾病復發轉移時間超過12個月以上者得再次申請。(113/12/1)","req":"官方條文原文，生效日 2025-05-01｜來源 9.112._20250501.pdf"},{"id":"9.113","name":"Gemtuzumab ozogamicin","brand":"Mylotarg","type":"TARGETED","cancers":["白血病"],"verbatim":true,"eff":"2025-01-01","src":"9.113._20250101.pdf","ind":"9.113.Gemtuzumab ozogamicin(如 Mylotarg)：(114/1/1)\n1.限用於新診斷原發型 CD33陽性的急性骨髓性白血病(AML)病人之標準前導與鞏固性化療時合併使用，且完全符合下列條件：\n(1)需為細胞遺傳學風險等級較佳(favorable)的病人。\n(2)排除急性前骨髓性細胞白血病(acute promyelocytic leukemia,APL)\n病人。\n2.需經事前審查核准後使用，用於誘導期時，以1個療程(3次輸注)為限，並需合併標準3+7緩解誘導化療使用。\n3.若病患疾病達到完全緩解(即CR 或 CRi)，可續申請使用於鞏固治療期，每次申請以1個療程為限(1次輸注)，並最多給付2個鞏固治療療程(即2次輸注)。申請時需檢附前次治療結果評估資料證實無疾病惡化。\n4.每人以給付5次輸注為上限。","req":"官方條文原文，生效日 2025-01-01｜來源 9.113._20250101.pdf"},{"id":"9.114","name":"Fedratinib","brand":"Inrebic","type":"TARGETED","cancers":["骨髓纖維化"],"verbatim":true,"eff":"2025-10-01","src":"9.114._20251001.pdf","ind":"9.114.Fedratinib (如 Inrebic)：(114/1/1、114/10/1)\n1.用於未曾接受Janus 激酶抑制劑（JAK inhibitor）治療或曾接受ruxolitinib 治療後不耐受或有禁忌症，且為InternationalWorking Group（IWG）Consensus Criteria 中度風險或高風險之骨髓纖維化，包括原發性骨髓纖維化、真性紅血球增多症後骨髓纖維化、或血小板增多症後骨髓纖維化等疾病所造成脾臟腫大（symptomatic splenomegaly）及/或其他相關全身症狀且不適於接受幹細胞移植的成人病人（stem cell transplantation）。\n(1)需經事前審查核准後使用，每次申請之療程以6個月為限，送審時需檢送影像資料及症狀改善之病歷紀錄，每6個月評估一次。\n(2)用藥後第一次評估時，需達到症狀反應(symptom response)或脾臟體積無惡化兩者之一，且同時無AML tranformation，方得以繼續使用。分別定義如下：\nⅠ.症狀反應：MPN-SAF-TSS分數或MPN-10與治療前基準值相比，需下降超過50%。\nⅡ.脾臟體積無惡化：使用電腦斷層評估，脾臟長度未增加超過治療前基準值之40%以上(或體積增加未達25%以上)。\nⅢ.AML transformation：骨髓中之芽細胞≥20%或血液中之芽細胞≥20%合併芽細胞數值≥1×10\n9\n/L。\n(3)用藥後第二次及其後的評估，必須顯示無疾病惡化（無症狀惡化且脾臟體積無惡化，並同時無AML transformation） ，方得以繼續使用。分別定義如下：\nⅠ.無症狀惡化：未出現新症狀，且MPN-SAF-TSS分數或 MPN-10未超過治療前的基準值。\nⅡ.脾臟體積無惡化：使用電腦斷層評估，脾臟長度未增加超過最佳反應(best response)時之脾臟長度40%以上(或體積增加未達 25%以上)。\nⅢ.AML transformation：骨髓中之芽細胞≥20%或血液中之芽細胞≥20%合併芽細胞數值≥1×10\n9\n/L。\n2.本藥品與ruxolitinib、momelotinib用於中度風險或高風險之骨髓纖維化治療時，僅得擇一給付。ruxolitinib、momelotinib治療後如疾病惡化不得換用本藥品。(114/10/1)","req":"官方條文原文，生效日 2025-10-01｜來源 9.114._20251001.pdf"},{"id":"9.115","name":"Trastuzumab deruxtecan","brand":"Enhertu (T-DXd)","type":"TARGETED","cancers":["乳癌"],"verbatim":true,"eff":"2025-02-01","src":"9.115._20250201.pdf","ind":"9.115.Trastuzumab deruxtecan (如 Enhertu)：(114/2/1)\n1.單獨使用於具 HER2過度表現(IHC3+或 FISH+)之轉移性乳癌病人作為二線治療，並同時符合下列情形：\n(1)之前分別接受過 trastuzumab 與一種 taxane 藥物治療，或其合併療法，或 pertuzumab 與 trastuzumab 與一種 taxane 藥物治療。\n(2)之前已經接受過轉移性癌症治療，或在輔助療法治療期間或完成治療後6\n個月內癌症復發。\n(3)合併有主要臟器(不包含骨及軟組織)轉移。\n(4)須經事前審查核准後使用，核准後每12週須檢附療效評估資料再次申請，若疾病有惡化情形即不應再行申請，每位病人至多給付18個療程為上限。\n(5)Trastuzumab deruxtecan、trastuzumab emtansine 和 lapatinib 僅能擇一給付，不得互換。\n2.單獨使用於 ER、PR 皆陰性且具 HER2弱陽性(IHC 1+或 IHC 2+/ISH-)表現之無法切除的局部晚期或轉移性乳癌病人，且符合下列各項條件：\n(1)病人身體狀況良好（ECOG≦1） 。\n(2)須接受過至少一種化學療法治療。\n(3)須經事前審查核准後使用，每次申請之療程以12週為限，初次申請時需檢附ER、PR 皆為陰性且 HER2弱陽性(IHC1+或 IHC2+/ISH-)之檢測報告。\n(4)再次申請必須提出客觀證據（如：影像學）證實無惡化，才可繼續使用。\n(5)Trastuzumab deruxtecan 和 sacituzumab govitecan 僅能擇一給付，不得互換。\n3.申報醫療費用時「總量」應依實際使用量申報，取至小數點第一位，第二位四捨五入。","req":"官方條文原文，生效日 2025-02-01｜來源 9.115._20250201.pdf"},{"id":"9.116","name":"Selumetinib","brand":"Koselugo","type":"TARGETED","cancers":["神經纖維瘤"],"verbatim":true,"eff":"2025-02-01","src":"9.116._20250201.pdf","ind":"9.116.Selumetinib ( 如 Koselugo) ：(114/2/1)\n1. 治療 3歲以上至未滿 18 歲第 1型神經纖維瘤 (neurofibromatosis type1 ，NF1) 合併有叢狀神經纖維瘤（plexiform neurofibroma ，PN ）之兒童病人，且同時符合下列情形：\n(1) 無法以手術切除。\n(2) 具有症狀且嚴重的 PN 。\n2. 無法以手術切除的定義為：\n(1) 經專科醫師評估無法以外科手術治療或手術切除者，須包含下列情形其中之一：\nI.PN 包裹住或靠近重要器官。\nII.PN 具侵襲性，或具高度血管分布，易導致術後大量出血、神經損傷或其他嚴重併發症者。\n(2) 需檢附經專科醫師評估後具名之手術風險評估報告。\n(3) 上述專科醫師包括：神經內科、神經外科、血液腫瘤科、整形外科、耳鼻喉科、一般外科、泌尿科、眼科、皮膚科、小兒神經科、小兒遺傳科或小兒血液腫瘤科。\n3. 具有症狀且嚴重的 PN 定義為因 PN 引起的嚴重症狀，且符合下列情況之一者：\n(1) 因腫瘤壓迫導致之中度至嚴重的疼痛，需檢附疼痛評估報告(pain scale score 需≧7) 。\n(2)PN 壓迫臟器、呼吸道、大血管或顱、脊椎、臂叢、腰叢區域神經等部位，以致影響器官功能或功能受損（如視力受損、聽力受損、下半身偏癱、大小便失禁等） 。需檢附相關功能受損之評估檢驗報告。\n4. 需經事前審查核准後使用，每次申請以 6個月為限，初次申請時須提供疾病相關檢驗及症狀證據，如照片、檢查影像、病理報告或評估報告；再次申請時應檢附前次治療結果評估資料，以RECIST 標準評定藥物療效反應，如有下列情況之一，應停止使用：\n(1) 病情惡化 (PD ，指與基準點或用藥後的最佳反應時相比時，目標PN 最大直徑總和增加 ≥20% ，或有新 PN 出現 )。\n(2) 無法耐受藥品副作用。\n(3) 原無法手術切除的 PN 得以接受完整手術切除。\n(4) 經治療 18 個月後，初次申請之目標 PN 引起之症狀未改善且 PN惡化。\n5. 每日最高劑量為 100 mg 。","req":"官方條文原文，生效日 2025-02-01｜來源 9.116._20250201.pdf"},{"id":"9.117","name":"Selinexor","brand":"Xpovio","type":"TARGETED","cancers":["骨髓瘤"],"verbatim":true,"eff":"2025-03-01","src":"9.117._20250301.pdf","ind":"9.117.Selinexor(如 Xpovio)：(114/3/1)\n1.與 bortezomib 及 dexamethasone 合併使用於先前已接受至少2種治療失敗之多發性骨髓瘤病人，且須具有良好日常體能狀態(ECOG<2)者。\n2.須經事前審查核准後使用：\n(1)初次申請以4個療程(每療程為5週)為限，且需同時符合下列Ⅰ.與Ⅱ.的條件：\nI.具有下列任一疾病惡化的指標：病患開始治療前須在連續2次評估中均符合同一指標(但若為 plamacytoma 體積增加，或是新產生的 bonelesion(s)或新 plasmacytoma，則僅需1次評估)：\ni.若前一線治療中 M component最低值≧5g/dL，血清 M 蛋白需增加≧1g/dL；若前一線治療中 M component 最低值＜5g/dL，血清 M 蛋白需增加≧0.5g/dL。\nii.Urine M-protein 需增加≧0.2gm/24Hr，且需較前一線治療中的最低值增加≧25%。\niii.在 non-secretary myeloma病患，骨髓漿細胞(plasmacells)之比例絕對值增加≧10%，且需較前一線治療中的最低值增加≧25%。\niv.新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。\nv.Plasmacytoma 體積增加≧50%。\nvi.周邊血液中漿細胞比例≧20%或漿細胞絕對值≧2000 cells/μL。\nII.出現下列任一臨床症狀：\ni. 新產生的 bone lesion(s)或 plasmacytoma；且須經病理切片證實。\nii.Plasmacytoma 體積增加≧50%。\niii.高血鈣(corrected serumcalcium＞11.0mg/dL 或2.75mmol/L)。\niv.貧血(Hemoglobin 下降幅度≧2gm/dL 且無其他原因可以解釋)。\nv. 腎功能惡化(eGFR 需下降幅度≧25%)，且無其他原因可以解釋。\nvi. 出現其他 end-organ dysfunctions。\n(2)再次申請時必須確定 paraprotein(M-protein)未上升(即表示對藥物有反應或為穩定狀態)；或對部分non-secretory type MM 病人以骨髓檢查 plasma cell 為療效依據，證明為對藥物有反應或為穩定狀態，方可繼續使用。續用時的申請每次以4個療程為限。\n(3)每人終生以8個療程為上限。","req":"官方條文原文，生效日 2025-03-01｜來源 9.117._20250301.pdf"},{"id":"9.118","name":"Elranatamab","brand":"Elrexfio","type":"TARGETED","cancers":["骨髓瘤"],"verbatim":true,"eff":"2025-08-01","src":"9.118._20250801.pdf","ind":"9.118.Elranatamab (如 Elrexfio)：(114/5/1、114/8/1)\n1.適用於治療先前曾接受至少四線療法(包括一種蛋白酶體抑制劑、一種免疫調節劑和一種抗 CD38單株抗體)並在最近治療後顯示為疾病惡化的復發性或難治性多發性骨髓瘤成人病人，且須具有良好日常體能狀態(ECOG≤2)。\n2.須經事前審查核准後使用：\n(1)首次申請為13次輸注，且需同時符合下列Ⅰ.與Ⅱ.的條件：\nI.具有下列任一疾病惡化的指標：病人開始治療前須在連續2次評估中均符合同一指標 (但若為 plamacytoma 體積增加，或是新產生的 bonelesion(s)或新 plasmacytoma，則僅需1次評估)：\ni.若前一線治療中 M component最低值≧5 g/dL，血清 M 蛋白需增加≧1 g/dL；若前一線治療中M component最低值＜5 g/dL，血清 M蛋白需增加≧0.5g/dL。\nii.Urine M-protein需增加≧0.2 gm/24Hr，且需較前一線治療中的最低值增加≧25%。\niii.在 non-secretary myeloma病人，骨髓漿細胞 (plasma cells)\n之比例絕對值增加≧10%，且需較前一線治療中的最低值增加≧25%。\niv.新產生的 bone lesion(s)或 plasmacytoma，且須經病理切片證實。\nv.Plasmacytoma 體積增加≧50%。\nvi.周邊血液中漿細胞比例≧20%或漿細胞絕對值≧2000 cells/μL。\nII.出現下列任一臨床症狀：\ni.新產生的 bone lesion(s)或 plasmacytoma，且須經病理切片證實。\nii.Plasmacytoma 體積增加≧50%。\niii.高血鈣(corrected serum calcium＞11.0 mg/dL或2.75\nmmol/L)。\niv.貧血(Hemoglobin 下降幅度≧ 2gm/dL 且無其他原因可以解釋)。\nv.腎功能惡化(eGFR 下降幅度≧25%)，且無其他原因可以解釋。\nvi.出現其他 end-organ dysfunctions。\n(2)再次申請時必須確定 paraprotein (M-protein)未上升(即表示對藥物有反應或為穩定狀態)，或對部分 non-secretory type MM病人以骨髓檢查 plasma cell為療效依據，方可繼續使用。續用申請每次以13次輸注為限。\n3.每位病人終生限給付39次輸注。\n4.執行醫師須完全符合下列資格：\n(1)醫師必須為血液病或造血幹細胞移植專科醫師且須完成血液病和造血幹細胞移植的相關照護訓練。(114/5/1、114/8/1)\n(2)每兩年接受至少6小時中華民國血液及骨髓移植學會或中華民國血液病學會舉辦之雙特異性抗體相關治療教育訓練。\n5.Elranatamab與 teclistamab 僅能擇一給付，除因耐受性不良，不得互換。二者使用總療程合併計算，以全部39次輸注為上限。","req":"官方條文原文，生效日 2025-08-01｜來源 9.118._20250801.pdf"}]};
let D=[];
let META={version:"",updated:"",source:"",src:"seed"};

// Build DOM
let expanded=null,curGroup="全部",curType="全部",curQ="",curMode="full";

function matches(d){
  const q=curQ.toLowerCase().trim();
  const gm=curGroup==="全部"||(GROUPS[curGroup]||[]).some(c=>d.cancers.includes(c));
  const tm=curType==="全部"||d.type===curType;
  let sm;
  if(!q){
    sm=true;
  } else if(curMode==="name"){
    // 精確搜尋：只比對藥品學名與商品名
    sm=d.name.toLowerCase().includes(q)||(d.brand||"").toLowerCase().includes(q);
  } else {
    // 全文搜尋：藥名、商品名、條文號碼、癌別、適應症、申請條件
    sm=d.name.toLowerCase().includes(q)
      ||(d.brand||"").toLowerCase().includes(q)
      ||d.id.includes(q)
      ||d.ind.toLowerCase().includes(q)
      ||(d.req||"").toLowerCase().includes(q)
      ||d.cancers.some(c=>c.toLowerCase().includes(q));
  }
  return gm&&tm&&sm;
}

// 高亮命中的關鍵字（先轉義 HTML，避免注入）
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function hl(text){
  const t=esc(text||"");
  const q=curQ.trim();
  if(!q) return t;
  const re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
  return t.replace(re,"<mark>$1</mark>");
}

function buildGroupChips(){
  const row=document.getElementById("group-chips");
  row.innerHTML="";
  ["全部",...Object.keys(GROUPS)].forEach(g=>{
    const b=document.createElement("button");
    b.className="chip"+(curGroup===g?" active":"");
    b.textContent=g;
    b.onclick=()=>{curGroup=g;expanded=null;render()};
    row.appendChild(b);
  });
}

function buildTypeChips(){
  const row=document.getElementById("type-chips");
  [{key:"全部",label:"全部類型",color:"#6B7C93"},...Object.entries(TYPES).map(([k,v])=>({key:k,...v}))].forEach(t=>{
    const b=document.createElement("button");
    b.className="type-chip";
    b.textContent=t.label;
    b.style.borderColor=curType===t.key?t.color:"#D0D8E8";
    b.style.background=curType===t.key?t.color:"#fff";
    b.style.color=curType===t.key?"#fff":t.color;
    b.style.fontWeight=curType===t.key?"700":"400";
    b.onclick=()=>{curType=t.key;expanded=null;render()};
    row.appendChild(b);
  });
}

function indLines(d){
  if(d.verbatim){
    // 官方原文：逐字呈現，只做 HTML 轉義並保留換行，不得改寫或加項目符號
    return esc(d.ind);
  }
  // 摘要條文：沿用舊的「；→ 條列」排版
  return esc(d.ind).replace(/；/g,"\n• ").replace(/^/,"• ").replace(/★/g,"<b style='color:#C0842B'>★</b>");
}

function render(){
  // Update group chips
  document.getElementById("group-chips").querySelectorAll(".chip").forEach(b=>{
    b.className="chip"+(b.textContent===curGroup?" active":"");
  });
  // Update type chips
  const tkeys=["全部",...Object.keys(TYPES)];
  document.getElementById("type-chips").querySelectorAll(".type-chip").forEach((b,i)=>{
    const t=i===0?{color:"#6B7C93"}:TYPES[Object.keys(TYPES)[i-1]];
    const active=tkeys[i]===curType;
    b.style.borderColor=active?t.color:"#D0D8E8";
    b.style.background=active?t.color:"#fff";
    b.style.color=active?"#fff":t.color;
    b.style.fontWeight=active?"700":"400";
  });

  const list=document.getElementById("list");
  const filtered=D.filter(matches);
  document.getElementById("count").textContent="共 "+filtered.length+" 筆藥品";

  if(!filtered.length){
    list.innerHTML='<div class="empty">找不到符合條件的藥品</div>';
    return;
  }
  list.innerHTML="";
  filtered.forEach(d=>{
    const ti=TYPES[d.type];
    const isOpen=expanded===d.id;
    const card=document.createElement("div");
    card.className="card"+(isOpen?" open":"");
    if(isOpen)card.style.borderColor=ti.color;

    const tags=d.cancers.slice(0,4).map(c=>`<span class="ctag">${c}</span>`).join("")+(d.cancers.length>4?`<span style="font-size:10px;color:#8A9BB5">+${d.cancers.length-4}</span>`:"");
    const preview=isOpen?"":
      `<div class="preview">${d.ind.replace(/\n/g," ")}</div>`;
    const detail=isOpen?`
      <div class="detail" style="border-top-color:${ti.color}30">
        <div class="detail-section">
          <div class="detail-label" style="color:${ti.color}">給付適應症 ${d.verbatim
            ? `<span class="vb vb-ok">官方原文 · 生效日 ${d.eff}</span>`
            : `<span class="vb vb-sum">摘要（非原文）</span>`}</div>
          <div class="detail-body${d.verbatim?" verbatim":""}">${indLines(d)}</div>
        </div>
        <div class="req-box">
          <div class="req-label">${d.verbatim?"📄 條文出處":"⚙ 主要申請條件"}</div>
          <div class="req-body">${d.req}</div>
        </div>
      </div>`:"";

    card.innerHTML=`
      <div class="card-head">
        <div class="card-top">
          <div class="meta">
            <div class="meta-row">
              <span class="code">${d.id}</span>
              <span class="dname">${hl(d.name)}</span>
              ${d.brand?`<span class="brand">${hl(d.brand)}</span>`:""}
            </div>
            <div class="tags">
              <span class="ttag" style="background:${ti.color}20;color:${ti.color};border:1px solid ${ti.color}40">${ti.label}</span>
              ${tags}
            </div>
            ${preview}
          </div>
          <span class="arrow" style="transform:${isOpen?"rotate(180deg)":"rotate(0)"}">▼</span>
        </div>
      </div>
      ${detail}`;
    card.onclick=()=>{expanded=isOpen?null:d.id;render()};
    list.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input",e=>{
  curQ=e.target.value;expanded=null;render();
});

const MODE_TEXT={
  full:{ph:"全文搜尋：藥名、癌別、適應症、條文號碼…",hint:"搜尋藥名、商品名、癌別、適應症、申請條件、條文號碼"},
  name:{ph:"精確搜尋：僅比對藥品學名／商品名…",hint:"只比對藥品學名與商品名，不搜尋適應症內容"}
};
document.querySelectorAll(".mode-btn").forEach(b=>{
  b.onclick=()=>{
    curMode=b.dataset.mode;
    document.querySelectorAll(".mode-btn").forEach(x=>x.classList.toggle("active",x===b));
    const t=MODE_TEXT[curMode];
    document.getElementById("search").placeholder=t.ph;
    document.getElementById("mode-hint").textContent=t.hint;
    expanded=null;render();
  };
});

// ---------- data loading / auto-update ----------
function verNewer(a,b){ return (a||"") > (b||""); }  // ISO-ish string compare

function applyData(obj, srcLabel){
  if(!obj || !Array.isArray(obj.drugs) || !obj.drugs.length) return false;
  D = obj.drugs;
  // groups 由資料提供；缺少或格式不符時退回內建 fallback
  GROUPS = (obj.groups && typeof obj.groups==="object" && Object.keys(obj.groups).length)
    ? obj.groups : FALLBACK_GROUPS;
  // 若目前選取的分群在新資料中已不存在，退回「全部」避免篩出空白
  if(curGroup!=="全部" && !(curGroup in GROUPS)) curGroup="全部";
  META = {version:obj.version||"", updated:obj.updated||"", source:obj.source||"", src:srcLabel};
  updateMeta();
  return true;
}
function updateMeta(){
  const srcName = {seed:"內建", cache:"雲端快取", remote:"雲端最新"}[META.src] || "內建";
  const sub = document.getElementById("meta-sub");
  if(sub) sub.textContent = "Antineoplastic Drugs · " + (META.updated||"") + "（資料版本 "+(META.version||"—")+" · "+srcName+"）";
}
function setStatus(msg){ const s=document.getElementById("upd-status"); if(s) s.textContent=msg; }

async function checkForUpdate(manual){
  if(!REMOTE_DATA_URL){ if(manual) setStatus("尚未設定雲端資料網址（開啟 HTML 檔頂端 REMOTE_DATA_URL 說明）"); return; }
  setStatus("檢查更新中…");
  try{
    const res = await fetch(REMOTE_DATA_URL, {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const remote = await res.json();
    if(!remote || !Array.isArray(remote.drugs)) { setStatus("雲端資料格式不符，維持現有資料"); return; }
    if(verNewer(remote.version, META.version) || manual){
      applyData(remote, "remote");
      try{ localStorage.setItem("nhi_ch9_data", JSON.stringify(remote)); }catch(e){}
      buildGroupChips();   // 分群可能隨資料更新而改變，需重建
      render();
      setStatus("已更新至版本 "+(remote.version||"最新")+" · "+new Date().toLocaleString("zh-TW"));
    } else {
      setStatus("已是最新版本（"+(META.version||"—")+"）");
    }
  }catch(e){
    setStatus("離線或無法連線，使用現有資料");
  }
}

function init(){
  applyData(EMBEDDED_SEED, "seed");               // 1. 內建種子，保證離線可用
  try{                                            // 2. 若快取較新則採用
    const raw = localStorage.getItem("nhi_ch9_data");
    if(raw){ const c=JSON.parse(raw); if(c && verNewer(c.version, META.version)) applyData(c, "cache"); }
  }catch(e){}
  buildGroupChips();
  buildTypeChips();
  render();
  checkForUpdate(false);                          // 3. 背景嘗試抓雲端最新
  const btn=document.getElementById("upd-btn");
  if(btn) btn.onclick=()=>checkForUpdate(true);
}
init();
</script>
